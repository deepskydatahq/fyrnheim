title = "Snapshot layer end-to-end verification"
status = "done"
created = 2026-02-18

[outcome]
description = """
The snapshot layer generates code, executes on DuckDB, and produces correct output
verified by E2E tests. The snapshot table has deduplication, surrogate keys, and
optional validity ranges — all proven working with real data.
"""

job_story = """
When I define an entity with a SnapshotLayer,
I want `fyr generate` and `fyr run` to produce a deduplicated snapshot table,
so that I can track entity state over time with daily snapshots.
"""

[testing]
approach = "agent-judgment"
criteria = [
    "E2E test: entity with prep + dim + snapshot generates valid Python code",
    "E2E test: snapshot execution on DuckDB produces correct table with ds column, snapshot_key, and deduplication",
    "E2E test: duplicate rows are deduplicated (one row per entity per snapshot date)",
    "E2E test: include_validity_range=True adds valid_from and valid_to columns",
    "Executor creates output table named snapshot_{entity_name} (separate from dim_{entity_name})",
    "Runner correctly persists both dim and snapshot tables when entity has both layers",
    "Existing 544 tests still pass",
]

validator_context = [
    "src/fyrnheim/engine/executor.py",
    "src/fyrnheim/engine/snapshot.py",
    "src/fyrnheim/engine/runner.py",
    "src/fyrnheim/generators/ibis_code_generator.py",
    "tests/test_e2e_pipeline.py",
]

[context]
relevant_paths = [
    "src/fyrnheim/engine/executor.py",
    "src/fyrnheim/engine/snapshot.py",
    "src/fyrnheim/generators/ibis_code_generator.py",
    "src/fyrnheim/core/layer.py",
