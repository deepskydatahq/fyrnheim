dependencies = []

[notes]
considerations = """
The snapshot layer already has:
- SnapshotLayer config in core/layer.py
- _generate_snapshot_function() in the generator
- apply_snapshot() runtime in engine/snapshot.py
- Executor checks for snapshot_fn in _run_transform_pipeline()

What's missing:
- E2E test verifying the full generate → execute → verify output flow
- The executor currently creates only ONE table (dim_{name}) — snapshot needs its
  own output table (snapshot_{name}). This likely requires changes to the executor
  and runner to persist intermediate layer outputs or run snapshot as a separate step.

Key decision: Should the executor create TWO tables (dim + snapshot) or should
snapshot replace the dim output? The vision is that snapshot is a separate table
tracking daily state, so it should be snapshot_{name} alongside dim_{name}.

This epic is smallest-scope and should be done first — it validates existing code
and surfaces any bugs in snapshot generation before we build activity/analytics.
"""

estimated_stories = 2  # S001 multi-table output, S002 snapshot e2e test
