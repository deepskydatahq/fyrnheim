dependencies = ["M003-E001"]

[notes]
considerations = """
Activity layer transforms dimension rows into events. The concept:

Given an entity "customers" with ActivityConfig:
  types = [
    ActivityType(name="signed_up", trigger="row_appears", timestamp_field="created_at"),
    ActivityType(name="upgraded", trigger="status_becomes", field="plan", values=["pro", "enterprise"], timestamp_field="updated_at"),
  ]

The generated activity function should produce:
  | entity_id | activity_type | ts                  |
  |-----------|---------------|---------------------|
  | cust_001  | signed_up     | 2025-01-15 10:30:00 |
  | cust_002  | signed_up     | 2025-01-16 09:00:00 |
  | cust_001  | upgraded      | 2025-02-01 14:00:00 |

Implementation approach:
- For each ActivityType, generate a SELECT that filters/transforms rows into the
  standard (entity_id, activity_type, ts) schema
- UNION ALL all activity type SELECTs together
- The "field_changes" trigger is hard to implement without windowing (requires
  comparing current vs previous row). Consider simplifying to just "field_not_null"
  or deferring to a later iteration.

Input resolution follows the same pattern as snapshot:
  dim > prep > source (prefer most processed input)

Output: activity_{entity_name} table, separate from dim and snapshot tables.

The identity field comes from ActivityConfig.entity_id_field.
"""

estimated_stories = 3  # S001 generator, S002 executor, S003 e2e
