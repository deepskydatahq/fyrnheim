title = "Analytics layer generation and execution"
status = "done"
created = 2026-02-18

[outcome]
description = """
The analytics layer aggregates dimension data at date grain, producing per-period
metric tables. Generator produces the analytics function from AnalyticsLayer config,
executor runs it on DuckDB, creating an analytics_{entity_name} table with date +
metrics columns.
"""

job_story = """
When I define an entity with AnalyticsLayer specifying date expression and metrics,
I want `fyr generate` and `fyr run` to produce a date-grain aggregated table,
so that I can track entity metrics over time without writing aggregation SQL.
"""

