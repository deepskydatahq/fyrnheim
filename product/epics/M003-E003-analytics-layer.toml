[notes]
considerations = """
Analytics layer aggregates entity data at date grain. The concept:

Given an entity "customers" with AnalyticsLayer:
  model_name = "analytics_customers"
  date_expression = "created_at.date()"
  metrics = [
    AnalyticsMetric(name="new_customers", expression="_.count()", metric_type="event"),
    AnalyticsMetric(name="total_revenue", expression="_['amount_cents'].sum()", metric_type="event"),
  ]
  dimensions = ["plan"]

The generated analytics function should produce:
  | date       | plan       | new_customers | total_revenue |
  |------------|------------|---------------|---------------|
  | 2025-01-15 | free       | 3             | 0             |
  | 2025-01-15 | pro        | 2             | 29800         |
  | 2025-01-16 | enterprise | 1             | 99900         |

Implementation approach:
- Generate a function that: extracts date from date_expression, groups by date +
  dimensions, applies each metric's aggregation expression
- Metric expressions are Ibis expression strings that need to be evaluated in context
  of the grouped table. They reference column names from the input table.
- The expression format needs to be well-defined: e.g., "t.count()" or
  "t['amount_cents'].sum()". Consider whether expressions are evaluated as-is
  (code injection risk) or parsed into known Ibis operations.

Key design decision: How to safely evaluate metric expressions. Options:
1. Eval with restricted namespace (ibis + table reference) — simple but risky
2. Support a fixed set of aggregation operations (count, sum, avg, min, max) — safe but limited
3. Generate code that references column + operation separately — safest

Input resolution: same pattern as activity (dim > prep > source).

Output: analytics_{entity_name} table, separate from other layer outputs.

Scope note: AnalyticsModel (combining multiple entities' analytics) is OUT OF SCOPE
for this mission. Each entity gets its own analytics table.
"""

estimated_stories = 3  # S001 generator, S002 executor, S003 e2e
