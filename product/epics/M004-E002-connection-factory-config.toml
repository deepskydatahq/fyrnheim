# Epic: Connection factory and backend config

id = "M004-E002"
parent = "M004"
title = "Connection factory and BigQuery config support"
status = "draft"

[outcome]
description = """
A connection factory function maps (backend, config) → ibis connection.
fyrnheim.yaml supports BigQuery connection params (project_id, dataset_id).
The runner uses the factory to create connections and no longer rejects
non-duckdb backends.
"""

job_story = "When I set backend: bigquery in fyrnheim.yaml I want the runner to create a BigQuery connection so that my entities execute against BigQuery"

[testing]
approach = "agent-judgment"
criteria = [
    "Connection factory function: create_connection(backend, config) → ibis.BaseBackend",
    "DuckDB path: create_connection('duckdb', {...}) → ibis.duckdb.connect()",
    "BigQuery path: create_connection('bigquery', {...}) → ibis.bigquery.connect(project_id=..., dataset_id=...)",
    "fyrnheim.yaml schema supports backends.bigquery.project_id and backends.bigquery.dataset_id",
    "ProjectConfig/ResolvedConfig carry backend connection params",
    "runner.py backend validation (line 265) removed — delegates to connection factory",
    "runner.py creates IbisExecutor via connection factory instead of hardcoded DuckDB",
    "Unit tests for connection factory: DuckDB path, BigQuery path (mocked), unknown backend error",
    "Unit tests for config loading with backend params",
]

validator_context = [
    "src/fyrnheim/engine/runner.py",
    "src/fyrnheim/config.py",
    "tests/test_engine_runner.py",
]

depends_on = ["M004-E001"]
