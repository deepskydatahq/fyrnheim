# Epic: Wire fyrnheim.yaml and persistent DuckDB for timo-data-stack example

id = "M007-E002"
parent = "M007"
title = "Create fyrnheim.yaml with persistent DuckDB config for examples/timo-data-stack"
status = "complete"

[outcome]
description = """
A fyrnheim.yaml exists in examples/timo-data-stack/ that configures the project for
persistent DuckDB execution. Running `fyr run` from that directory uses the config
to connect to a DuckDB file (not :memory:), so results survive after the process
exits. The generated/ directory receives transform code. All paths resolve correctly
relative to the project root.
"""

job_story = "When I run fyr run in examples/timo-data-stack I want results persisted to a DuckDB file so I can query reporting tables after the pipeline finishes"

[testing]
