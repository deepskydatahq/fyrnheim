    "fyr run from examples/timo-data-stack/ discovers fyrnheim.yaml and uses its config",
    "DuckDB connection uses db_path from config (not :memory:)",
    "Generated transform code lands in examples/timo-data-stack/generated/",
    "DuckDB file is created and persists after fyr run exits",
    ".gitignore in examples/timo-data-stack/ excludes generated/ and *.duckdb",
]

validator_context = [
    "examples/timo-data-stack/fyrnheim.yaml",
