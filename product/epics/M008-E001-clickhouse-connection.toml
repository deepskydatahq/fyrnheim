# Epic: Add ClickHouse to connection factory

id = "M008-E001"
parent = "M008"
title = "Add ClickHouse backend to connection factory and pyproject extras"
status = "complete"

[outcome]
description = """
create_connection('clickhouse', host=..., database=...) returns an ibis.clickhouse
connection. pyproject.toml has a [clickhouse] extras group. The same mock-testing
pattern used for BigQuery is applied. This is the foundation that everything else
depends on — pure wiring, no changes to runner or executor.
"""

job_story = "When I call create_connection('clickhouse', host='ch.example.com', database='analytics') I want an Ibis ClickHouse connection so the push phase can write tables to ClickHouse"

[testing]
