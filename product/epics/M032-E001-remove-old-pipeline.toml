[outcome]
description = """
Remove all old entity-centric types (Entity, HelperEntity, LayersConfig, PrepLayer,
DimensionLayer, SnapshotLayer, old ActivityConfig/ActivityType, old AnalyticsLayer/
AnalyticsModel/AnalyticsMetric/AnalyticsSource/ComputedMetric, DerivedSource,
DerivedEntitySource, AggregationSource, EventAggregationSource, UnionSource,
IdentityGraphConfig, IdentityGraphSource). Remove old codegen (IbisCodeGenerator),
old executor paths, old runner, old entity registry, old resolution logic. Remove
all tests that only test old types. Keep new activities-first code and tests intact.
"""

[job_story]
description = """
When the activities-first pipeline is complete, I want to remove the old entity-centric
code so that the codebase is clean and there is only one way to define data assets.
"""

