# Epic: Pipeline Orchestrator
# Chain all engine components into an end-to-end pipeline

id = "M047-E002"
parent = "M047"
title = "Pipeline Orchestrator"
status = "active"
created = 2026-04-06
depends_on = ["M047-E001"]

[outcome]
description = """
A new engine module (pipeline.py) that orchestrates the full pipeline:
1. Load all sources (StateSource via SnapshotDiffPipeline, EventSource via loader)
2. Concatenate all events into a single table
3. Apply activity definitions
4. Resolve identities and enrich events
5. Project analytics entities
6. Aggregate metrics
7. Write output tables to parquet

This is a pure orchestration module — it calls existing engines in sequence.
"""

[job_story]
description = """When I have a project with sources, activities, identity graphs,
analytics entities, and metrics models defined, I want a single function that
executes the full pipeline and writes results to disk."""

[testing]
approach = "agent-judgment"
criteria = [
    "run_pipeline() accepts discovered assets, config, and executor",
    "StateSource data flows through SnapshotDiffPipeline producing raw events",
    "EventSource data flows through event_source_loader producing raw events",
    "All source events are concatenated into a single events table",
    "Activity definitions are applied to the combined events",
    "Identity graphs resolve and enrich events when present",
    "Analytics entities are projected from enriched events when present",
    "Metrics models aggregate events when present",
    "Output tables are written as parquet to output_dir",
    "Per-source and per-model errors are caught and reported, pipeline continues",
    "Returns a PipelineResult with status, row counts, and any errors",
]
validator_context = ["src/fyrnheim/engine/", "tests/"]

[context]
relevant_paths = [
    "src/fyrnheim/engine/snapshot_diff.py",
    "src/fyrnheim/engine/activity_engine.py",
    "src/fyrnheim/engine/identity_engine.py",
    "src/fyrnheim/engine/analytics_entity_engine.py",
    "src/fyrnheim/engine/metrics_engine.py",
    "src/fyrnheim/engine/executor.py",
    "src/fyrnheim/engine/snapshot_store.py",
]
dependencies = ["M047-E001"]

[notes]
considerations = """
The pipeline must handle optional stages gracefully — a project might have
no identity graphs or no analytics entities. Each stage should be skippable.
Error handling: catch exceptions per-source and per-model, record them in
the result, and continue processing remaining items.
Output naming: activity_events.parquet, analytics_{entity_name}.parquet,
metrics_{model_name}.parquet.
"""

estimated_stories = 3
