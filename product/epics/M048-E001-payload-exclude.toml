# Epic: payload_exclude field
# Add the field to EventSource and honor it in the loader

id = "M048-E001"
parent = "M048"
title = "payload_exclude field on EventSource"
status = "active"
created = 2026-04-08
depends_on = []

[outcome]
description = """
Add an optional payload_exclude: list[str] field to EventSource and have
load_event_source extend its exclude_cols set with the configured names so
those columns don't appear in the packed JSON payload.
"""

[job_story]
description = """When I point an EventSource at a GA4 export with REPEATED
RECORD columns, I want a one-line opt-out that drops the noisy columns from
the payload so I don't have to build a flattening view first."""

