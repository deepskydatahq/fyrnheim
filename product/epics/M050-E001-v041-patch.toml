[outcome]
description = """
Ship all five v0.4.1 fixes in a single coherent bugfix release: backtick-quote
`hash` in BigQuery DDL/DML, extend _escape to handle newlines/tabs/backslashes,
fix the fixture-shadow contract (gate on duckdb, compare on upstream.name),
re-export StagingView from the top-level package, and accept pathlib.Path in
the StagingView.sql field.
"""

[job_story]
description = """When I clone a Fyrnheim project that uses StagingView and run
`uv sync && uv run fyr run --backend bigquery`, I want Phase 0 to materialize
all my views correctly on the first try so I don't have to apply local patches
to make the primitive work."""

