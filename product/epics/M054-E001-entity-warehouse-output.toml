[outcome]
description = """
Single epic covering the full M054 scope: add optional
materialization/project/dataset/table fields to AnalyticsEntity and
MetricsModel; add IbisExecutor.write_table (BigQuery + DuckDB); dispatch in
pipeline.py Phase 4 and Phase 5; update the run summary; tests.
"""

[job_story]
description = """When I declare an AnalyticsEntity with
materialization='table' in a project running against BigQuery, I want
`fyr run` to populate <project>.<dataset>.<entity.name> in BigQuery
automatically so downstream consumers (Looker Studio, BigQuery ad-hoc
queries) can see the materialized output without me uploading anything
by hand."""

