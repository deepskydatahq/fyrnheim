# Epic: Source-scoped analytics-entity projection
# Single epic covering the full M057 scope: add the relevance filter, add
# regression tests, bump 0.6.1 -> 0.6.2, CHANGELOG entry.

id = "M057-E001"
parent = "M057"
title = "Scope project_analytics_entity to the entity's sources + ship v0.6.2"
status = "active"
created = 2026-04-17
depends_on = []

[outcome]
description = """
Single epic covering the full M057 scope. Add a relevance filter to
project_analytics_entity in src/fyrnheim/engine/analytics_entity_engine.py
so the outer id loop iterates only ids with at least one event from a
state_field source (including coalesce.priority) OR an event whose
event_type matches a measure.activity. Add 5 regression tests. Bump
0.6.1 -> 0.6.2 with a CHANGELOG entry.
"""

[job_story]
description = """When I project an AnalyticsEntity over enriched events that
span multiple sources, I want the output to contain only ids that have
events relevant to that entity, so my row counts reflect reality and my
pipeline doesn't spend 14 minutes iterating ids that will be NULL for the
entity anyway."""

