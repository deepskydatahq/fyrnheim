title = "PipelineTimings + fyr bench CLI"
status = "active"
created = 2026-04-18
depends_on = []

[outcome]
description = """
Single epic covering the full M058 scope. Add a `PipelineTimings` structure
to `PipelineResult` populated by `run_pipeline()`, covering per-phase,
per-source, per-identity-graph, per-analytics-entity, and per-metrics-model
durations. Add a `fyr bench` CLI subcommand with a human-readable default
output and a `--json` flag. Add a pytest fixture `benchmark_result` for
future perf tests.
"""

[job_story]
description = """When I'm about to touch a hot path in the pipeline (M059
parallel I/O, M060 push-down projection), I want per-phase timings I can
cite before/after, so PR bodies include evidence instead of vibes."""

