status = "active"
created = 2026-04-18
depends_on = []

[outcome]
description = """
Single epic covering the full M059 scope. Replace the three serial I/O
for-loops in src/fyrnheim/engine/pipeline.py (phase 1 source loads, phase 4
analytics-entity writes, phase 5 metrics-model writes) with bounded
ThreadPoolExecutor fan-out. Preserve event_tables ordering. Add
ResolvedConfig.max_parallel_io (default 4) + `fyr run --max-parallel-io N`.
Make IbisExecutor DuckDB-thread-safe via a connection lock so the shared
executor works across worker threads. Timings from M058 continue to populate
correctly per-item.
"""

[job_story]
description = """When I run a pipeline with N independent sources or M
independent entity writes, I want the wall time to be roughly max(item_time)
not sum(item_time), so BigQuery-bound pipelines stop being pointlessly
serial."""

