# Epic: Parallel source loads + parallel entity/metrics writes
# Single epic covering the full M059 scope. Three serial I/O loops in
# pipeline.py fan out via ThreadPoolExecutor, plus config + CLI plumbing
# and DuckDB thread-safety for the shared executor.

id = "M059-E001"
parent = "M059"
