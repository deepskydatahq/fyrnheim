[outcome]
description = """
Single epic covering the full M061 scope. Ship 4 small retro findings in
one PR: (1) wrap run/materialize/drop/list-staging executor lifetimes in
try/finally matching the bench pattern; (2) 4 unit tests for
ResolvedConfig.max_parallel_io default/yaml/CLI precedence + invalid-yaml
rejection; (3) 1-2 regression tests for max_parallel_io=1 serial
behavior; (4) wrap register_parquet with the existing _conn_lock for
symmetry with every other self._conn-touching method. No version bump.
"""

[job_story]
description = """When I run any fyr command against a DuckDB or BigQuery
backend, I want the backend connection to be released cleanly on exit, and
I want the parallel-I/O config surface to have explicit regression
coverage, so future refactors can't silently break either contract."""

