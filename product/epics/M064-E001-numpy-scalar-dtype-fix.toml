[outcome]
description = """
Single epic covering the full M064 scope: import numpy, add three
module-level type sets (`_BOOL_TYPES`, `_INT_TYPES`, `_FLOAT_TYPES`)
covering Python + numpy scalar types, rewire _coerce_to_arrow_friendly_dtype
to subset-match against those sets, add 6 unit tests covering numpy
scalars and Python+numpy mixes, bump 0.7.1 -> 0.7.2 with CHANGELOG entry,
open release PR.

Mirrors M063's v0.7.1 shape: one mission = one branch = one PR = one
release. Tag + publish are post-merge human steps.
"""

[job_story]
description = """When I run a pipeline against BigQuery with a nullable
numeric state field, I want the helper to recognise the numpy scalars
the BQ client returns so the output coerces to the correct nullable
pandas dtype, so PyArrow registration actually works on BQ the way
v0.7.1 claimed it would."""

