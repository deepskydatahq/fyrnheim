[outcome]
description = """
Single epic covering the full M065 scope: add _try_coerce_strings_to_numeric
helper in analytics_entity_engine.py, add a new branch in
_coerce_to_arrow_friendly_dtype that calls it when types are a subset of
numeric + str, add 7 unit tests (including the reproducer + edge cases
for JSON bool/null/non-parseable strings), bump 0.7.2 -> 0.7.3 with
CHANGELOG entry noting the Fixed + behavior-change. Open release PR.

Mirrors M063/M064's v0.7.x shape: one mission = one branch = one PR =
one release. Tag + publish are post-merge human steps.
"""

[job_story]
description = """When I run a pipeline against BigQuery with a state
field whose source payload stores a numeric value inconsistently (JSON
number in some rows, JSON-quoted number in others), I want the coercion
helper to recognise the strings as numbers when they all parse cleanly,
so the output column has a unified nullable numeric dtype and PyArrow
registration works."""

