status = "active"
created = 2026-04-23
depends_on = []

[outcome]
description = """
Single epic covering the full M066 scope: fix the silent 0-rows-for-
stable-StateSources bug in SnapshotDiffPipeline by falling back to
row_appeared replay when the diff is empty but a previous snapshot
exists, add a `full_refresh: bool = False` field on StateSource as an
explicit force-replay escape hatch, add diagnostic INFO logging per
StateSource per run, flip the two existing tests that pin today's
buggy empty-events-on-no-change contract, add the missing regression
test that runs the pipeline twice with persistent snapshot, bump
0.7.3 -> 0.8.0 with CHANGELOG entry, open release/v0.8.0 PR.

Mirrors M063/M064/M065 shape: one mission = one branch = one PR =
one release. Tag + publish are post-merge human steps.
"""

[job_story]
description = """When I run a fyrnheim pipeline against a StateSource
whose upstream data hasn't changed since the last run (e.g. stable GA4
daily sessions, slow-changing CRM exports), I want downstream entities
to still materialize the current state — not silently produce 0 rows —
so my pipeline outputs are correct every run regardless of snapshot
state."""

