id = "M067-E001"
parent = "M067"
title = "Guard empty-diff replay against 0-row current tables + v0.8.1 release"
status = "active"
created = 2026-04-23
depends_on = []

[outcome]
description = """
Single epic covering the full M067 scope: narrow M066's replay guard in
SnapshotDiffPipeline.run() with a third AND condition (current_count > 0)
so the replay branch is skipped when the current table is also empty
(avoiding the `Invalid Input Error: Provided table/dataframe must have
at least one column` crash from _make_appeared_events on a 0-row
DataFrame); add a regression test pinned to a 0-row StateSource
fixture; bump 0.8.0 -> 0.8.1 with CHANGELOG entry; open release/v0.8.1
PR.

Mirrors M063/M064/M065/M066 shape: one mission = one branch = one PR =
one release. Tag + publish are post-merge human steps.
"""

[job_story]
description = """When I run a fyrnheim pipeline with a StateSource
whose upstream view returns 0 rows (empty placeholders, unlanded
Salesforce sources, etc.), I want the SnapshotDiffPipeline to handle
the empty-current case gracefully — skip the v0.8.0 replay branch
(there's nothing to replay) and return the empty events table — so
the pipeline doesn't crash with an ibis.memtable column-count error."""

[testing]
approach = "agent-judgment"
criteria = [
    "All 12 testing criteria from the M067 mission TOML pass",
