[outcome]
description = """
Single epic covering the full M068 scope: add a shared
`_apply_source_transforms(table, transforms)` helper in a new
src/fyrnheim/engine/source_transforms.py module; wire it in both
load_event_source and _load_state_source after read_table; wire
StateSource.computed_columns via the same eval pattern EventSource
already uses; add unit tests for each transform category on each
source type plus an ordering test plus a computed-columns-see-
transformed-columns test; add one e2e test running a StateSource
with transforms + computed_columns through the full pipeline; bump
0.8.1 -> 0.8.2 with CHANGELOG entry; open release/v0.8.2 PR.

Mirrors the M063/M064/M065/M066/M067 patch shape. Tag + publish are
post-merge human steps.
"""

[job_story]
description = """When I declare `transforms=SourceTransforms(renames=[...])`
or `computed_columns=[ComputedColumn(...)]` on a StateSource or
EventSource, I want the engine to actually apply them at source read
time (matching the documented pydantic model intent) so that my
declarative pipeline configuration works as written, without me having
to fall back to SQL staging views for simple renames, casts, or
computed columns."""

