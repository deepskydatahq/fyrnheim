# Single epic covering the full M069 scope. Mirrors M063/M064/M065/M066/M067/M068 shape.

id = "M069-E001"
parent = "M069"
title = "Field.json_path + source-level filter + v0.9.0 release"
status = "active"
created = 2026-04-24
depends_on = []

[outcome]
description = """
Single epic covering the full M069 scope: add `Field.source_column`
field; add a json_path-extraction step in source_transforms.py that
iterates `source.fields` and derives columns from JSON source columns;
add `BaseTableSource.filter` string field; add a filter-application
step in both loaders after computed_columns; add unit + e2e tests for
both features; bump 0.8.2 -> 0.9.0 with CHANGELOG entry; open
release/v0.9.0 PR.

Mirrors the M066/M068 minor-release patch-PR shape. Tag + publish are
post-merge human steps. RC-to-TestPyPI is the planner's call.
"""

[job_story]
description = """When I declare `Field(name='utm_source', json_path='$.utm_source')`
on a StateSource or EventSource, I want the engine to extract that JSON
value at read time into a column named `utm_source` (or from a
different source column if I set `Field.source_column`). And when I
declare `filter='t._fivetran_deleted != True'` on a source, I want the
engine to apply that filter after transforms + computed_columns so my
declarative pipeline can replace SQL WHERE clauses without a
StagingView."""

