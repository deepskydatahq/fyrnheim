[outcome]
description = """
Single epic covering the full M070 scope: add `Join(source_name,
join_key)` Pydantic model + `joins: list[Join] = []` field on
StateSource (and EventSource if e2e demands); Pydantic validator
making `upstream` and `joins` mutually exclusive; lazy
`name → ibis.Table` source registry populated during Phase 1; topological
sort of sources inferred from `joins[].source_name` (mirrors
`staging_runner._topo_sort`); cycle detection with clear error;
`_apply_joins` helper in source_transforms.py applied at the
`transforms → [JOINS] → json_path → computed_columns → filter` stage;
M072 fixture-shadow gate extended to skip joins on the fixture-shadow
path; diagnostic INFO log; ~10 new tests; bump 0.11.0 → 0.12.0; open
release/v0.12.0 PR.

Mirrors the M066/M068/M069/M072/M074 minor-release shape.
TestPyPI RC optional per release-discipline memory.
"""

[job_story]
description = """When my StateSource needs to enrich its rows by
joining a sibling source declared in the same pipeline (e.g. join
`lifecycle_stage` to get the human-readable `name` column for a
`previous_stage_id` foreign key), I want to declare it as
`joins=[Join(source_name='lifecycle_stage', join_key='id')]` —
without writing SQL StagingViews — so my pipeline stays declarative
and portable across DuckDB and BigQuery."""

