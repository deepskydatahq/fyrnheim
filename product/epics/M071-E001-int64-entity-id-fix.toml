[outcome]
description = """
Single epic covering the full M071 scope:

Phase 1: systematic-debugging trace of the int→float promotion
chain (ibis.memtable.execute / SnapshotStore parquet round-trip /
_make_appeared_events pandas iteration). Identify the specific layer
where int64 becomes float64.

Phase 2: narrow fix at the identified layer. Candidate preferred:
defensive int-aware stringification helper in diff_engine._make_
appeared_events / _make_disappeared_events — smallest blast radius.
Planner may override if Phase 1 shows a cleaner layer.

Regression test (written BEFORE the fix per systematic-debugging
discipline): StateSource with int64 id column, assert entity_ids are
int-shaped strings (no ".0" suffix).

Bump 0.9.0 → 0.9.1 with CHANGELOG entry. Open release/v0.9.1 PR.

Closes Beads tasks typedata-nfj6 (bug) and typedata-ta1i (regression
test) when the PR merges.
"""

[job_story]
description = """When my StateSource has an integer id column, I want
downstream identity resolution to receive int-shaped entity_ids ('1',
'2', '3') matching what I'd get on BigQuery — not float-shaped strings
('1.0', '2.0', '3.0') that silently break joins and mappings across
the pipeline."""

