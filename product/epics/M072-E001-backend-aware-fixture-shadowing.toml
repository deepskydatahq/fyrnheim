# Epic: M072 v0.10.0 minor — FR-8 backend-aware fixture shadowing
# Single epic mirroring M066/M068/M069 minor-release shape.

id = "M072-E001"
parent = "M072"
title = "Backend-aware fixture shadowing on StateSource/EventSource + v0.10.0 release"
status = "active"
created = 2026-04-24
depends_on = []

[outcome]
description = """
Single epic covering the full M072 scope: add a new boolean field
`duckdb_fixture_is_transformed` on `BaseTableSource`; gate the
transforms / json_path / filter application in both loaders on the
flag × backend × fixture-read conditions; add diagnostic logging for
the skip path; add unit + integration tests covering default=False,
skip-on-duckdb-with-flag, no-skip-on-bigquery, no-skip-on-live-duckdb-
table, computed_columns-still-apply, and a negative test documenting
the backend-parity trade-off. Bump 0.9.1 → 0.10.0 with CHANGELOG entry.
Open release/v0.10.0 PR.

Mirrors the M066/M068/M069 minor-release shape. Tag + publish are
post-merge human steps. TestPyPI RC is optional per release-discipline
memory — noted in PR body but not required.

**Context (v0.9.0 M012 migration report 2026-04-24):** the reporter
migrated pardot_opportunities.sql to pydantic after v0.9.0 shipped
but reverted pardot_accounts / pardot_prospects / pardot_lifecycle_
history because their DuckDB fixtures are post-transform snapshots —
Fyrnheim's uniform transform application fails with
\"Column 'custom_type' is not found in table\" on DuckDB because the
pre-transform JSON columns don't exist in the post-transform fixture.
M072 fixes this via an explicit opt-in flag.
"""

[job_story]
description = """When I have a StateSource or EventSource with
duckdb_path pointing to a post-transform fixture parquet (as a
dev/test convenience instead of re-authoring the fixture in raw
pre-transform shape), I want to declare `duckdb_fixture_is_transformed=
True` so Fyrnheim skips transforms / fields / filter on DuckDB —
reading the fixture as-is since it already represents the final
shape — while BigQuery still applies the full declarative pipeline to
the raw upstream table."""

