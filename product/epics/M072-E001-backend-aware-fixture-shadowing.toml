[notes]
considerations = """
Mirror M066/M068/M069 minor-release shape — one commit bundling the
field + gate + tests + version bump + CHANGELOG on a release/v0.10.0
branch.

Full design rationale (gate condition details, why computed_columns
still apply, naming alternatives, backend-parity trade-off) is in the
M072 mission TOML [notes] section. Read that first.

Safety: new field defaults to False. Users who don't set the flag see
identical v0.9.1 behavior. Users who opt in and have correctly-shaped
fixtures get the intended skip. Users who opt in and have mismatched
fixtures get visibly-wrong DuckDB output (caught by cross-backend
tests) — documented trade-off, not silent failure.

Release discipline: minor (0.10.0) because of new API surface. Per
release-discipline memory, optionally ship a TestPyPI RC first —
planner's call during PR open.
"""

