# Epic: M074 v0.11.0 minor — nested json_path dot-notation support
# Single epic mirroring M069/M072 minor-release shape.

id = "M074-E001"
parent = "M074"
title = "Nested json_path dot-notation support + v0.11.0 release"
status = "active"
created = 2026-04-25
depends_on = []

[outcome]
description = """
Update `_apply_json_path_extractions` regex to accept multi-segment
dot-notation paths (`$.user.email`); update extraction logic to chain
subscript access across all segments; update Field + helper docstrings;
add 6 unit tests including a reporter-shape regression; bump 0.10.1 →
0.11.0 with CHANGELOG entry; open release/v0.11.0 PR.

Closes the M069 future-enhancement request for nested paths. Bracket
notation explicitly stays out of scope for v0.11.0.
"""

[job_story]
description = """When my source's JSON column has nested structure
(e.g. `{\"user\": {\"email\": \"a@b.com\"}}`) and I declare
`Field(json_path=\"$.user.email\")`, I want the engine to extract the
nested value cleanly — not raise a ValueError or silently produce NULL
in my downstream entity output."""

