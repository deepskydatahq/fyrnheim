[job_story]
description = """When my StateSource has a computed_column whose
expression references columns produced by joins/json_path/transforms
(which skip on the M072 fixture-shadow path), and my fixture parquet
already has the computed-column output baked in, I want the engine
to preserve the fixture's value instead of trying to re-evaluate the
expression against missing inputs."""

