[outcome]
description = """
Single epic mirroring M070's release-shape (single mission = single
PR). Bundles two narrow concerns:

1. **FR-10**: EventSource joins — wire `_apply_joins` for EventSource,
   mirror M070's StateSource implementation. Closes M070's
   future-enhancement deferral. Unblocks reporter's
   pardot_lifecycle_history migration.

2. **typedata-qrsw**: remove `TableSource.field_mappings` and
   `literal_columns` dead fields per Option A. Same M073 pattern.

Ship as v0.13.0 minor release.
"""

[job_story]
description = """When my EventSource needs to enrich its events by
joining a sibling source (e.g. `lifecycle_history` events joining
`lifecycle_stage` for human-readable stage names), I want to declare
`joins=[Join(...)]` directly on the EventSource — the same way I can
on StateSource since v0.12.0 — without having to keep a SQL StagingView
just for the join layer."""

