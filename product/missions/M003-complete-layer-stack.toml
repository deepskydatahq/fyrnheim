[notes]
considerations = """
Current state (post M001+M002):
- Prep and dimension layers: fully working (generate + execute + E2E tests)
- Snapshot layer: generator produces code, runtime apply_snapshot() exists, but NO E2E test
- Activity layer: Pydantic types exist (ActivityConfig, ActivityType), zero generation or execution
- Analytics layer: Pydantic types exist (AnalyticsLayer, AnalyticsMetric), zero generation or execution

Layer execution order matters:
  prep → dim → snapshot (reads dim output)
  prep → dim → activity (reads dim output)
  prep → dim → analytics (reads dim output)

Snapshot, activity, and analytics all read from the dimension layer output.
They are independent of each other — can run in any order after dim.

Key design patterns established in M001:
- Generator: IbisCodeGenerator methods like _generate_prep_function(), _generate_dim_function()
- Executor: _run_transform_pipeline() calls source → prep → dim → snapshot in sequence
- Runner: run_entity() orchestrates registry + generate + execute
- Generated code pattern: function per layer, e.g. source_X(), prep_X(), dim_X(), snapshot_X()

Activity layer concept:
- Converts dimension rows into an activity stream (event log)
- Each ActivityType maps to a row in the output: entity_id, activity_type, timestamp
- Triggers: "row_appears" (new row = event), "status_becomes" (field == value), "field_changes"
- Output table: activity_{entity_name}

Analytics layer concept:
- Date-grain aggregation of dimension data
- Each AnalyticsMetric is an Ibis aggregation expression grouped by date + optional dimensions
- Output table: analytics_{entity_name}

What this mission does NOT include:
- AnalyticsModel (combining multiple entity analytics layers — that's a future cross-entity feature)
- BigQuery or other backends (separate mission)
- Component auto-expansion (separate concern)
"""
