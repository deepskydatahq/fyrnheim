id = "M003"
title = "Complete the transformation layer stack"
status = "done"
created = 2026-02-18

[outcome]
description = """
All five entity layers — prep, dimension, snapshot, activity, analytics — generate
code and execute end-to-end on DuckDB. A data engineer defines an entity with any
combination of layers and gets working Ibis transformations for each, verified by
tests. The sample customers entity demonstrates all five layers.
"""

user_progress = "From 'only prep and dim layers actually work' to 'all five layers generate and execute — the full entity lifecycle works'"

[testing]
approach = "agent-judgment"
criteria = [
    "Snapshot layer: `fyr generate` produces snapshot function, `fyr run` executes it with dedup + surrogate key, E2E test verifies output",
    "Activity layer: `fyr generate` produces activity function from ActivityConfig, `fyr run` creates activity stream table with entity_id, activity_type, timestamp, E2E test verifies output",
    "Analytics layer: `fyr generate` produces analytics function from AnalyticsLayer, `fyr run` creates date-grain aggregated table with metrics, E2E test verifies output",
    "Generator handles all five layers when entity defines them (prep → dim → snapshot → activity → analytics)",
    "Executor runs layers in correct order: prep → dim → snapshot, activity reads from dim output, analytics reads from dim output",
    "Sample entity (customers or new) demonstrates at least snapshot + one of activity/analytics",
    "Each new layer has unit tests (generation) and integration tests (execution on DuckDB)",
    "Existing 544 tests still pass — new layers are additive, no regression",
    "CLI output from `fyr run` and `fyr list` shows all active layers per entity",
]

validator_context = [
    "src/fyrnheim/generators/ibis_code_generator.py",
    "src/fyrnheim/engine/executor.py",
    "src/fyrnheim/engine/runner.py",
    "src/fyrnheim/engine/snapshot.py",
    "src/fyrnheim/core/activity.py",
