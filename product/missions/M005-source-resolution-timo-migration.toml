[notes]
considerations = """
Codebase exploration findings (2026-02-27):

IDENTITY GRAPH (person + account — most complex gap):
The timo-data-stack identity graph uses a fluent IdentityGraphBuilder that produces
an IdentityGraphConfig with sources, match key, field mappings, and priorities.
Generated code performs cascading FULL OUTER JOINs on the match key, then uses
.fillna() chains (priority-ordered COALESCE) for field resolution. It auto-generates
source flags (is_{source}), source IDs, first-seen dates, and an engagement_level
CASE expression. The DerivedSource type already exists in fyrnheim but produces no
generated code. This is ~300-400 LOC of new generator logic.

Key pattern: person_transforms.py has a `source_person(conn, backend)` that returns
a dict of source tables, and a `transform_person(sources: dict)` that performs the
join chain. This is a fundamentally different function signature from single-source
entities. The executor needs to handle this multi-input pattern.

SOURCEMAPPING (transactions + subscriptions — partially implemented):
SourceMapping already exists in fyrnheim with required_field validation. What's
missing is generator support: field_mappings should produce column renames during
source reads so downstream code uses entity field names. This is ~100 LOC.

In timo-data-stack, TenantExtension wraps SourceMapping to add tenant-specific
computed columns. For the single-tenant case (timo), this is equivalent to putting
extra computed_columns on the entity's dimension layer, which already works. So
TenantExtension is out of scope.

SPECIALIZED UNIONS (product, signals, anon — runtime normalization):
Critical discovery: in timo-data-stack, the union + field normalization happens at
runtime in get_source(), NOT in generated code. Generated functions receive already-
normalized tables. The three patterns (SignalSourceConfig, ProductSourceConfig,
AnonSourceConfig) have different semantics but share a common need: per-source field
mappings + optional literal columns + UNION ALL.

Rather than implementing 3 new source types, enhance UnionSource with:
- Per-source field_mappings (dict[str, str] on each sub-source)
- Per-source literal_columns (dict[str, Any] — constant values like product_type="video")
- The generator produces per-source SELECT with renames + literals, then UNION ALL

This generalizes all three patterns without domain-specific types.

AGGREGATIONSOURCE (account entity):
AggregationSource is defined in fyrnheim but the code generator path needs verification.
The account entity aggregates from person (GROUP BY account_id with computed columns
like COUNT(DISTINCT person_id), BOOL_OR(is_lemonsqueezy_transaction)). This requires
the generator to produce a function that takes the source entity's dimension table as
input and applies GROUP BY + aggregation expressions.

SEQUENCING RECOMMENDATION:
Epic 1: SourceMapping codegen (quick win — unblocks transactions, subscriptions)
Epic 2: Enhanced UnionSource (unblocks product, signals, anon)
Epic 3: Identity graph codegen (unblocks person)
Epic 4: AggregationSource codegen (unblocks account, depends on person)

Epic 1 and 2 are independent and could be parallelized. Epic 3 is the heaviest.
Epic 4 depends on Epic 3 because account depends on person.

RISK MITIGATION:
- Identity graph join chain may hit column name conflicts in Ibis outer_join.
  Mitigation: use suffixes parameter or explicit column selection after each join.
- UnionSource field normalization changes the source→prep boundary.
  Mitigation: normalization happens inside source functions, prep sees clean columns.
- AggregationSource depends on another entity being executed first.
  Mitigation: dependency resolution already handles this via topological sort.
"""
