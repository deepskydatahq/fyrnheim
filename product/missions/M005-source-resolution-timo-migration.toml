[outcome]
description = """
All 9 timo-data-stack entities can be defined in fyrnheim and executed via `fyr run`
on DuckDB (full refresh mode). This means: SourceMapping field_mappings are applied as
renames during source reads, identity graph resolution generates FULL OUTER JOIN +
PriorityCoalesce code for DerivedSource entities, and enhanced UnionSource supports
per-source field normalization for signals/product/anon patterns. After this mission,
the custom orchestration in timo-data-stack/scripts/run_transformations.py is replaceable
by the fyrnheim CLI for all entity types.
"""

