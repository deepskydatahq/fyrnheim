# Mission: Write timo-data-stack entity definitions and validate on DuckDB
# Prove fyrnheim can replace the custom Python orchestration for all 9 entities

id = "M006"
title = "Write timo-data-stack entity definitions and validate with fyr run on DuckDB"
status = "complete"
created = 2026-02-28
depends_on = ["M005"]

[outcome]
description = """
All 9 timo-data-stack entities are defined as fyrnheim Entity() objects in an entities/
directory and execute successfully via `fyr run --backend duckdb` using parquet exports
of the real data. Each entity produces a dim table with correct row counts and column
names. The dependency chain (leaf sources → person identity graph → account aggregation)
resolves automatically via topological sort. After this mission, `fyr run` on a local
DuckDB is a drop-in replacement for timo-data-stack/scripts/run_transformations.py.
"""

user_progress = "From 'fyrnheim has the framework but no real entities' to 'all 9 timo-data-stack entities run via fyr run on DuckDB with real data'"

