[notes]
considerations = """
ENTITY INVENTORY (9 total, 3 tiers):

Tier 1 — Leaf sources (7 entities, no dependencies, can run in parallel):
  - ghost_person: TableSource (Ghost platform subscriber data)
  - mailerlite_person: TableSource (MailerLite subscriber data)
  - transactions: TableSource + SourceMapping (Lemonsqueezy, field_mappings for column renames)
  - subscriptions: TableSource + SourceMapping (Lemonsqueezy, field_mappings for column renames)
  - product: UnionSource (multiple content platforms, per-source field_mappings + product_type literal)
  - signals: UnionSource (multiple engagement sources, per-source field_mappings + signal_type literal)
  - anon: UnionSource (multiple anon tracking sources, per-source field_mappings + source_platform literal)

Tier 2 — Identity graph (depends on tier 1):
  - person: DerivedSource with IdentityGraphConfig
    - 4 sources: ghost_person, mailerlite_person, transactions, subscriptions
    - Match key: email
    - Priority: ghost > mailerlite > transactions > subscriptions (TBD)
    - Auto-columns: is_{source}, {source}_id, first_seen_{source}
    - PriorityCoalesce for shared fields (name)

Tier 3 — Aggregation (depends on tier 2):
  - account: AggregationSource
    - GROUP BY account_id from dim_person
    - Aggregations: person_count, total_amount, is_paying, etc.

IMPLEMENTATION STRATEGY:
Start with the 2 simplest entities (ghost_person, mailerlite_person) to validate the
basic pattern. Then add the 2 SourceMapping entities (transactions, subscriptions).
Then the 3 UnionSource entities (product, signals, anon). Then person (identity graph).
Finally account (aggregation from person).

This ordering also matches the dependency chain — by the time we get to person, all
4 of its source entities are already working.

DATA REQUIREMENT:
This mission requires parquet exports of real timo-data-stack data in a data/ directory.
The exact column names, field mappings, and computed column expressions need to be
referenced from the timo-data-stack source code (entity definitions and transforms).

RISK:
The main risk is discovering that the exact column names or expressions from
timo-data-stack don't translate cleanly to fyrnheim's Ibis expression syntax.
Mitigation: fix minor framework issues as they arise (counted as in-scope),
but major new features become separate missions.
"""
