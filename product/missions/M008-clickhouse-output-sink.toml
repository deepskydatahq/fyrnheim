# Mission: ClickHouse output sink
# Push dim and analytics tables from DuckDB to ClickHouse after fyr run

id = "M008"
title = "ClickHouse output sink: push dim and analytics tables after DuckDB compute"
status = "draft"
created = 2026-03-03
depends_on = ["M004", "M007"]

[outcome]
description = """
Running `fyr run` with `output_backend: clickhouse` in fyrnheim.yaml computes all
entity transformations on DuckDB (reading from local parquet files), then pushes the
resulting dim_*, analytics_*, and activity_* tables to a ClickHouse server. This
enables the architecture: DLT extracts to parquet on Hetzner, fyr run transforms
locally via DuckDB, results land in ClickHouse for querying. Without output_backend
configured, fyr run behaves exactly as today.
"""

user_progress = "From 'fyr run produces a local DuckDB file' to 'fyr run produces queryable tables in ClickHouse'"

