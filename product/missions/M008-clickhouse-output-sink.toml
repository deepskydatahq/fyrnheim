[notes]
considerations = """
ARCHITECTURE: DuckDB remains the compute engine. The push phase is a separate step
that runs after all entities have been computed and persisted in DuckDB. This is
critical because downstream entities (person, account) reference upstream dim tables
via conn.table('dim_transactions') during compute. The push copies final tables to
ClickHouse for serving/querying.

PUSH PHASE DESIGN: After the IbisExecutor context manager closes in run(), open a
second connection to the output backend. List tables in the DuckDB catalog, filter
to dim_*/analytics_*/activity_* prefixes, and for each table: read from DuckDB as
Arrow, create_table in ClickHouse with overwrite=True.

CLICKHOUSE SPECIFICS: MergeTree engine requires ORDER BY clause. Options:
1. Default to order_by=() (empty tuple — ClickHouse allows this)
2. Use ReplacingMergeTree for dim tables (natural for dimension tables)
3. Let users specify order_by in output_config (future enhancement)
Start with option 1 (simplest), can enhance later.

TABLE FILTERING: The DuckDB catalog after fyr run contains source_*, dim_*,
activity_*, analytics_*, and snapshot_* tables. Push phase should only push
dim_*, analytics_*, and activity_* tables. Source tables are raw data (already
in parquet). Snapshot tables are a future concern.

TESTING: Follow the BigQuery mock pattern from test_engine_connection.py.
Mock ibis.clickhouse.connect() and verify create_table calls. For push phase,
create a DuckDB with sample tables and mock the output connection.

CONFIG EXAMPLE (fyrnheim.yaml):
  backend: duckdb
  backend_config:
    db_path: timo.duckdb
  output_backend: clickhouse
  output_config:
    host: clickhouse.example.com
    port: 8123
    database: timo_analytics
    user: default
    password: ""

SEQUENCING for epic breakdown:
1. ClickHouse connection factory + extras (small, isolated)
2. Config: output_backend + output_config parsing (small, isolated)
3. Push phase in runner.py (core logic, depends on 1+2)
4. CLI output + RunResult updates (depends on 3)
5. Tests across all layers
"""
