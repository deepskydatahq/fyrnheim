# Mission: Entity Unit Testing via fyr test
# Let data engineers test entity transformations against fixtures with expected output assertions

id = "M015"
title = "Entity unit testing via fyr test"
status = "draft"
created = "2026-03-07"
depends_on = ["M002"]

[outcome]
description = """
`fyr test` discovers and runs entity-level unit tests. Each test defines sample input
data (CSV or inline), runs the entity pipeline on DuckDB, and asserts the output matches
expected results. Tests are defined as Python files in a tests/ directory alongside
entities, using a simple assert-based API. Exit code 0 = all pass, 1 = failures.
"""

user_progress = "From 'must run full pipeline to verify correctness' to 'test entity logic in isolation with fixtures and assertions'"

[testing]
approach = "agent-judgment"
criteria = [
    "fyr test discovers and runs test files from tests/ directory",
    "fyr test --entity <name> runs tests for a single entity",
    "Test fixture API: EntityTest class with given() for input data and expect() for assertions",
    "Input data can be inline dicts or CSV file paths",
    "Assertions compare output columns/rows against expected values",
    "Each test runs the entity pipeline on an ephemeral DuckDB instance",
    "Clear pass/fail output with diff on failure (expected vs actual)",
    "Exit code 0 when all tests pass, exit code 1 on any failure",
    "Example test file included in fyr init scaffold",
    "All existing tests still pass",
]

validator_context = [
    "src/fyrnheim/cli.py",
    "src/fyrnheim/engine/runner.py",
    "src/fyrnheim/engine/executor.py",
    "src/fyrnheim/core/entity.py",
]

[context]
related_docs = [
    "VISION.md",
    "VALUES.md",
]
relevant_paths = [
    "src/fyrnheim/cli.py",
