[notes]
considerations = """
Design direction: Keep it simple and Python-native. A test file looks like:

    # tests/test_customers.py
    from fyrnheim.testing import EntityTest

    class TestCustomers(EntityTest):
        entity = "customers"

        def test_basic_transform(self):
            self.given({
                "customers": [
                    {"id": 1, "name": "Alice", "email": "alice@example.com"},
                    {"id": 2, "name": "Bob", "email": "bob@example.com"},
                ]
            })
            result = self.run()
            assert result.row_count == 2
            assert "customer_id" in result.columns
            assert result.column("email_hash").not_null().all()

The testing module (fyrnheim.testing) provides:
- EntityTest base class with given/run/assert helpers
- Ephemeral DuckDB backend per test
- Result object with column access and assertion helpers

fyr test discovers test files, instantiates test classes, runs methods
prefixed with test_, and reports results. This is intentionally simpler
than pytest — it's domain-specific testing for entity definitions.

Epic sequencing:
- E001: Testing framework core (EntityTest, given/run, result object)
- E002: CLI command (fyr test, discovery, output formatting)
- E003: Scaffold and docs (example test in fyr init, README update)
"""
