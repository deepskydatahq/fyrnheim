id = "M040"
title = "Multi-source union pattern for non-identity data"
status = "resolved"
created = 2026-04-02

[outcome]
description = """
RESOLVED: UnionSource is NOT needed. The use case (combining LinkedIn posts +
Ghost newsletters + YouTube videos) is better served by treating each content
channel as a separate StateSource producing its own product activity stream.
Cross-channel analytics happen at the MetricsModel layer (see M042).

The insight: content items are products with their own identifiers. They
participate in the activities-first pipeline as product streams, parallel
to account streams. No union required.
"""

[scope]
in_scope = ["No implementation needed — resolved by architecture discussion"]
out_of_scope = []

