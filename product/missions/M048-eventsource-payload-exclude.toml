[scope]
in_scope = [
    "Add payload_exclude: list[str] (default empty) to EventSource Pydantic model",
    "Extend exclude_cols set in load_event_source with payload_exclude entries",
    "Unit test for the model field (default, accepts list, round-trips)",
    "Integration test for the loader confirming exclusion behavior",
