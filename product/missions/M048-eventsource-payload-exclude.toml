# Mission: EventSource payload_exclude
# Let users drop large nested columns from the JSON payload without a staging view

id = "M048"
title = "EventSource payload_exclude"
status = "draft"
created = 2026-04-08
depends_on = []

[outcome]
description = """
Add an optional payload_exclude field to EventSource that lists column names
to drop when packing the JSON payload. Today, after the array-serialization
fix, GA4-shaped sources load successfully but produce large opaque payload
blobs containing every REPEATED RECORD column (event_params, user_properties,
items). Users can already drop them by building a flattening view in the
warehouse, but the loader should support a one-line opt-out so a fresh
EventSource is usable against raw analytics exports without staging.

This is the natural follow-up to PR #81 (array serialization fix).
"""

user_progress = "From 'GA4 events load but produce 50KB opaque payloads' to 'one line on EventSource drops the noisy columns'"

[testing]
approach = "agent-judgment"
criteria = [
    "EventSource accepts an optional payload_exclude: list[str] field, defaulting to empty",
    "load_event_source honors payload_exclude: named columns do not appear in any row's payload JSON",
    "payload_exclude is additive to the existing entity_id_field / timestamp_field / event_type_field exclusions",
    "Excluding a non-existent column is a no-op (no error) — same forgiving behavior as the existing exclude logic",
    "Existing EventSource definitions without payload_exclude continue to work unchanged",
    "Unit test on the model accepts and round-trips payload_exclude",
    "Loader integration test verifies named columns are absent from packed payload, while other columns remain",
    "All existing tests continue to pass",
]

validator_context = [
    "src/fyrnheim/core/source.py",
    "src/fyrnheim/engine/event_source_loader.py",
    "tests/test_state_event_source.py",
    "tests/test_event_source_loader.py",
]

[context]
