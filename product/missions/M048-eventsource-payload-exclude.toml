]

[notes]
considerations = """
The change is small and surgical. The entire diff is roughly:

1. src/fyrnheim/core/source.py — add to EventSource:
       payload_exclude: list[str] = PydanticField(default_factory=list)

2. src/fyrnheim/engine/event_source_loader.py — after building exclude_cols:
       exclude_cols.update(event_source.payload_exclude)

3. Tests in test_state_event_source.py and test_event_source_loader.py.

Design decisions made during planning:
- Exclude-list, not allow-list: opt-in additive behavior is the safest default
  and keeps existing EventSources unchanged. An allow-list would force users
  to enumerate every column they want, which is brittle and easy to forget.
  We can add payload_columns later if a real use case appears.
- No schema validation: keep the loader forgiving — if a user lists a column
  that doesn't exist (typo, schema drift), the existing code path silently
  ignores it. We don't want a hard failure here because schemas evolve.
- No StateSource equivalent: StateSource flows through the diff engine, which
  emits field_changed events with field-level granularity rather than packing
  the whole row. The use case (drop noisy columns) doesn't apply the same way.

Single epic, single story. No dependencies. Probably 30 minutes of work.
"""
