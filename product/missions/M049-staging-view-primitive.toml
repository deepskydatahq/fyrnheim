[notes]
considerations = """
## Architecture grounding from Phase 2 exploration

**Discovery is the easiest part.** cli.py:99-177 `_discover_assets` walks
entities_dir/*.py and matches module-level instances against a `type_map` dict.
Adding StagingView is one line in that map plus a corresponding key in the
returned assets dict. The same loop handles deduplication by `name`.

**Executor is well-shaped for extension.** IbisExecutor at
src/fyrnheim/engine/executor.py:30-206 already has clean per-backend factory
dispatch (`duckdb()`, `bigquery()`, `clickhouse()`, `from_config()`). Adding
materialize_view/view_exists/drop_view as instance methods that branch on
`self.connection` backend type fits the existing pattern naturally — no
refactoring needed.

**Phase 0 inserts cleanly.** pipeline.py:41-150 `run_pipeline` has explicit
phases (sources → activities → identity → analytics → metrics). Phase 0
hooks in immediately after asset discovery, before line 71 (current source
loading). Sources with `upstream=` resolve their coordinates from the
materialized staging view at load time.

**State storage is greenfield.** No prior fyrnheim_state table, no .fyrnheim/
dir, no manifest concept exists. SnapshotStore writes parquets per source but
that's a different concern. We get to design fyrnheim_state from scratch:
recommend a single warehouse table with (name, hash, materialized_at,
sql_excerpt, fyrnheim_version) and a `--no-state` escape hatch for CI.

**jinja2 is a new dep.** pyproject.toml has no templating library today.
Adding jinja2 to core deps is a small but real ask. Alternative: simple
{name} substitution via str.format with a custom error wrapper. Recommend
jinja2 for future-proofing (conditionals, loops will inevitably be requested
once users have the primitive).

## Sequencing recommendation for epic breakdown

Five natural epics, mostly parallelizable after Epic 1:

1. **Epic 1: StagingView core + discovery** — staging_view.py module, type_map
   registration, validation, hashing, jinja2 sql_params rendering, unit tests
   for definition/hashing. Unblocks all other epics.

2. **Epic 2: Executor methods (BigQuery + DuckDB)** — materialize_view,
   view_exists, drop_view on IbisExecutor with both backends. Mockable tests
   for BigQuery (mirror test_executor.py:43-106 patterns), real in-memory
   duckdb smoke tests.

3. **Epic 3: Pipeline Phase 0 + state table** — topological sort, content-hash
   skip-when-unchanged, fyrnheim_state CRUD, --no-state flag. Depends on
   Epics 1 + 2.

4. **Epic 4: Source upstream= field** — additive change to BaseTableSource,
   resolution at source-load time, backward-compat tests. Can run in parallel
   with Epic 3.

5. **Epic 5: CLI subcommands + e2e** — fyr materialize, fyr drop, fyr list
   staging, end-to-end test where fyr run discovers a StagingView and a
   downstream source reads from it. Depends on Epics 3 + 4.

## Risk areas and mitigations

- **Topo sort + circular deps**: A StagingView depends_on another StagingView
  via name. Detect cycles and raise a clear error during Phase 0 sort.
- **Hash determinism with whitespace**: Normalize SQL (collapse runs of
  whitespace, strip trailing) before hashing so cosmetic edits don't trigger
  re-materialization. Document the normalization rule.
- **First-run write permission**: fyrnheim_state CREATE TABLE may fail in
  read-only environments. The --no-state flag is the escape hatch; document
  it in the error message when CREATE fails.
- **DuckDB fixture-skip surprise**: When a source has neither a duckdb_path
  fixture nor a duckdb-compatible SQL, Phase 0 must error clearly with a
  pointer to the fixture pattern. Don't silently skip and let downstream
  source loading fail with a confusing message.
- **Adjacent missions**: M020 (incremental-materialization), M025
  (derived-source-join-mode), M040 (multi-source-union-pattern) all touch
  nearby concepts. This mission deliberately stays out of their lanes —
  StagingView is the substrate they will eventually build on. Coordinate
  naming choices (StagingView vs Materialized vs DerivedSource) so M020 can
  add materialization='incremental' without an awkward rename.

## Naming decision pending

Proposal floats StagingView, Materialized, WarehouseView, DerivedSource. The
TOML uses StagingView as the working name. Worth a final call during Epic 1
implementation. StagingView reads naturally and matches dbt terminology
that target users will recognize. If we later add materialization='table',
the name still fits ("staging" is about pipeline position, not storage shape).
"""
