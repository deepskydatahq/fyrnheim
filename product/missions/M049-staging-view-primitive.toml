# Mission: StagingView Primitive
# First-class declaration of derived warehouse objects (views) that materialize before sources load.

id = "M049"
title = "StagingView Primitive for In-Warehouse Derived Sources"
status = "draft"
created = 2026-04-08
depends_on = []

[outcome]
description = """
Today Fyrnheim's StateSource and EventSource can only read tables that already exist
in the warehouse. Anything upstream — a GA4 flattening view, a unioned wildcard view,
a placeholder schema, a column projection — has to be built outside Fyrnheim with no
link back to the source that depends on it. Every real-world Fyrnheim project ends up
maintaining a parallel out-of-band setup script (e.g. scripts/setup_bigquery_views.py
in the client-flowable engagement) that drifts from the source definitions it feeds.

This mission introduces a StagingView primitive that declares a derived warehouse
object as a first-class part of the model. fyr run materializes staging views in a
new Phase 0 (before source loading) with content-hash idempotency, topological
ordering by depends_on, and a backend-agnostic abstraction sitting on the existing
IbisExecutor. Sources gain an optional upstream= field so they can resolve their
warehouse coordinates from a StagingView instead of declaring project/dataset/table
themselves.

After this mission, scripts/setup_bigquery_views.py and its equivalents in any
Fyrnheim project can be deleted: a fresh clone runs `uv sync && uv run fyr run` and
gets a working pipeline with no extra steps. v1 ships materialization="view" only
across BigQuery + DuckDB; incremental tables, sqlglot dialect translation, and a
Test primitive are explicit non-goals (deferred to future missions including M020).
"""

user_progress = "From 'maintain a parallel setup script per project to build the views my sources depend on' to 'declare a StagingView next to my source and fyr run materializes it idempotently'"

[testing]
approach = "agent-judgment"
criteria = [
    "StagingView class exists in src/fyrnheim/core/staging_view.py with required fields (name, project, dataset, sql) and optional fields (materialization, sql_params, depends_on, description, tags)",
    "StagingView is auto-discovered by cli.py _discover_assets via the type_map mechanism, identical to how StateSource/EventSource are discovered",
    "BaseTableSource accepts an optional upstream= field; when set, project/dataset/table are derived from the StagingView and become optional on the source",
    "IbisExecutor exposes materialize_view(project, dataset, name, sql), view_exists(project, dataset, name), and drop_view(project, dataset, name) methods",
    "BigQuery executor backend implements all three methods using CREATE OR REPLACE VIEW",
    "DuckDB executor backend implements all three methods (project arg ignored, dataset becomes a duckdb schema)",
    "pipeline.py run_pipeline gains a Phase 0 that discovers staging views, topologically sorts them by depends_on, computes a content hash per view (sql + params + materialization + dataset), skips unchanged views, and materializes changed ones",
    "Phase 0 is a no-op when a project declares zero StagingView instances (zero overhead, fully backward compatible)",
    "A fyrnheim_state table is created in the warehouse on first run, storing (name, hash, materialized_at, sql_excerpt) per managed object",
    "fyr run accepts --no-state flag that skips state lookup and always materializes",
    "On the duckdb backend, when a downstream source has a duckdb_path fixture, Phase 0 skips that source's StagingView (the fixture is the materialized result) and the run still succeeds — this is the documented v1 escape hatch",
    "fyr materialize subcommand runs only Phase 0 with no source loading; supports --view <name> to materialize a single view",
    "fyr drop --view <name> removes a managed view and its row from fyrnheim_state",
    "fyr list staging shows all StagingView instances with name, dataset, hash freshness",
    "sql field accepts both inline strings and pathlib.Path to a .sql file; sql_params dict is rendered into the SQL via jinja2 with clear errors on missing parameters",
    "tests/test_staging_view.py exists and covers: definition validation, deterministic hashing (whitespace-normalized), duckdb in-memory smoke test (CREATE VIEW + SELECT), source upstream= resolution (with and without), skip-when-unchanged on second materialize, topological order via depends_on, end-to-end fyr run discovering a StagingView and a downstream source reading from it",
    "All existing tests still pass (additive feature, no behavioral regressions for projects without StagingView instances)",
    "jinja2 added to pyproject.toml core dependencies",
    "Existing StateSource/EventSource definitions without upstream= continue to work unchanged",
]

