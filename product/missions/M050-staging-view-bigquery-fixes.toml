# Mission: StagingView v0.4.1 — BigQuery correctness + fixture-shadow contract
# Three blocker bugs and two polish items found during the first real-project
# adoption of StagingView on BigQuery (client-flowable / mission M004).

id = "M050"
title = "StagingView v0.4.1 BigQuery correctness + fixture-shadow fix"
status = "draft"
created = 2026-04-09
depends_on = ["M049"]

[outcome]
description = """
v0.4.0 shipped the StagingView primitive with the right shape but three real
bugs and two polish gaps that block any project using the suggested patterns
on BigQuery. This mission ships v0.4.1 with all five fixes.

Bugs:
1. `hash` is a reserved keyword in BigQuery DDL — _ensure_state_table, _load_state,
   _write_state_row all emit unquoted `hash`. First run fails with
   'Expected ")" or "," but got keyword HASH'. Fix: backtick-quote in all three.
2. _escape only handles single quotes; BigQuery rejects raw newlines, tabs,
   carriage returns, and backslashes in single-quoted literals. Any multi-line
   view excerpt crashes _write_state_row with 'Unclosed string literal'.
   Fix: extend _escape to cover \\\\, \\n, \\r, \\t (backslash first to avoid
   double-escape). Follow-up ticket for parameterized-query rewrite.
3. Fixture-shadow contract is doubly broken in pipeline.py Phase 0 setup:
   (a) compares source.name against view.name instead of source.upstream.name,
   and (b) applies the skip on every backend instead of only on duckdb.
   Projects where a view and its consuming source share a name silently drop
   the view on bigquery, then 404 on source loading. Fix: gate on backend ==
   'duckdb' AND compare against source.upstream.name.

Polish:
4. StagingView is not re-exported from fyrnheim or fyrnheim.core; users must
   import from fyrnheim.core.staging_view. Add re-export.
5. sql field accepts only str, not str | Path. v0.4.0 release note example
   used Path explicitly. Add field_validator mode='before' that reads Path.

After v0.4.1, the client-flowable M004 migration runs uv sync && uv run fyr run
--backend bigquery end-to-end with no local patches: cold run materializes 6
views, warm run reports 0 materialized + 6 skipped via the state cache.
"""

user_progress = "From 'StagingView works on duckdb but needs 5 local patches for BigQuery' to 'fresh install runs end-to-end on BigQuery with no modifications'"

[testing]
approach = "agent-judgment"
criteria = [
    "_ensure_state_table emits `hash` (backtick-quoted) on the bigquery branch; duckdb branch unchanged",
    "_load_state SELECT uses `hash` backtick-quoted on the bigquery branch",
    "_write_state_row INSERT uses `hash` backtick-quoted on the bigquery branch",
    "Unit test verifies the bigquery state-table DDL string contains `hash` and no unquoted ' hash ' occurrence",
    "_escape escapes backslash first, then single quote, newline, carriage return, and tab — order matters so other replacements' added backslashes don't get re-escaped",
    "Unit test: _escape('WITH base AS (\\n  SELECT 1,\\n  \\'(not set)\\'\\n)') contains no literal newline and properly doubles the single quotes",
    "End-to-end test: materialize a StagingView whose rendered SQL contains newlines, tabs, backslashes, AND single quotes on duckdb; state row is written and readable via _load_state",
    "pipeline.py Phase 0 setup: fixture_names set is built only when config.backend == 'duckdb'",
    "pipeline.py Phase 0 setup: fixture_names is populated from source.upstream.name (when upstream is not None AND source has non-None duckdb_path), not from source.name",
    "Test: a StagingView named 'salesforce_accounts' feeding a StateSource(name='salesforce_accounts', upstream=that_view, duckdb_path='sf.parquet') is materialized (not shadow-skipped) when backend is bigquery",
    "Test: on duckdb backend, a source whose name coincidentally equals an UNRELATED view's name does NOT cause that view to be shadowed; only the view matching the source's upstream is shadowed",
    "Test: happy path — on duckdb, source with duckdb_path and upstream=view causes view to be shadow-skipped (v0.4.0 behavior preserved for correct case)",
    "StagingView importable as `from fyrnheim import StagingView` (re-exported from src/fyrnheim/__init__.py and added to __all__)",
    "StagingView.sql field accepts pathlib.Path via a field_validator(mode='before') that calls v.read_text() when v is a Path; inline str still works",
    "Test: StagingView(name='v', project='p', dataset='d', sql=Path('/tmp/view.sql')) reads the file and stores the string",
    "All existing tests still pass (414 -> 414+ new); ruff + mypy clean",
    "pyproject.toml version bumped to 0.4.1",
]

