[notes]
considerations = """
## Source material
Full paste-ready bug report from the client-flowable M004 migration is the
authoritative spec for this mission. It includes reproduction steps, exact
error strings, proposed fixes with code snippets, and test skeletons for each
of the five items. Implementation should mirror the report closely — the
reporter has already validated the fixes locally and round-tripped the whole
flow on BigQuery.

## Sequencing within the single epic
Report-recommended order (each builds on green tests):
1. Polish 2 (sql Path support) — no risk, and makes Bug 3 tests cleaner
2. Bug 1 (hash quoting) — three edits, unblocks BigQuery first run
3. Bug 2 minimal (_escape extension) — unblocks first state row write
4. Bug 3 (fixture-shadow gate + upstream.name) — ~10 lines in pipeline.py
5. Polish 1 (StagingView re-export) — last, so new tests use the top-level import

## Risk areas
- Order in _escape: backslash replacement MUST come first. Test with a payload
  that contains both backslash and newline to catch accidental double-escape.
- Bug 3 pipeline.py edit is the most invasive. The runner side (materialize_staging_views)
  already does the right thing given a correct fixture_names set — don't touch it.
- Re-export ordering: add StagingView to __all__ alphabetically to match the
  existing convention in src/fyrnheim/__init__.py.

## Release shape
Bugfix release, no feature flags. Version bumps 0.4.0 -> 0.4.1. Ships via
release PR per the project's release-flow convention (no direct pushes to main).
"""
