[notes]
considerations = """
## Source of truth

Four GitHub issues — deepskydatahq/fyrnheim#91, #92, #93, #94 — contain the
full reproduction, root cause, and proposed fix for each bug. Those issues
are the authoritative spec. Close them on merge with 'Fixes #91 #92 #93 #94'
in the release PR body.

## Implementation is partially done

The patches for #91, #92, #93, #94 are already applied in the user's primary
worktree as uncommitted local modifications — validated against real
client-flowable M006 data. The diff is saved at /tmp/m051-local-patches.diff
(3 files, 108 lines). The agent's first job is to transfer these to an
isolated branch via `git apply`, then layer the additional
event_source_loader fix and the regression tests on top.

## event_source_loader alignment

event_source_loader.py has its own _serialize_value with the same "null"
string pattern plus an array-handling branch for BigQuery REPEATED fields.
Align with diff_engine (return None for NaN, preserve primitives, str() for
exotic types) but KEEP the array-handling branch intact — that branch is
the v0.3.0 fix for BigQuery REPEATED columns and is load-bearing.

Return type changes from `-> str` to `-> object`. The caller immediately
wraps the result in `json.dumps(payload)` which handles all JSON-native
Python types, so no callers need updating.

## Test fixture patterns

Existing tests in tests/test_identity_engine.py, tests/test_diff_engine.py,
tests/test_analytics_entity.py, and tests/test_event_source_loader.py are
the pattern templates. Reuse ibis.memtable + pandas DataFrame fixture shapes
that already exist in those files rather than inventing new harnesses.

## Release shape

Bugfix release. Version 0.4.1 -> 0.4.2. Release-PR flow per the memory:
release/v0.4.2 branch → PR → green CI → merge → tag → publish.
"""
