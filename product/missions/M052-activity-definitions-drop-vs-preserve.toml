# Mission: apply_activity_definitions drop-vs-preserve semantics
# Design mission — decide the contract, don't implement yet.

id = "M052"
title = "Design: apply_activity_definitions drop-vs-preserve semantics"
status = "draft"
created = 2026-04-09
depends_on = []

[outcome]
description = """
`apply_activity_definitions` in `src/fyrnheim/engine/activity_engine.py`
currently returns ONLY events matched by at least one ActivityDefinition,
dropping every other event from the stream. This is confirmed at
activity_engine.py:43-61 — the function builds `all_matched` from per-
definition matches and returns just that, never unioning with the raw input.

This contract has a silent, load-bearing consequence for any project that
mixes ActivityDefinitions with state fields on an AnalyticsEntity: events
from sources with no matching definition vanish in Phase 2, so Phase 4 state
field projection never sees them. The client-flowable M006 mission hit this
and worked around it by adding a no-op pass-through ActivityDefinition per
source just to keep the events alive. That workaround is the direct cause of
bug #94 (since fixed in v0.4.2): the pass-through rewrites event_type from
`row_appeared` to the activity name, which the state-field projection then
didn't know how to read.

v0.4.2 fixed the projection-side symptom, but the underlying contract
question is unresolved: should Phase 2 DROP unmatched events (current
behavior, requires passthrough workaround) or PRESERVE them (union of
matched + unmatched, passthrough unneeded)? Both have trade-offs. This
mission is a DESIGN mission — decide the contract, write it up, then file
a follow-up implementation mission if the decision is to change.

Out of scope: any code changes. This mission produces a decision doc, not
a patch.
"""

user_progress = "From 'users must add no-op passthrough activities to keep events alive for state fields' to 'the contract is explicit and documented, and passthrough is either unnecessary or the recommended idiom'"

[testing]
approach = "agent-judgment"
criteria = [
    "A decision doc lives somewhere in the repo (e.g. docs/decisions/ or as an ADR) capturing: (a) the current behavior at activity_engine.py:43-61, (b) the two options with pros/cons, (c) the chosen option, (d) the rationale",
    "The chosen option is one of: DROP (keep current), PRESERVE (union matched + unmatched), or HYBRID (e.g. preserve by default, drop on explicit opt-in)",
    "If the chosen option differs from current behavior, a follow-up implementation mission is filed (M053 or later) with the scope of the change",
    "If the chosen option IS to keep current behavior, the 'passthrough activity' idiom is documented as the recommended pattern (with a note about the v0.4.2 fix that made it safe)",
    "The activity_engine.py module docstring or function docstring is updated to explicitly state the semantics",
]

validator_context = [
    "src/fyrnheim/engine/activity_engine.py",
    "docs/",
    "product/missions/",
]

[context]
related_docs = ["VISION.md", "VALUES.md"]
relevant_paths = [
    "src/fyrnheim/engine/activity_engine.py",
    "src/fyrnheim/engine/pipeline.py",
    "src/fyrnheim/engine/analytics_entity_engine.py",
]

[scope]
in_scope = [
    "Analyze the current behavior end-to-end (Phase 2 through Phase 4)",
    "Enumerate the trade-offs of DROP vs PRESERVE vs HYBRID",
    "Survey existing user-facing docs and examples for implicit assumptions about the contract",
    "Make a decision and document it",
    "Update activity_engine docstrings to state the chosen semantics",
    "File a follow-up implementation mission if the decision changes behavior",
]
out_of_scope = [
    "Any code changes to activity_engine.py beyond docstring updates",
    "Any code changes to pipeline.py",
    "Implementing the chosen behavior (that's a follow-up mission, if needed)",
    "Benchmarking or performance analysis (this is a semantics question, not a performance one)",
]
acceptable_breakage = [
