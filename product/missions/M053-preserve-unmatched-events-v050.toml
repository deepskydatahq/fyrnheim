[notes]
considerations = """
## Authoritative spec

docs/decisions/0001-activity-definitions-drop-vs-preserve.md is the full
decision document. It contains:
- Precise new rule (the d1 quote)
- Alternatives considered and rejection rationale
- Consequences and migration story
- Implementation sketch (high-level, not prescriptive)
- Testing strategy with specific test names and shapes

Any ambiguity during implementation should be resolved by rereading the ADR.
Do not add scope beyond what the ADR and this mission TOML specify.

## Implementation approach

Surgically localized to the outer loop of apply_activity_definitions. Track
which raw event indices were matched during the per-definition loop; after
the loop, append rows for indices that were never matched. Preserve the
empty-input memtable schema path. Do not modify _apply_single_definition.

## Why this is safe to ship as one commit

Phase 3 and Phase 4 consumers were already made flexible in v0.4.2:
- resolve_identities (identity_engine.py) uses `!= 'field_changed'` mask (#92)
- _extract_field_value (analytics_entity_engine.py) handles arbitrary
  event_type with flat-dict payloads (#94)
- _serialize_value (diff_engine.py + event_source_loader.py) handles nulls
  correctly (#93)

The only code that needs to change for d1 semantics is apply_activity_definitions
itself. Every downstream consumer already handles what this change produces.

## Release shape

Bugfix-shaped mission but with a minor version bump due to the semantic
change. Release-PR flow per the release-flow memory:
release/v0.5.0 branch -> PR -> green CI -> merge -> tag -> publish.

Issue #100 (EventOccurred typo in customers.py) is folded in because it's
a one-line fix to a file we're already touching and blocks the canonical
example from loading at all.
"""
