# Mission: Implement ADR-0001 — preserve unmatched events in Phase 2 (v0.5.0)
# Breaking change implementing the decision from M052 / ADR-0001.

id = "M053"
title = "v0.5.0 — preserve unmatched events in apply_activity_definitions"
status = "draft"
created = 2026-04-09
depends_on = ["M052"]

[outcome]
description = """
Implement ADR-0001 (docs/decisions/0001-activity-definitions-drop-vs-preserve.md).
Change apply_activity_definitions in src/fyrnheim/engine/activity_engine.py to
preserve unmatched events (d1 semantics): activities annotate where they apply,
and every raw event that no definition matched passes through unchanged.

Ships as a breaking change in v0.5.0. The change is surgically localized to
the outer loop of apply_activity_definitions plus a docstring rewrite; Phase 3
(resolve_identities) and Phase 4 (_extract_field_value) were already fixed in
v0.4.2 to handle mixed event_type streams, so no downstream consumer changes
are needed.

After this mission:
- The flagship examples/entities/customers.py example works correctly without
  modification: state fields on email, name, first_seen see field_changed
  events and strategy='latest' returns actual latest values (currently
  returns stale at-signup values, silent wrong answer).
- Mixed ActivityDefinition + StateField projects on the same source work
  with no workaround. The no-op passthrough idiom becomes unnecessary.
- One existing test is updated to assert the new contract.

Also includes the small fix from issue #100: the EventOccurred typo in
customers.py (event_types plural -> event_type singular) so the example
actually loads.
"""

user_progress = "From 'mixed activity + state-field projects silently drop events and produce stale state fields' to 'mixed projects just work; activities annotate and unmatched events flow through'"

[testing]
approach = "agent-judgment"
criteria = [
    "apply_activity_definitions preserves unmatched events: for each raw event matched by zero ActivityDefinitions, the raw event appears unchanged in the output (same source, entity_id, ts, event_type, payload)",
    "apply_activity_definitions preserves current multi-match behavior: a raw event matched by N definitions still produces N output rows with the respective activity names",
    "apply_activity_definitions: matched events do NOT also appear in raw form (d1 not d2 — no duplication for matched rows)",
    "apply_activity_definitions: empty input still returns an empty memtable with the correct schema",
    "Pass-through event_type and payload are byte-identical to the input (not filtered through include_fields on any definition)",
    "New unit test test_unmatched_events_pass_through: 3 raw events, 1 matches a definition, 2 don't → output is 1 renamed + 2 raw",
    "New unit test test_unmatched_events_preserve_original_event_type: pass-through rows keep their original event_type string (row_appeared, field_changed, arbitrary EventSource types)",
    "New unit test test_unmatched_events_preserve_original_payload: pass-through payload is byte-identical to input",
    "New unit test test_mixed_matched_unmatched_in_same_source: same source has both matched and unmatched events; both appear correctly",
    "Updated existing test test_does_not_match_other_sources: assertion changed from len(result) == 0 to len(result) == 1 (the pass-through row) with a comment referencing ADR-0001",
    "New e2e regression test test_e2e_customers_example_state_fields_stay_fresh: mirrors customers.py; a row_appeared + a field_changed on email, signup activity on RowAppeared, StateField email strategy='latest'; asserts resolved email equals the post-field_changed value (fails on main, passes after change)",
    "examples/entities/customers.py: fix EventOccurred(event_types=['purchase']) -> EventOccurred(event_type='purchase') (issue #100)",
    "apply_activity_definitions docstring rewritten to state the new contract explicitly",
    "Version bump 0.4.2 -> 0.5.0; uv.lock updated",
    "Release notes entry titled 'Breaking: activity definitions now preserve unmatched events' with the three-line migration guide from ADR-0001",
    "All existing tests pass (minus the one intentionally updated); ruff + mypy clean",
    "PR body references ADR-0001 and issue #100",
]

