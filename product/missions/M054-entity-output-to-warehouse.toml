[notes]
considerations = """
## Authoritative source

GitHub issue #99 (https://github.com/deepskydatahq/fyrnheim/issues/99) is
the full context: concrete use case (client-flowable Looker Studio
dashboards), three suggested shapes with trade-offs, expected behaviors,
and the why-Fyrnheim-not-per-project-script argument. The reporter has
already validated the need against real BigQuery data in the client-flowable
engagement.

## Option choice: C (materialization primitive on the entity)

The issue suggested three shapes. This mission picks Option C —
materialization/project/dataset/table as first-class fields on
AnalyticsEntity — over Options A (global config field) and B (per-entity
output block).

### Why C over A
Option A (global output_target config) is the smallest API change but
doesn't scale: different entities routinely want to land in different
datasets (e.g. a sensitive entity in a PII-restricted dataset, public
entities in the marts dataset). Forcing a single global target means
projects either create multiple fyrnheim configs or accept the wrong
granularity. C handles both the simple case (all entities to one dataset,
via per-entity config with the same values) and the granular case naturally.

### Why C over B
Option B (per-entity output=BigQueryOutput(...) block) is cleaner in some
ways but introduces a new primitive type (BigQueryOutput, DuckDBOutput, ...)
when the existing StagingView primitive already models exactly the same
shape with flat project/dataset/name fields. Matching StagingView's
conventions means less for users to learn.

### Why C over both
Option C makes entity outputs first-class warehouse artifacts the same way
staging views are. This sets up the follow-up feature — entity outputs
being inputs to other entities (upstream=sessions on an enriched_sessions
entity) — as a natural additive change rather than a primitive rewrite.
The issue's own "out of scope" section flags this as future work.

### Global default still possible later
A pipeline-level "default_output_dataset" in fyrnheim.yaml can be added
later as a convenience (filling in any entity's unspecified project/dataset).
That's Option A bolted on top of C, not in conflict with it. Defer until
someone asks.

## Implementation sketch (non-prescriptive)

1. **Primitive changes (src/fyrnheim/core/analytics_entity.py + metrics_model.py)**
   Add optional materialization (Literal, default 'parquet'), project, dataset,
   table. Add @model_validator(mode='after') that requires project+dataset when
   materialization='table'. table defaults to self.name.

2. **Executor (src/fyrnheim/engine/executor.py)**
   New method write_table(self, project, dataset, name, df). Branch on
   self.connection.name the same way materialize_view does.
   - duckdb: self.connection.create_table(name, df, database=dataset, overwrite=True)
     or raw_sql(CREATE SCHEMA IF NOT EXISTS + CREATE OR REPLACE TABLE AS SELECT *
     FROM registered df)
   - bigquery: get the underlying google.cloud.bigquery.Client from the ibis
     connection, construct LoadJobConfig(write_disposition=WRITE_TRUNCATE),
     call client.load_table_from_dataframe(df, fqn, job_config=...).result()
   - clickhouse/postgres: raise NotImplementedError with the same message
     pattern materialize_view uses

3. **Pipeline dispatch (src/fyrnheim/engine/pipeline.py lines 150-172)**
   Before calling df.to_parquet, check ae.materialization. If 'table', call
   executor.write_table(ae.project, ae.dataset, ae.table or ae.name, df)
   and skip the parquet write (or write both, if we want a local copy for
   debugging — decide during implementation). Same for metrics models.

4. **Run summary**
   result.outputs is currently a dict[str, int] (name → row count). Add a
   parallel result.output_destinations: dict[str, str] (name → 'parquet:...' or
   'bigquery:project.dataset.table'). Print in the CLI summary.

5. **Tests**
   - tests/test_analytics_entity.py: new validator tests (materialization='table'
     requires project+dataset; table defaults to name)
   - tests/test_executor.py: new TestWriteTable class with duckdb in-memory smoke
     test + mocked bigquery test
   - tests/test_e2e_entity_output.py (new): end-to-end pipeline with one
     AnalyticsEntity(materialization='table') on duckdb; assert the table
     exists and is queryable post-run

## Sequencing within the single epic

Three logical chunks that could be one story or split by file:
1. Primitive + validator changes (core/analytics_entity.py, core/metrics_model.py, tests)
2. Executor write_table method (engine/executor.py, tests)
3. Pipeline dispatch + run summary (engine/pipeline.py, tests, e2e)

Small enough to bundle into one story. Recommend single-story shape.

## Release shape

Additive feature in v0.6.0 (not a bugfix). No breaking changes. Default
parquet behavior preserved. Release-PR flow per the saved memory.

## Separately: issue #98

GitHub issue #98 reports a bug in the v0.4.1 _escape fix: BigQuery's
standard SQL doesn't accept SQL-standard quote-doubling ('' for ') inside
some contexts — it requires backslash escaping (\\'). This is a correctness
bug on code we just shipped. Worth a separate small mission (M055?) rather
than folding into M054, because the fix is independent and should ship in
a v0.5.1 patch rather than waiting for v0.6.0. Flagged here so it doesn't
get lost.
"""
