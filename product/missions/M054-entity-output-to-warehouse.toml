# Mission: Write AnalyticsEntity (and MetricsModel) outputs to the active backend
# Close the "outputs only on operator's laptop" gap for warehouse-backed projects.

id = "M054"
title = "Write AnalyticsEntity outputs back to the warehouse"
status = "draft"
created = 2026-04-09
depends_on = ["M049"]

[outcome]
description = """
Today pipeline.py lines 150-172 write every AnalyticsEntity and MetricsModel
output to a local parquet file at config.output_dir/<name>.parquet, regardless
of the active backend. For any project running against a warehouse, this
leaves a real gap: inputs (sources, staging views) live in the warehouse, the
pipeline reads from the warehouse, but outputs end up only on the operator's
local filesystem. Downstream consumers (Looker Studio, BigQuery ad-hoc,
anyone who isn't the operator) can't see materialized entities without the
operator re-running locally and uploading by hand.

Issue #99 surfaced this during the client-flowable M008 mission, where the
workaround is a 50-line scripts/upload_marts.py that uploads each generated
parquet to a flowable_marts BigQuery dataset. That script is the kind of
boilerplate every Fyrnheim project running against a warehouse will end up
writing — which is the signal that it belongs upstream.

This mission adds warehouse-output support to AnalyticsEntity and MetricsModel
following the same shape StagingView already uses for its inputs: entities
gain optional materialization/project/dataset/table fields, and when set,
pipeline Phase 4 dispatches to a new IbisExecutor.write_table method instead
of the local parquet path. Backends supported in v1: BigQuery and DuckDB,
matching the StagingView matrix. Default behavior (unset materialization)
preserves exact current semantics — zero impact on existing projects.

This is the architectural choice that mirrors StagingView (reporter's
"Option C") rather than a global config-only flip ("Option A") or a per-entity
output block ("Option B"). Rationale captured below.
"""

user_progress = "From 'my pipeline reads from BigQuery but my materialized entities only exist on my laptop' to 'fyr run --backend bigquery populates <project>.<dataset>.sessions automatically, and Looker Studio can see it without me'"

