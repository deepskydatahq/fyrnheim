[notes]
considerations = """
## Authoritative source

GitHub issue #98 — https://github.com/deepskydatahq/fyrnheim/issues/98 —
has the full bug report, root cause, reproduction, and BigQuery minimal
reproducer. Fix is pre-validated against real client-flowable M007 data
(the reporter worked around it by rewriting the comment to avoid single
quotes; the test suite here codifies the original failing case as a
regression guard).

## The fix

Two options:

**Option 1 (minimal):** change `_escape` to take a `backend: str` argument
and branch the single-quote replacement:

```python
def _escape(value: str, backend: str) -> str:
    value = value.replace("\\\\", "\\\\\\\\")  # backslash FIRST
    if backend == "bigquery":
        value = value.replace("'", "\\\\'")  # backslash escape
    else:
        value = value.replace("'", "''")     # SQL standard
    return (
        value.replace("\\n", "\\\\n")
        .replace("\\r", "\\\\r")
        .replace("\\t", "\\\\t")
    )
```

Caller in `_write_state_row` passes `executor.connection.name` as the
backend argument. Tests exercise both branches.

**Option 2 (also acceptable):** always use backslash escape (BigQuery
and DuckDB both accept it, if verified). Simpler, no branch. Before
choosing this path, verify DuckDB accepts backslash escape in its SQL
string literals by running a small check locally — the issue report
doesn't confirm this. If DuckDB accepts backslash, Option 2 is cleaner.
If not, Option 1 is correct.

**Recommendation:** start with Option 1 (known-safe). If the implementer
verifies DuckDB accepts backslash during the first read, switch to
Option 2 for simplicity. Either is acceptable.

## Order matters

Whatever the implementation, the backslash-to-double-backslash step must
happen BEFORE the single-quote replacement on any branch. Otherwise, the
`\\'` that Option 1 produces would be re-processed by the backslash step
and become `\\\\'` — broken. Test explicitly with a payload containing
both a backslash and a single quote (e.g. `"a\\\\b'c"`) to catch this.

## Separately: parameterized queries follow-up

The reporter's note at the end of #98 calls out the deeper issue:

> Inline string interpolation for SQL is fragile and the dialect-specific
> differences are exactly the kind of thing parameterized queries handle
> correctly out of the box.

This is true and is the right long-term fix. But it's bigger than a v0.5.1
patch — it touches `_write_state_row`, `_load_state`, and possibly
`_ensure_state_table`, changes the `raw_sql` calls to use each backend's
parameter binding mechanism, and would likely need a small abstraction over
the two backends' parameter shapes. File as M056 or later, target v0.6.0.

Do not fold into this patch. v0.5.1 should be the minimal correctness fix
and nothing more, so it can ship same-day as a bug report.

## Release shape

v0.5.1 patch. Release-PR flow per the saved memory:
release/v0.5.1 branch → PR → green CI → merge → tag → publish.
"""
