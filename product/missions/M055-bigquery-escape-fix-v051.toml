# Mission: v0.5.1 — BigQuery _escape backslash fix
# Fix the v0.4.1 _escape helper that silently produces malformed SQL on BigQuery
# when a StagingView's first 500 chars contain a single quote.

id = "M055"
title = "v0.5.1 — BigQuery _escape backslash fix"
status = "draft"
created = 2026-04-09
depends_on = ["M051"]

[outcome]
description = """
Fix the BigQuery quote-escaping bug in `_escape` reported as issue #98. The
v0.4.1 _escape fix added backslash/newline/tab/CR handling and used SQL
standard quote doubling (`'` → `''`) for single quotes. DuckDB accepts that;
BigQuery's standard SQL dialect does not — it requires backslash escaping
(`'` → `\\'`). When a StagingView's rendered SQL contains a single quote in
its first 500 characters (the sql_excerpt cutoff), `_write_state_row` builds
an INSERT with doubled quotes that BigQuery rejects:

    400 Syntax error: concatenated string literals must be separated by
    whitespace or comments at [1:N]

The worst part of the failure mode is that the CREATE OR REPLACE VIEW
SUCCEEDS before the state row write fails. Phase 0 reports "Materialized
StagingView 'X'" then aborts in the state write, and downstream sources
fail with 404 because the rollback path skipped state but the views did
materialize. The error message points at an INSERT Fyrnheim built, not at
the user's SQL, so the first instinct is to debug user code that's fine.

This mission ships the minimal backend-aware _escape fix in a v0.5.1 patch
release. The deeper parameterized-query rewrite (which would make this and
every future escape bug structurally impossible) is tracked as a separate
follow-up.

Latent since v0.4.0. Surfaced during client-flowable M007 when
sql/ga4_sessions.sql added a comment mentioning `CONCAT(user_pseudo_id,
'-', ga_session_id)` — a single quote at character ~118.
"""

user_progress = "From 'my StagingView materializes but Phase 0 aborts with a cryptic BigQuery string-literal error the moment my SQL has a single quote in the first 500 chars' to 'single quotes in StagingView SQL Just Work on BigQuery'"

