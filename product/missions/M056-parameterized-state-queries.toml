[notes]
considerations = """
## Why this matters

The `_escape` helper has been patched twice (v0.4.1 for backslash/newline/
tab/CR, v0.5.1 for BigQuery backslash-quote vs SQL doubling). Each patch
was a correct response to a real bug that surfaced in client-flowable
missions. But the underlying pattern — building SQL with f-strings and
escaping user values through a dialect-aware helper — is a treadmill. Every
new SQL-hostile character class is a new patch. Parameterized queries end
the treadmill: the backend's native parameter binding handles every case
correctly without Fyrnheim writing escape logic.

## The abstraction

Single new method on IbisExecutor:

```python
def execute_parameterized(
    self,
    sql: str,
    params: dict[str, Any],
) -> list[tuple[Any, ...]] | None:
    \"\"\"Execute a parameterized SQL statement on the active backend.

    The sql template uses @name placeholders (BigQuery-native style).
    On DuckDB, @name is converted to $name at execution time.

    params maps placeholder name (without the @) to the Python value.
    Native Python types (str, int, float, bool, datetime, None) are
    supported — no escaping required.

    Returns the result rows as a list of tuples for SELECT statements,
    or None for DDL/DML statements that don't produce rows.
    \"\"\"
```

### BigQuery implementation

```python
if self.connection.name == "bigquery":
    client = getattr(self._conn, "client", None) or getattr(self._conn, "_client", None)
    from google.cloud import bigquery as bq

    bq_params = [
        bq.ScalarQueryParameter(name, _infer_bq_type(value), value)
        for name, value in params.items()
    ]
    job = client.query(sql, job_config=bq.QueryJobConfig(query_parameters=bq_params))
    result = job.result()
    # result is a RowIterator; convert to list of tuples
    return [tuple(row.values()) for row in result] if result.total_rows else None
```

`_infer_bq_type` maps Python types to BigQuery param types:
- str → "STRING"
- int → "INT64"
- float → "FLOAT64"
- bool → "BOOL"
- datetime → "TIMESTAMP"
- None → ??? (BigQuery requires an explicit type even for NULL — take the type from a separate signature hint, or default to STRING if value is None; this is a v1 edge case)

### DuckDB implementation

```python
if self.connection.name == "duckdb":
    # Convert @name placeholders to $name (DuckDB native named params)
    import re
    duckdb_sql = re.sub(r"@(\\w+)", r"$\\1", sql)
    cursor = self._conn.con.execute(duckdb_sql, params)  # or self.connection.execute
    try:
        rows = cursor.fetchall()
    except Exception:
        rows = None
    return rows if rows else None
```

Verify the `@name` → `$name` conversion works by probing duckdb's execute
with a named-param query during implementation. If DuckDB doesn't support
named params in the Python client for the ibis-exposed connection, fall
back to converting to positional `?` placeholders with an ordered params
list. Document the path chosen in the PR body.

## Rewrites required

### _write_state_row (staging_runner.py)

Before (current):
```python
excerpt = view.rendered_sql[:500]
ts = datetime.now(UTC).strftime("%Y-%m-%d %H:%M:%S")
backend = executor.connection.name
name_s = _escape(view.name, backend)
hash_s = _escape(content_hash, backend)
excerpt_s = _escape(excerpt, backend)
version_s = _escape(_FYR_VERSION, backend)

executor.connection.raw_sql(
    f"DELETE FROM {qualified} WHERE name = '{name_s}'"
)
hash_col = "`hash`" if backend == "bigquery" else "hash"
executor.connection.raw_sql(
    f"INSERT INTO {qualified} "
    f"(name, {hash_col}, materialized_at, sql_excerpt, fyrnheim_version) VALUES ("
    f"'{name_s}', '{hash_s}', TIMESTAMP '{ts}', "
    f"'{excerpt_s}', '{version_s}')"
)
```

After:
```python
excerpt = view.rendered_sql[:500]
ts = datetime.now(UTC)  # pass as datetime, not string
backend = executor.connection.name
hash_col = "`hash`" if backend == "bigquery" else "hash"

executor.execute_parameterized(
    f"DELETE FROM {qualified} WHERE name = @name",
    {"name": view.name},
)
executor.execute_parameterized(
    f"INSERT INTO {qualified} "
    f"(name, {hash_col}, materialized_at, sql_excerpt, fyrnheim_version) "
    f"VALUES (@name, @hash, @ts, @excerpt, @version)",
    {
        "name": view.name,
        "hash": content_hash,
        "ts": ts,
        "excerpt": excerpt,
        "version": _FYR_VERSION,
    },
)
```

Note that {qualified} and {hash_col} are still f-string interpolated —
those are IDENTIFIERS, not values, and SQL parameters don't substitute
identifiers in any dialect. They come from trusted Fyrnheim code, not
user input, so interpolation is safe. The bug class we're eliminating is
VALUE interpolation, not identifier interpolation.

### _load_state (staging_runner.py)

Before:
```python
hash_col = "`hash`" if executor.connection.name == "bigquery" else "hash"
cursor = executor.connection.raw_sql(
    f"SELECT name, {hash_col} FROM {qualified}"
)
try:
    rows = list(cursor.fetchall())
except AttributeError:
    rows = list(cursor)
return {row[0]: row[1] for row in rows}
```

After:
```python
hash_col = "`hash`" if executor.connection.name == "bigquery" else "hash"
rows = executor.execute_parameterized(
    f"SELECT name, {hash_col} FROM {qualified}",
    {},  # no parameters
)
return {row[0]: row[1] for row in rows} if rows else {}
```

### fyr drop DELETE (cli.py)

Before: a direct raw_sql f-string with _escape(name).
After: executor.execute_parameterized("DELETE FROM ... WHERE name = @name", {"name": name}).

### Delete _escape

After the above rewrites, `_escape` has no callers in the codebase. Remove
the function from staging_runner.py entirely. Update any tests that
exercised _escape directly — they should be deleted or replaced with
execute_parameterized regression tests that cover the same character classes.

## Test rewrites

- Tests that tested `_escape` directly (test_escape_*): delete them, or
  convert to test_execute_parameterized_handles_<char_class> tests that
  exercise the same character classes through the new path.
- tests/test_executor.py: new TestExecuteParameterized class with duckdb
  in-memory tests + bigquery mocked tests.
- tests/test_staging_view.py: the BigQuery-branch regression tests for
  _write_state_row should still pass (they were asserting on the raw_sql
  string — they now need to assert on the execute_parameterized call shape
  instead, or be replaced with higher-level "write and read back" tests).

## Release shape

v0.6.1 maintenance release. No user-facing API changes. Internal refactor
that eliminates a class of latent bugs. Release-PR flow per the saved
memory.
