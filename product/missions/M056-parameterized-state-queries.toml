# Mission: Parameterized state-table queries
# Structural fix for the class of SQL escape bugs that #98 was an instance of.
# Rewrites _write_state_row / _load_state to use parameterized queries,
# deletes the _escape helper and its dialect quirks.

id = "M056"
title = "v0.6.1 — parameterized state-table queries (retire _escape)"
status = "draft"
created = 2026-04-09
depends_on = ["M055"]

[outcome]
description = """
`_write_state_row`, `_load_state`, and the `fyr drop --view` DELETE in cli.py
currently build SQL by inlining user-controlled values (view name, content
hash, rendered_sql excerpt, fyrnheim version, etc.) into f-strings and
escaping them through a backend-aware `_escape` helper. That helper has
already been patched twice:

- v0.4.1 added backslash/newline/tab/CR handling (bugs discovered during
  client-flowable M006)
- v0.5.1 made it backend-aware so BigQuery gets backslash-quote escape
  instead of SQL-standard doubling (#98, bug discovered during M007)

The reporter of #98 explicitly flagged this in the "Note on a related
concern" section: inline string interpolation for SQL is fragile, every
dialect has its own escape idiosyncrasies, and the right long-term fix is
parameterized queries. Both BigQuery and DuckDB support parameterized
queries natively — BigQuery via `ScalarQueryParameter` in a `QueryJobConfig`,
DuckDB via `$name` placeholders with a params dict.

This mission replaces every inline-interpolation + `_escape` site in the
state-table I/O path with a single backend-agnostic method on IbisExecutor:

    executor.execute_parameterized(sql_template, params) -> rows | None

The template uses `@name` placeholders (BigQuery-native). The method
translates for DuckDB (`@name` → `$name`) and passes the params dict through
to the backend's native parameter binding. `_escape` is deleted entirely.

This is an internal refactor — no user-facing API changes, no breaking
changes. The whole class of SQL escape bugs disappears structurally. Ships
as v0.6.1 (maintenance release) rather than v0.7.0 because nothing
user-visible changes.
"""

user_progress = "From '_escape has been patched twice and will get patched again the next time someone files a dialect quirk' to '_escape does not exist; SQL values are passed to the backend as typed parameters and the whole class of bugs is structurally impossible'"

