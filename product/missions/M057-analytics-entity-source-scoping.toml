# Mission: v0.6.2 — scope analytics-entity projection to the entity's own sources
# Correctness + performance bugfix in project_analytics_entity: the outer loop
# iterates every unique id in the global enriched-events stream, not only ids
# that actually have events relevant to the entity being projected.

id = "M057"
title = "v0.6.2 — scope analytics-entity projection to the entity's sources"
status = "draft"
created = 2026-04-17
depends_on = []

[outcome]
description = """
project_analytics_entity in src/fyrnheim/engine/analytics_entity_engine.py
currently receives the full enriched_events table (all sources concatenated)
and groups by every unique canonical_id / entity_id in that table. It emits
one row per unique id regardless of whether that id has any events relevant
to the entity being projected.

Observed symptom on the timo-data-stack pipeline: all 4 analytics entities
(accounts, anon_users, persons, sessions) each output 76,762 rows — the
global unique-id count — with most rows entirely NULL for the entity in
question. Full pipeline run takes ~14 minutes because the Python outer loop
iterates ~307k id×entity combinations, each doing DataFrame filtering; the
sessions entity with 22 state fields + measures is the worst offender.

After this mission: each AnalyticsEntity emits rows only for ids that have
at least one event from a source its state_fields reference OR an event
whose event_type matches one of its measures' activity names. Row counts
drop to the correct per-entity subset; the outer loop iterates a much
smaller id space; per-iteration filtering runs over a smaller df. Ships as
a patch release (v0.6.1 -> v0.6.2).

Note on the bug report's suggested fix: Measure has NO `source` attribute
(only name/activity/aggregation/field — see src/fyrnheim/core/analytics_entity.py).
Measures are matched to events via event_type == measure.activity. The
filter predicate must therefore combine (a) state_field sources, (b) coalesce
strategy `priority` source lists, and (c) measure activities matched against
event_type. The one-liner in the report (`{m.source for m in measures ...}`)
would always produce an empty set and is silently wrong.
"""

user_progress = "From 'every analytics entity emits one row per global unique id, mostly NULL, and a full run takes 14 min' to 'each entity emits rows only for ids with events relevant to it, and runs materially faster'"

