[notes]
considerations = """
## Source of truth

The bug is documented inline in the mission description and in the chat
thread that produced this TOML. There is no separate GitHub issue yet; open
one on mission kickoff and reference it in the release PR.

## Correct relevance predicate (important)

The bug report's suggested one-liner is:
  relevant_sources = {sf.source for sf in state_fields if sf.source}
  relevant_sources |= {m.source for m in measures if hasattr(m, 'source') and m.source}
  df = df[df["source"].isin(relevant_sources)]

This is WRONG in two ways:
  1. Measure has no `source` attribute — see src/fyrnheim/core/analytics_entity.py
     lines 11-23. Measures bind to events via `activity`, which is matched
     against event_type (see _compute_measure, engine/analytics_entity_engine.py:138).
     The `{m.source for m in measures ...}` set is always empty.
  2. StateField with strategy='coalesce' carries a `priority: list[str]` of
     source names; those sources are also relevant but are not in sf.source.

Correct predicate:

  relevant_sources: set[str] = set()
  for sf in analytics_entity.state_fields:
      if sf.strategy == "coalesce":
          relevant_sources.update(sf.priority or [])
      else:
          relevant_sources.add(sf.source)
  relevant_activities = {m.activity for m in analytics_entity.measures}

  mask = df["source"].isin(relevant_sources) | df["event_type"].isin(relevant_activities)
  df = df[mask]

Implementer: prefer this shape. If you diverge, document why in the PR body.

## Empty-after-filter path

The existing empty-input path at line 212-219 builds a DataFrame with the
correct columns when rows is empty. The filter can produce an empty df for
entities whose relevant sources / activities happen to not intersect the
stream; the existing empty path handles that correctly as long as we still
fall through to it when rows == []. Verify with the empty-after-filter test.

## Computed fields

computed_fields (lines 222-230) apply result_df.apply over the projected rows.
Unaffected by the filter — they run after the loop. The empty-after-filter
test must still assert computed-field columns appear in the output schema.

## Why no vectorization in this mission

Replacing the Python for-loop with pandas groupby is the larger perf win but
also the riskier change (strategy='latest'/'first' over arbitrary payloads,
coalesce across sources, activity-type-filtered measures — each needs its
own vectorized form). Shipping correctness first lets us measure the actual
post-filter runtime before deciding whether vectorization is still worth the
risk.

## Release shape

Patch release. 0.6.1 -> 0.6.2. Release-PR flow per the release-flow memory:
release/v0.6.2 branch -> PR -> green CI -> merge -> tag -> publish.
"""
