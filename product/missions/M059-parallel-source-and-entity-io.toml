[notes]
considerations = """
## Why threads, not asyncio

Ibis backends and the BigQuery Python client are synchronous APIs. Making
them async would require either an async rewrite of Ibis (out of scope) or
wrapping every call in `asyncio.to_thread`, which is strictly more complex
than a ThreadPoolExecutor for the same win. We're I/O-bound on socket
round-trips; the GIL does not get in the way. Threads are the right tool.

## Why bounded workers

BigQuery slot quotas are real. An unbounded pool on a pipeline with 50
sources would happily open 50 concurrent load jobs. Default
`max_parallel_io=4` keeps small projects safe; users on big slots can bump
it via config or `--max-parallel-io`. Document this in the CLI --help text.

## Ordering guarantee for source loads

`event_tables` ordering matters: `_concat_tables` (pipeline.py:129) preserves
input order, and downstream phases may implicitly rely on deterministic
row order for debug output. Use `executor.map()` or collect futures in a
list and iterate in submission order — do NOT use `as_completed()` for
source loads.

## Projection sequentiality in phase 4

We are deliberately NOT parallelizing the projection step of phase 4 in
this mission — only the write step. The projection is CPU-bound Python
(`project_analytics_entity`), and the for-loop over group_ids is the M060
concern. Parallelizing projection too would multiply GIL contention and
muddy M060's before/after comparison. Keep them orthogonal.

## Thread-safety of IbisExecutor

The single `self._conn` backend on IbisExecutor may or may not be
thread-safe depending on backend. Verify during implementation:
- DuckDB: `duckdb.DuckDBPyConnection` is NOT thread-safe; each thread needs
  its own cursor or a lock around calls.
- BigQuery: `google.cloud.bigquery.Client` IS thread-safe per Google's
  docs; multiple threads can submit jobs concurrently.

If DuckDB becomes a problem, either serialize DuckDB writes (only parallelize
BQ) or add a per-backend lock. Prefer the simplest option that ships.

## Interaction with M057 / v0.6.2

Unrelated. M057 shrunk the per-entity iteration space; M059 shrinks the
total wall time of the surrounding I/O phases. Compose cleanly.

## Release shape

Minor bump candidate (0.6.x -> 0.7.0) when bundled with M058 + M060.
Release-PR flow per the release-flow memory.
