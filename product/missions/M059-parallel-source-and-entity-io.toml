# Mission: Parallel source loads + parallel entity writes
# Two cheap, orthogonal I/O speedups in the pipeline: source loading and
# entity/metrics writes are independent per item but run serially today.

id = "M059"
title = "Parallel source loads + parallel entity/metrics writes"
status = "draft"
created = 2026-04-18
depends_on = []

[outcome]
description = """
`run_pipeline()` in src/fyrnheim/engine/pipeline.py does two independent I/O
loops serially where every item in each loop is independent of every other:

1. **Source loading (pipeline.py:106-122).** Each source (StateSource or
   EventSource) is loaded one at a time. EventSource load = Ibis table read
   + client-side `.execute()` + Python row iteration; StateSource load = 1-2
   Ibis queries + snapshot-diff computation. On the timo-data-stack pipeline
   there are 9 sources; each round-trips BigQuery 2-5 times. They share no
   state during load — every output is a separate event table appended to
   `event_tables[]`.

2. **Entity + metrics writes (pipeline.py:154-179 and 182-207).** Each
   AnalyticsEntity and MetricsModel is projected then written serially.
   `executor.write_table()` (executor.py:248-286) blocks on
   `client.load_table_from_dataframe(...).result()` for BigQuery — i.e. the
   whole job round-trip per entity, in series. 4 analytics entities × blocking
   BQ load jobs is a material chunk of wall time on the observed pipeline.

This mission parallelizes both loops using `concurrent.futures.ThreadPoolExecutor`
(I/O-bound workloads; the underlying Ibis / BigQuery clients are thread-safe
per-call but not async-native). The max-worker count is configurable via
existing config (a new `ResolvedConfig.max_parallel_io` field, defaulting to
a conservative value — e.g. 4 — to avoid hammering BigQuery slots on small
projects).

Ordering is preserved where it matters: source loads populate `event_tables`
in the same order as they appear in `config.sources` (we collect futures in
order and resolve them in order). Entity and metrics writes within their
phase are independent — order of completion is irrelevant.

No change to correctness. No change to public API beyond the new config
field. No change to `project_analytics_entity` or any compute path. This is
a dispatching refactor, measured by M058's timing harness.
"""

user_progress = "From 'nine source loads and four entity writes happen strictly serially, each blocking on one BigQuery round-trip at a time' to 'independent I/O fans out to a bounded thread pool; full-pipeline wall time drops proportionally to the slowest item in each phase'"

