[notes]
considerations = """
## Why this mission depends on M058

The whole value of this refactor is 'the backend does the work'. Without
M058's timings we can't show that the work actually moved — we only have
the invariant that correctness is preserved. M058's per-entity project_s
plus the M057 row-count context together form the before/after story in
the PR body.

## Why this mission is not bundled with M059

Different axes of speedup, different risk profiles. M059 is a dispatching
refactor with no compute logic changes; M060 rewrites the core compute
logic. Bundling would make PR review much harder and entangle the blast
radii. Ship them independently against the M058 harness; the release
mission (v0.7.0 candidate) bundles them at tag time.

## Risk map

1. **JSON extraction portability.** Ibis exposes JSON operations but
   backend support varies. BigQuery has `JSON_VALUE` (scalar) vs
   `JSON_EXTRACT` (JSON subtree); DuckDB has `json_extract_string`. Ibis's
   abstraction works but has edge cases around NULLs and missing keys.
   Prototype this FIRST — a 30-minute spike confirming the JSON pattern
   works on both backends before committing to the full rewrite.

2. **field_changed event shape.** The conditional inside the aggregation
   is the trickiest part. Approach: compute a derived `resolved_value`
   column per event (CASE WHEN event_type='field_changed' AND
   payload.field_name = <target> THEN payload.new_value ELSE
   payload.<target> END), then aggregate over that. This keeps the
   per-event branching linear and aggregation-friendly.

3. **`latest` with NULLs.** `_resolve_latest` returns the most recent
   *non-null* extract, not the most recent event's extract. The Ibis
   shape needs to filter NULLs before taking the argmax-by-ts, or use a
   window function `FIRST_VALUE(... ORDER BY ts DESC) OVER (...)` with a
   WHERE on non-null. Don't accidentally return NULL when a non-null
   exists further back in time.

4. **Coalesce ordering.** The priority list must be iterated in declared
   order, not in source.unique() order. Implement as nested `coalesce(
   latest_from(source[0]), latest_from(source[1]), ... )`.

5. **Memtable-to-memtable tests.** Existing tests use `ibis.memtable` from
   pandas DataFrames as input. Ibis supports groupby + agg on memtables
   via the duckdb default backend — verify this works in-test; if it
   doesn't, tests may need a per-test duckdb instance. The existing
   project_analytics_entity test pattern in
   tests/test_analytics_entity_engine.py should inform the harness.

## Computed-fields strategy

Keep them in Python for now. The projection already aggregates to one row
per group; running `result_df.apply(eval(...))` over a small frame is
fine. If a user writes a computed field that references a huge column,
they can file a separate issue.

## Test strategy

Because the acceptance criterion is 'byte-identical output for every
existing test case', the easiest robust approach is a parameterized
equivalence test: for each existing test fixture, run BOTH the v0.6.2
pandas implementation (vendored temporarily into a test helper) AND the
new Ibis implementation, assert equality. Delete the vendored helper once
the equivalence suite stays green over a few days. This is a stronger
guarantee than rewriting assertions to match the new implementation's
output.

## Release shape

Minor bump (0.7.0) when bundled with M058 + M059. This is the kind of
change that deserves release notes with a 'performance' section and a
warning about the float-tie-break acceptable breakage.
"""
