# Mission: Push-down analytics-entity projection to Ibis
# The architectural one. Replace the client-side pandas loop in
# project_analytics_entity with an Ibis expression so the backend
# (BigQuery or DuckDB) does the grouping and aggregation server-side.

id = "M060"
title = "Push-down project_analytics_entity to the backend via Ibis"
status = "draft"
created = 2026-04-18
depends_on = ["M058"]

[outcome]
description = """
The core of `project_analytics_entity` in
src/fyrnheim/engine/analytics_entity_engine.py today is:

  df = enriched_events.execute()          # materialize ALL events to pandas
  # ... M057 relevance filter (row-level mask) ...
  group_ids = df[group_key].unique()
  for gid in group_ids:                   # Python for-loop
      gid_events = df[df[group_key] == gid]
      # per-field resolution in pandas, per-measure resolution in pandas
  result_df = pd.DataFrame(rows)
  return ibis.memtable(result_df)

That shape forces the entire enriched-events stream onto the client before
anything else happens. On BigQuery this means one full export of the event
table per AnalyticsEntity. Everything after is CPU-bound Python. M057
shrank the data volume; this mission eliminates the client-side loop.

This mission rewrites `project_analytics_entity` to return an Ibis
expression built from groupby + aggregation primitives, so the backend
executes the projection. The caller in pipeline.py still gets an
Ibis-compatible result; the subsequent `.execute()` (or a future direct
`.to_table()` / `write_table_from_ibis` path — out of scope here) fetches
only the final projected rows, not the raw event stream.

Three aggregation classes to translate:

1. **`strategy='latest'`** and **`strategy='first'`** state fields over
   payload JSON. Current shape: sort events by ts desc/asc, iterate,
   return first non-null extract of `payload[field_name]`. Ibis shape:
   `events.group_by(group_key).agg(...ARRAY_AGG(payload ORDER BY ts DESC LIMIT 1)[1]...)`
   via Ibis's `.arbitrary()` / `.first()` over a pre-filtered subexpression.
   Per-field JSON extract must happen inside the aggregation so the backend
   returns the scalar, not the whole payload.

2. **`strategy='coalesce'`** across a priority list of sources. Ibis shape:
   a `coalesce(...)` of per-source `latest(...)` sub-aggregations.

3. **Measures** — `count` (easy: count of rows where event_type == activity),
   `sum` (sum of a payload field where event_type == activity),
   `latest` (latest non-null payload field where event_type == activity).
   All three are standard `groupby().agg()` with an activity filter inside.

The JSON-payload extraction requires a backend-portable Ibis expression.
DuckDB has `json_extract`; BigQuery has `JSON_VALUE` / `JSON_EXTRACT_SCALAR`.
Ibis exposes these via its JSON type operations — verify the exact binding
during implementation. For `field_changed` events (which carry
`{field_name, old_value, new_value}`), the current Python code has
event-shape branching at analytics_entity_engine.py:54-71; this branching
must translate to a conditional expression inside the aggregation (pick
`new_value` if `event_type='field_changed' AND payload->>'field_name' = <target>`;
otherwise fall back to `payload->><target>`).

After this mission:
- For BigQuery, the per-entity compute becomes one SQL query over
  `enriched_events` that returns one row per group. No client-side pandas
  materialization of the event stream.
- For DuckDB, same — but obviously already in-process, so the gain is from
  deleting the Python loop rather than network round-trips.
- `computed_fields` (evaluated via `eval()` on a pandas DataFrame today)
  continue to work, but now apply over the small post-aggregation frame.
  Consider whether computed_fields should also move into Ibis as a
  follow-up; out of scope for this mission.

This is a big refactor. Landing it without M058's timing harness means
we're guessing; landing it without M057's correctness filter means we're
optimizing a silent bug. Both are prerequisites (M057 is already shipped;
M058 is the explicit `depends_on`).
"""

user_progress = "From 'every AnalyticsEntity projection materializes the full enriched-events stream to pandas and iterates in Python' to 'projection is an Ibis expression; the backend does the grouping and aggregation; only the final per-entity rows land on the client'"

