# Mission: Retro cleanup from M058 + M059
# Bundle 4 small post-implementation findings (CLI executor leaks, missing
# unit tests for max_parallel_io, missing serial-behavior regression test,
# register_parquet thread-safety gap) into one PR.

id = "M061"
title = "Retro cleanup from M058 + M059"
status = "draft"
created = 2026-04-18
depends_on = ["M058", "M059"]

[outcome]
description = """
Small cleanup mission addressing four findings surfaced by the post-M058 /
post-M059 retro. All four are low-risk, additive, and would otherwise
become one-line PRs each — bundling them avoids churn.

1. **CLI IbisExecutor leaks.** 4 of 5 CLI commands in src/fyrnheim/cli.py
   create IbisExecutor.from_config but never call .close(). Only `bench`
   (line 490) has a matching close() at line 514, added during M058 rework
   after CodeRabbit flagged it. Sites needing the same try/finally wrap:
   line 303 (`run`), 557 (`materialize`), 613 (`drop`), 667
   (`list-staging`). Trivial mechanical change, preserves every existing
   exit-code / error semantic.

2. **max_parallel_io config unit tests.** M059 added the field with full
   resolve_config() precedence (CLI > yaml > default=4) and yaml-side
   positive-int validation, but there is no dedicated test. Add 4 tests to
   exercise each layer.

3. **max_parallel_io=1 serial regression test.** Serial-by-construction
   via ThreadPoolExecutor(max_workers=1), but no test locks that
   invariant. Add a regression test in tests/test_parallel_io.py that
   proves source-load and entity-write work runs on a single thread when
   max_parallel_io=1.

4. **register_parquet not lock-wrapped.** Every other IbisExecutor method
   that touches self._conn (materialize_view, write_table,
   execute_parameterized, view_exists, drop_view) wraps access with
   `with self._conn_lock:`. register_parquet at executor.py:211 does not.
   Safe today because it is only called during pipeline setup before
   phase 1 workers spawn — but the lack of lock is implicit and load-
   bearing. Wrap it for symmetry and to remove a latent thread-safety
   gap.

No version bump. No CHANGELOG entry. This folds into the v0.7.0 release
mission later with M058 + M059 + M060.
"""

user_progress = "From '4 loose retro findings parked as individual Beads tasks' to 'all 4 shipped as a single small PR on the v0.7.0 track'"

[testing]
approach = "agent-judgment"
criteria = [
    "Every IbisExecutor.from_config(...) callsite in src/fyrnheim/cli.py has a matching executor.close() in a finally block. All 5 sites (lines 303, 490, 557, 613, 667 on current main) follow the same pattern.",
    "`fyr run`, `fyr materialize`, `fyr drop`, `fyr list-staging` CLI exit codes remain unchanged — success=0, error=nonzero. Close() runs on both success and error paths (including SystemExit).",
    "tests/test_config.py (or equivalent) gains 4 unit tests for max_parallel_io: (a) default is 4 when neither CLI nor yaml sets it, (b) yaml value overrides the default, (c) CLI value overrides yaml (precedence), (d) invalid yaml value (0, -1, or non-int string) causes load_config / resolve_config to raise",
    "tests/test_parallel_io.py gains a regression test asserting serial behavior at max_parallel_io=1: source-load stubs record threading.get_ident(); all calls happen on the same thread id. Same for entity writes (either same-thread assertion OR no-concurrent-overlap assertion on enter/exit timestamps).",
    "src/fyrnheim/engine/executor.py register_parquet (line 211) is wrapped with `with self._conn_lock:` following the pattern of the other self._conn-touching methods",
    "All existing tests pass unchanged (no modifications to existing test assertions)",
    "ruff check src/ tests/ clean; mypy src/ clean",
    "No version bump (pyproject.toml still 0.6.2); no CHANGELOG entry",
    "No new runtime dependencies",
    "Single PR against main containing all 4 fixes",
