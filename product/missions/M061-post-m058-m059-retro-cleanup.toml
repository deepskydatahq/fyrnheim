[notes]
considerations = """
## Origin

Findings came out of the M058+M059 retro (see Beads tasks typedata-qjg1,
typedata-c00p, typedata-t1l1, typedata-ykug). The retro notes are in the
Beads task descriptions — read them first for the fuller context.

## Sizing and shape

One epic, one story. All four items are small and mechanical. A single
implementation agent should finish this in one session. The evaluator
checks count/shape rather than cross-file correctness.

## Implementation order (suggested)

1. register_parquet lock wrap (3 lines in executor.py) — smallest, isolates
   the executor change from the CLI changes
2. CLI executor cleanup (4 try/finally wraps) — mechanical, pattern is
   already in the file at cli.py:490-514
3. max_parallel_io config tests (4 new tests)
4. max_parallel_io=1 serial regression test (1-2 new tests)
5. Run full suite; ruff + mypy; push

## Precedence test detail

The "CLI beats yaml" test must use resolve_config(max_parallel_io=<cli_value>)
with a fyrnheim.yaml file in tmp_path setting a different value. The test
should NOT mock Path.cwd — the config lookup is `load_config(Path.cwd())`
at config.py:118, which means the test either changes cwd to tmp_path or
patches load_config directly. The simpler route is monkeypatch.chdir.

## Do NOT

- Add a context-manager interface to IbisExecutor (`__enter__`/`__exit__`).
  Tempting but out of scope — M061 is preserve-behavior, not add-ergonomics.
- Modify the 5 CLI `from_config(...)` keyword args. Just wrap the bodies.
- Add a close() to register_parquet callsites in tests or docs. The lock
  change is internal; no caller contract changes.

## Release shape

Folds into the v0.7.0 release mission alongside M058 + M059 + M060. No
standalone release.
"""
