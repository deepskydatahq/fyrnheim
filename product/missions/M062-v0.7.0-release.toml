[notes]
considerations = """
## Release-flow memory

Version bumps go through a release PR, never direct push to main. Branch
name convention: `release/v<version>`. Tag after merge on the merge
commit. publish.yml auto-triggers on `v*` tag push.

## CHANGELOG content sourcing

All four component missions have their own TOMLs on main with detailed
[outcome] sections — use those + the merged PR bodies (#111, #113, #115,
#117) as source material for the CHANGELOG entry. Don't paraphrase the
TOML verbatim; write it as user-facing release notes.

## Acceptable-breakage scope

The user's planning prompt mentioned "M060's two acceptable-breakage
items" — but one of them (the latest-measure dtype narrowing) was
addressed in M060's final rework via JSON-text roundtrip and no longer
ships as breakage. Do NOT call it out in the CHANGELOG; that would
confuse users into migrating away from behavior that still works.

The genuine behavior change is M059's phase-1 fail-fast propagation.
That IS worth a 'Changed' entry with a brief migration note.

## M058 benchmark harness note

CHANGELOG should call out `fyr bench` as a new CLI command and the
`PipelineTimings` structure on `PipelineResult` as a new attribute.
Subordinate: mention the pytest `benchmark_result` session fixture for
contributors.

## M060 performance citation

The commit message / PR body for #117 cited 3.8× @ 1k rows, 26.2× @ 10k,
83.3× @ 50k on DuckDB. Cite the same numbers in the CHANGELOG
'Performance' subsection. Make clear these are synthetic benchmarks (not
the M058 benchmark_result fixture, which doesn't include an
AnalyticsEntity).

## M059 performance citation

M059 didn't have a hard benchmark in the PR — the real-world win is on
BigQuery-bound pipelines where phase-1 loads serialise 9+ BQ round-trips
and phase-4/5 writes serialise blocking load jobs. Default
max_parallel_io=4 is a conservative-by-design knob; mention it without
specific speedup numbers.

## Known-limitations section

Keep it short. One bullet per open retro task, one line each, with the
Beads task ID in case someone wants to track:
- BigQuery integration test coverage for the new push-down path is
  pending (runtime verified via SQL compile; Beads typedata-tidw).
- The push-down path always materialises results server-side; a future
  release may restore lazy return for the no-computed_fields path
  (Beads typedata-vmok).

## Release shape

Mirrors M056's v0.6.1 release and M057's v0.6.2 release. Single commit on
`release/v0.7.0` with version + uv.lock + CHANGELOG; single PR; one merge
commit on main; tag at the merge commit; push tag.

## If the publish fails

publish.yml has shipped 0.6.0, 0.6.1, 0.6.2 without incident. If 0.7.0
fails unexpectedly (trusted-publisher misconfig, upload conflict, etc.),
the fix is out-of-scope of this mission — open a separate ticket. Don't
hand-patch PyPI.
"""
