# Mission: v0.7.0 release — performance bundle
# Cut v0.7.0 bundling M058 (benchmark harness) + M059 (parallel I/O) +
# M060 (push-down projection) + M061 (retro cleanup).

id = "M062"
title = "v0.7.0 release — performance bundle"
status = "draft"
created = 2026-04-19
depends_on = ["M058", "M059", "M060", "M061"]

[outcome]
description = """
Cut the v0.7.0 release. All four component missions (M058/M059/M060/M061)
have merged to main; pyproject.toml is still at 0.6.2 and CHANGELOG.md
still has 0.6.2 as the top entry. This mission does the mechanical
release work:

1. Bump pyproject.toml version 0.6.2 → 0.7.0; regenerate uv.lock.
2. Write the CHANGELOG.md `[0.7.0] - 2026-04-19` entry bundling the four
   missions under appropriate Keep-a-Changelog categories:
   - **Performance** (M060 push-down; M059 parallel I/O)
   - **Added** (M058 benchmark harness + `fyr bench` CLI; M059's
     `max_parallel_io` config + CLI flag)
   - **Changed** (M059's phase-1 source-load failure semantics — errors
     now raise instead of accumulating; noted as behavior change, not
     breaking, because the new behavior matches fail-fast semantics users
     reasonably expect)
   - **Fixed** (M061 retro items: CLI executor close in
     run/materialize/drop/list-staging; register_parquet lock symmetry)
3. Release-PR flow per the release-flow memory: branch `release/v0.7.0` →
   PR → green CI (all 3 Python versions) → merge to main → tag `v0.7.0`
   at the merge commit → push tag → `publish.yml` triggers on `v*` push
   and ships to PyPI.

Post-release, three retro follow-ups remain open as tracked Beads tasks
(typedata-tidw BigQuery integration test for M060; typedata-vmok /
typedata-j8e1 restore lazy return for no-computed_fields path). These are
non-blocking; flag them in release notes as known limitations.

Note on M060 latest-measure dtype: the v0.7.0 implementation preserves
all JSON scalar types (string/int/float/bool) via a client-side
json.loads round-trip after the backend aggregation. The earlier
dtype-narrowing concern (raised mid-implementation) was addressed in
rework and does NOT ship as breakage — no CHANGELOG call-out needed for
that.
"""

user_progress = "From 'four features merged to main at version 0.6.2' to 'v0.7.0 tagged and published on PyPI with release notes'"

