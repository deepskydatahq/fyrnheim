# Mission: v0.7.1 — dtype coercion fix after JSON-text roundtrip
# Patch release fixing a v0.7.0 regression: nullable numeric state fields
# produced object-dtype columns that PyArrow couldn't register (BigQuery
# memtable path fails; DuckDB silently tolerates).

id = "M063"
title = "v0.7.1 — dtype coercion fix for JSON-text roundtrip"
status = "draft"
created = 2026-04-19
depends_on = ["M060"]

[outcome]
description = """
v0.7.0's M060 rewrite of `project_analytics_entity` extracts JSON-typed
state fields and the `latest` measure as JSON text and parses them back
to Python scalars on the client (to preserve mixed int/float/str/bool
types). The helper `_parse_json_text_columns` (`src/fyrnheim/engine/
analytics_entity_engine.py:375`) finishes with `.astype(object)` — which
produces object-dtype columns containing Python scalars of varying
types.

For a nullable numeric state field like `{"lead_score": 42}` (with some
rows missing the field entirely), the parsed column ends up as
object-dtype with a mix of Python `int` and `None`. DuckDB tolerates
this when the memtable is used downstream. BigQuery does not — when
`ibis.memtable(df)` gets registered via PyArrow, `pyarrow.Table.from_pandas`
cannot infer a consistent Arrow type across `int | None` values and
raises. This makes v0.7.0 broken for any BigQuery user with a nullable
numeric state field.

Fix: after the JSON-text parse, infer a clean pandas dtype per column
from the set of non-null Python types:
- all `int` → `Int64` (nullable)
- `int` + `float` (or all `float`) → `Float64` (nullable)
- all `bool` → `boolean` (nullable)
- all `str` → object (Arrow tolerates object-str)
- mixed (e.g. `str` + `int`) → object, user's data-model choice

Use strict `type(v) is int` (not `isinstance`), because
`isinstance(True, int)` is True in Python — without strict matching, a
boolean column would silently coerce to `Int64` and lose semantic
meaning.

No user-facing API change. No change to Pydantic models. No change to
pipeline.py. Ship as v0.7.1 via the release-PR flow.
"""

user_progress = "From 'v0.7.0 breaks for BigQuery users with nullable numeric state fields (object-dtype + Nones fails PyArrow inference)' to 'the projection engine returns Arrow-friendly nullable-typed columns so both DuckDB and BigQuery paths round-trip cleanly'"

