[notes]
considerations = """
## How this slipped through

M060's equivalence suite used `pd.testing.assert_frame_equal(check_dtype=False)`
to tolerate the dtype differences between the new impl and the vendored
pandas reference. That's correct for asserting value-level equivalence
but masked the fact that the new impl's dtypes are Arrow-hostile. Going
forward, the dtype check shouldn't be enabled on the equivalence suite
(values are what matter there), but the new regression tests in this
mission DO need to assert Arrow compatibility directly — hence the
`to_pyarrow()` check, not an `assert_frame_equal`.

## The isinstance gotcha

`isinstance(True, int)` is True in Python — booleans are a subclass of
int. If the helper uses `isinstance(v, int)`, a column of bools would
coerce to Int64 and lose semantic meaning. Strict `type(v) is int`
matching (NOT isinstance) prevents this. The dedicated
test_projection_nullable_bool_state_field_is_arrow_compatible test must
assert the final pyarrow type is `bool_()`, not `int64()`.

## Implementation sketch

```python
def _coerce_to_arrow_friendly_dtype(s: pd.Series) -> pd.Series:
    non_null = s.dropna()
    if len(non_null) == 0:
        return s.astype(object)
    types = {type(v) for v in non_null}  # strict type, not isinstance
    if types == {bool}:
        return s.astype("boolean")
    if types == {int}:
        return s.astype(pd.Int64Dtype())
    if types <= {int, float}:
        return s.astype("Float64")
    if types == {str}:
        return s.astype(object)
    return s.astype(object)  # mixed — user's data model choice

def _parse_json_text_columns(df, columns):
    out = df.copy()
    for col in columns:
        if col in out.columns:
            parsed = out[col].map(_parse_json_text_cell)
            out[col] = _coerce_to_arrow_friendly_dtype(parsed)
    return out
```

Order matters: check `bool` BEFORE `int` because `bool` is a subclass of
`int` — a set-equals comparison against `{bool}` works because set
equality uses `type()` not `isinstance()`, but the reader should see the
explicit bool check first.

## Why to_pyarrow() in the regression test

`ibis.memtable(df).to_pyarrow()` exercises the exact path that fails on
BigQuery (PyArrow table construction from the pandas frame). A test
that does `ibis.memtable(df)` alone is not enough — memtable creation
is lazy. Calling `.to_pyarrow()` forces the conversion and raises if the
dtype is Arrow-hostile. This catches the bug class without BQ creds.

## CHANGELOG shape for [0.7.1]

Single bullet under `### Fixed`:

```
## [0.7.1] - 2026-04-19

### Fixed

- `project_analytics_entity` output now uses pandas nullable dtypes
  (`Int64` / `Float64` / `boolean`) for numeric and boolean state fields
  instead of object dtype with Python-scalar-and-None values. v0.7.0
  produced object-dtype columns that PyArrow could not convert, breaking
  the BigQuery memtable-registration path for any entity with a
  nullable numeric or boolean state field. DuckDB was unaffected.
```

