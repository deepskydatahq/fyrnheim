[notes]
considerations = """
## Root cause chain

The complete chain for the reproducer `pd.Series([None, np.int64(85),
None, np.int64(60)], dtype=object)`:

1. BigQuery's Python client (google-cloud-bigquery) returns numpy
   scalars from result rows, not Python ints.
2. `agg_expr.execute()` on a BigQuery-backed Ibis expression returns a
   pandas DataFrame whose object columns contain numpy scalars where
   values are present and None where they are missing.
3. `_parse_json_text_cell` at line 355-357 has a non-string passthrough:
   ```python
   if not isinstance(value, str):
       return value  # passthrough — numpy scalar stays as numpy scalar
   ```
   This is by design (legacy pandas-materialised backends return typed
   values), but it preserves the numpy scalar type instead of normalising
   to Python.
4. `_coerce_to_arrow_friendly_dtype` collects
   `types = {type(v) for v in non_null}` — `{np.int64}`, NOT `{int}`.
5. `types == {int}` fails. `types <= {int, float}` fails. Falls through
   to `return s.astype(object)`.
6. `project_analytics_entity` wraps the object DataFrame in
   `ibis.memtable(df)`. When something calls `.to_pyarrow()` on it (or
   when Ibis registers it for a BigQuery join), PyArrow's
   `Table.from_pandas` raises `ArrowTypeError: Expected bytes, got a
   'int' object` because the column has numpy scalars interleaved with
   Pythons None.
7. DuckDB returns plain Python ints so the type-set is `{int}` and the
   correct `Int64` branch fires.

## Type enumeration

```python
import numpy as np

_BOOL_TYPES: set[type] = {bool, np.bool_}
_INT_TYPES: set[type] = {
    int,
    np.int8, np.int16, np.int32, np.int64,
    np.uint8, np.uint16, np.uint32, np.uint64,
}
_FLOAT_TYPES: set[type] = {float, np.float16, np.float32, np.float64}
```

`np.longlong` / `np.ulonglong` are platform-dependent aliases (same as
int64/uint64 on most 64-bit systems) — covered by the existing entries
via `type()` identity. If a user reports a bug with a different scalar
type, the enumeration can be extended.

## Why subset matching (`<=`) instead of equality (`==`)

`types <= _INT_TYPES` handles mixed collections — e.g. a column with
some Python `int` values and some `np.int64` values (possible if the
result mixes materialised-elsewhere data with fresh BQ data). Subset
matching covers the pure case AND the mixed case in one branch.

Bool branch uses subset matching for symmetry; since `bool ∉ _INT_TYPES`
and `np.bool_ ∉ _INT_TYPES` (by strict type identity, not isinstance),
a pure-bool column correctly matches `<= _BOOL_TYPES` before falling
through to int.

