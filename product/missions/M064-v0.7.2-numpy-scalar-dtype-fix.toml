# Mission: v0.7.2 — recognize numpy scalar types in dtype coercion
# Patch release. v0.7.1 fixed Python-scalar-and-None columns, but the
# helper's strict type() matching only knows Python types. BigQuery's
# client returns numpy scalars (np.int64, etc.); those fall through to
# the object-dtype catch-all and PyArrow chokes again.

id = "M064"
title = "v0.7.2 — recognize numpy scalar types in _coerce_to_arrow_friendly_dtype"
status = "draft"
created = 2026-04-19
depends_on = ["M063"]

[outcome]
description = """
v0.7.1's `_coerce_to_arrow_friendly_dtype` in `src/fyrnheim/engine/
analytics_entity_engine.py` (lines 364-403) uses strict `type()` set
equality against Python-only types (`int`, `float`, `bool`, `str`).
`_parse_json_text_cell` (line 355-357) passes non-string values through
unchanged when a backend pre-parses JSON — and the BigQuery Python client
returns `numpy.int64` / `numpy.float64` scalars, not Python `int` /
`float`. The helper's `types == {int}` match fails for `{np.int64}`,
falls through to the catch-all `object` branch, and PyArrow fails
registering the memtable on the BigQuery path.

DuckDB returns plain Python `int`, which is why v0.7.1 tests passed and
the bug only triggers on BigQuery users. Downstream impact: any entity
with a nullable numeric state field breaks on BigQuery — same symptom
as v0.7.0's original bug, different root cause.

Fix: broaden the type-match sets to enumerate numpy scalar equivalents
explicitly. Keep strict `type()` collection (preserves the bool-as-int
guard). Switch set-equality checks to subset matching (`types <=
_INT_TYPES`) so Python + numpy mixes are handled. Mutually exclusive
ordering (bool → int → int|float → str → other) prevents `np.bool_`
from silently matching the int branch.

No user-facing API change. No change to Pydantic models, pipeline.py, or
anywhere outside the helper body + its tests. Ship as v0.7.2 via the
release-PR flow.
"""

user_progress = "From 'v0.7.1 still breaks on BigQuery because numpy.int64 scalars skip the int dtype branch' to 'numpy scalar types (int8-int64, uint8-uint64, float16-float64, bool_) are recognized and coerced to the appropriate nullable pandas dtype alongside their Python equivalents'"

