# Mission: v0.7.3 — tolerant numeric coercion for mixed int+string columns
# Patch release. v0.7.1 handled Python-scalars, v0.7.2 added numpy scalars,
# but columns with user-data inconsistency (JSON number + JSON-quoted-number
# across rows) still fall through to object dtype and PyArrow fails.

id = "M065"
title = "v0.7.3 — tolerant numeric coercion for mixed int+string columns"
status = "draft"
created = 2026-04-19
depends_on = ["M063", "M064"]

[outcome]
description = """
v0.7.1 and v0.7.2 fixed dtype coercion for pure-type columns (all Python
ints, all numpy ints, etc.). But a real-world BigQuery pipeline hit a
third failure mode: a state field's source payload stores the value
inconsistently — some rows as JSON number (``{"lead_score": 11}``) and
others as JSON string (``{"lead_score": "-5"}``). After the push-down
extraction + ``_parse_json_text_cell`` normalisation, the column ends up
with mixed Python int + Python str values (e.g. ``[11, '-5', '0', '47',
'25']``). ``_coerce_to_arrow_friendly_dtype`` matches neither the
``_INT_TYPES`` branch (str not in the int set) nor the mixed-scalar
branch, falls through to object dtype, and PyArrow fails to register the
memtable on the BigQuery path.

This is a user-data-inconsistency issue exposed by M060's push-down —
legacy pandas produced the same object-dtype column but typically went
through a pre-M060 write path that tolerated object. With the push-down,
the object column is the output contract, and BigQuery rejects it.

Fix: add a tolerant-coercion branch in ``_coerce_to_arrow_friendly_dtype``.
When ``types <= _INT_TYPES | _FLOAT_TYPES | {str}``, attempt to
``json.loads`` each string value. If EVERY string parses cleanly to a
Python int or float, coerce the whole column to the appropriate nullable
numeric dtype (``Int64`` if all ints post-parse, ``Float64`` if any
float). If any string fails to parse, fall through to object dtype
(current behaviour — PyArrow still errors, but no worse than today).

No user-facing API change. No change to Pydantic models, pipeline.py, or
outside the helper + its tests. Ship as v0.7.3 via the release-PR flow.
"""

user_progress = "From 'v0.7.2 still breaks on BigQuery when a single source field stores numeric values inconsistently as JSON numbers in some rows and JSON-quoted numbers in others' to 'the coercion helper attempts json.loads on string values in mixed-numeric-and-string columns and produces a unified nullable numeric dtype when every string parses cleanly to a number'"

