[notes]
considerations = """
## Root cause chain (for future debugging)

The reported failure on the persons entity:

1. User's source data (Pardot) stores `lead_score` inconsistently: some
   rows have `{"lead_score": 11}` (JSON number), others have
   `{"lead_score": "-5"}` (JSON string). This is data-quality, not a
   fyrnheim bug.
2. M060's push-down extracts state fields via
   `payload.cast("json")["key"].try_cast("string")` — returns the JSON
   TEXT form: `"11"` for the number, `"\\"-5\\""` (quoted) for the string.
3. `_parse_json_text_cell` calls `json.loads` on both — `"11"` becomes
   int 11, `'"-5"'` becomes str "-5".
4. The resulting Series has mixed Python int + str values.
5. `_coerce_to_arrow_friendly_dtype`:
   - `types = {int, str}`
   - Does not match `_BOOL_TYPES`, `_INT_TYPES`, `_INT_TYPES | _FLOAT_TYPES`
   - Does not match `{str}`
   - Falls through to `s.astype(object)`.
6. `project_analytics_entity` wraps in `ibis.memtable(df)` which the
   caller turns into a PyArrow table for BigQuery write — fails with
   `ArrowTypeError: Expected bytes, got a 'int' object`.

DuckDB would hit the same mixed column in principle, but DuckDB's pandas
path tolerates object-dtype columns with typed Python scalars + strings,
so it silently succeeds (the output is just object-dtype).

## Why tolerant coercion rather than root cause

The root cause is inconsistent source data. Fyrnheim cannot enforce
payload-schema consistency — that's the user's responsibility. What
fyrnheim CAN do is be tolerant when the intent is obviously numeric (all
strings parse cleanly to numbers). This turns a pipeline-breaking error
into a benign type normalisation.

For intentionally-mixed columns (some numbers, some words), we preserve
the current fallback: object dtype + PyArrow error. That still fails
loudly, and it should — the user has genuinely inconsistent data that
needs a real fix upstream.

## Proposed implementation

```python
def _try_coerce_strings_to_numeric(
    non_null: list,
) -> tuple[list, bool] | None:
    \"\"\"Attempt json.loads on string values, keeping numeric ones in place.

    Returns (coerced_values, saw_float) if every string parses cleanly
    to a Python ``int`` or ``float``. Returns ``None`` if any string
    parses to a non-numeric type (str, bool, list, dict, None) or is
    unparseable — signalling 'fall back to object dtype'.
    \"\"\"
    out: list = []
    saw_float = False
    for v in non_null:
        if isinstance(v, str):
            try:
                parsed = json.loads(v)
            except (ValueError, TypeError):
                return None
            if type(parsed) is int:
                out.append(parsed)
            elif type(parsed) is float:
                out.append(parsed)
                saw_float = True
            else:
                # parsed to str, bool, None, list, dict — not a pure number
                return None
        else:
            out.append(v)
            if type(v) in _FLOAT_TYPES:
                saw_float = True
    return out, saw_float


def _coerce_to_arrow_friendly_dtype(s: pd.Series) -> pd.Series:
    non_null = s.dropna()
    if len(non_null) == 0:
        return s.astype(object)
    types = {type(v) for v in non_null}
    if types <= _BOOL_TYPES:
        return s.astype("boolean")
    if types <= _INT_TYPES:
        return s.astype(pd.Int64Dtype())
    if types <= _INT_TYPES | _FLOAT_TYPES:
        return s.astype("Float64")
    if types == {str}:
        return s.astype(object)
    # NEW: mixed numeric + string — try to coerce strings to numbers
    if types <= _INT_TYPES | _FLOAT_TYPES | {str}:
        result = _try_coerce_strings_to_numeric(list(non_null))
        if result is not None:
            coerced, saw_float = result
            # rebuild the full Series with coerced values; None/NaN stay as NaN
            rebuilt = [
                coerced.pop(0) if not (v is None or (isinstance(v, float) and pd.isna(v))) else None
                for v in s
            ]
            target = "Float64" if saw_float else pd.Int64Dtype()
            return pd.Series(rebuilt, index=s.index, dtype=object).astype(target)
    return s.astype(object)
```

The rebuild step is subtle: `non_null` is the non-null subset; we need
to splice the coerced values back into the full Series at the right
positions (preserving Nones). The implementer should double-check the
ordering assumption — `s.dropna()` preserves order, so popping from the
front of `coerced` while iterating `s` in order is correct.

## CHANGELOG entry

```
## [0.7.3] - 2026-04-19

### Fixed

- `_coerce_to_arrow_friendly_dtype` now attempts to coerce mixed
  numeric-and-string columns to a nullable numeric dtype when every
  string is a valid JSON number. Previously the column fell through
  to object dtype, breaking the BigQuery PyArrow registration path
  for any state field whose source payload stored the value
  inconsistently as JSON numbers in some rows and JSON-quoted numbers
  in others (e.g. `{"score": 11}` vs `{"score": "-5"}` across the
  same source).

### Changed

- State fields and `latest` measures over payloads with intentionally
  mixed numeric-and-numeric-string values now produce a unified
  nullable numeric column (`Int64` if all values parse to int,
  `Float64` if any parse to float). Columns containing any
  non-numeric string are unaffected and continue to produce
  object-dtype output — which still fails PyArrow registration
  loudly, as it should (genuinely inconsistent data needs upstream
  cleanup, not silent type coercion).
```

