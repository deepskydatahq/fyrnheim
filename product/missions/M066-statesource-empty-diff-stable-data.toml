# Mission: StateSource snapshot-diff produces 0 rows downstream for stable data
# Originally filed 2026-04-22 as a BigQuery coalesce bug. Root cause confirmed
# on 2026-04-22 to be unrelated to BigQuery or coalesce: SnapshotDiffPipeline
# emits 0 events when current data matches the last saved snapshot, and
# downstream entity materializations then produce 0 rows.
#
# Planning completed 2026-04-23 via /plan-mission. Scope locked to Option B:
# default-behavior fix (snapshot replay on empty diff) + per-source
# `full_refresh` flag on StateSource as an explicit force-replay escape hatch.
# Ships as minor release v0.8.0.

id = "M066"
title = "StateSource snapshot-diff produces 0 rows downstream for stable data"
status = "ready"
created = 2026-04-22
planned = 2026-04-23
depends_on = []

[outcome]
description = """
Fix the silent-failure mode where StateSource-backed entities materialize
0 rows on any pipeline run where the upstream data is unchanged from the
last saved snapshot. Root cause (confirmed): ``SnapshotDiffPipeline.run()``
calls ``diff_snapshots`` which correctly emits 0 events when
``current == previous`` ŌĆö but downstream ``AnalyticsEntity`` materialization
runs argmax / coalesce over those 0 events and produces 0 rows. This
breaks any pipeline run against stable or slowly-changing StateSources
(confirmed impact: ``sessions`` entity drops 3,000 rows -> 0 rows;
``anon_users`` entity drops 2,241 rows -> 1,348 rows in the production
timo-data-stack pipeline).

**The fix (Option B ŌĆö locked in during /plan-mission 2026-04-23):**

1. **Default behavior change** (fixes the bug for everyone with no config
   change): in ``SnapshotDiffPipeline.run()``, after calling
   ``diff_snapshots``, if the returned event table is empty AND
   ``previous is not None`` (i.e. we've seen this source before but
   nothing changed), fall back to emitting synthetic ``row_appeared``
   events for every current row by calling the existing
   ``_make_appeared_events(current, ...)`` helper from diff_engine.py.
   Semantically: "unchanged state is represented as every row having
   appeared again". This is safe ŌĆö no measure or aggregation in the
   codebase counts ``row_appeared`` events (verified during planning;
   measures count activity-named events produced by ``ActivityDefinition``
   rewriting, and state-field extraction is idempotent over duplicate
   ``row_appeared`` events).

2. **Explicit escape hatch via ``full_refresh: bool`` on StateSource**:
   new Pydantic field ``full_refresh: bool = False`` on ``StateSource``
   in core/source.py. When ``True``, ``_load_state_source`` in
   pipeline.py short-circuits the snapshot-diff machinery entirely ŌĆö
   every current row emits as a synthetic ``row_appeared`` regardless of
   any prior snapshot. This serves users who (a) use the source purely
   for state projection and don't need CDC-style ``field_changed``
   events, (b) want deterministic "entity reflects current state"
   behavior independent of snapshot-store state, or (c) want to skip the
   snapshot I/O cost for state-only sources.

3. **Diagnostic logging**: a single-line log (INFO level) per
   StateSource per run indicating which path ran ŌĆö normal diff, empty-
   diff replay, or full-refresh. So users can SEE what the pipeline did
   and diagnose issues like "why did my entity suddenly jump in row
   count" without digging into internals.

4. **Regression test** pinning the two-runs-across-two-dates scenario
   that would have caught this bug (the gap identified during planning
   ŌĆö no existing test runs the full pipeline twice with persistent
   snapshot and asserts downstream entity output).

5. **Release as v0.8.0** (minor bump) via the release-PR flow. This is
   a minor, not a patch, because the default behavior change is a
   semantic shift: pipelines that were silently producing 0 rows from
   stable StateSources will now produce correct non-zero rows on the
   next run after upgrading. CHANGELOG must explicitly call out the
   row-count jump so users understand it as a correction, not a
   regression.

**The fix is narrow:**
- ``SnapshotDiffPipeline.run()`` in engine/snapshot_diff.py: +1 branch
- ``StateSource`` in core/source.py: +1 Pydantic field
- ``_load_state_source`` in engine/pipeline.py: +1 conditional branch
  for the ``full_refresh`` flag
- Diff-engine ``_make_appeared_events`` is already the right helper and
  used by the first-run path ŌĆö reuse it, don't duplicate
- One existing test (``test_run_returns_empty_table_when_no_changes``
  in tests/test_snapshot_diff.py) actively pins today's buggy behavior
  as a contract; it must flip to pin the new behavior
- One new e2e regression test covering the two-runs-across-two-dates
  scenario
- CHANGELOG entry for v0.8.0
- Version bump + uv.lock regen

**Not in this mission (explicitly deferred):**
- Option 4 (entity materialization reads SnapshotStore directly for
  state fields) ŌĆö architecturally cleaner but significantly larger
  refactor. File as a future mission if warranted.
- Option 3 (pipeline-runner detection of "0 events across identity
  graph") ŌĆö rejected: Option A already fixes the silent failure; a
  whole-pipeline heuristic adds brittleness without extra value.
- Any BigQuery-specific SQL compilation work ŌĆö the original 2026-04-22
  hypothesis was wrong; no such bug exists.
- Any changes to the coalesce state-field strategy or
  analytics_entity_engine.py aggregation semantics.
"""

user_progress = "From 'StateSources with stable upstream data silently produce 0 rows in downstream entities on every run after the first ŌĆö only caught by deleting the snapshot directory' to 'SnapshotDiffPipeline falls back to row_appeared replay when diff is empty, users can force this behavior per-source via full_refresh=True, and a regression test runs the pipeline twice with persistent snapshot to prevent re-introduction'"

