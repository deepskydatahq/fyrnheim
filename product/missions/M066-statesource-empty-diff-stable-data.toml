[notes]
considerations = """
## Planning history

Mission opened 2026-04-22 as a BigQuery coalesce bug report, reframed
twice over the same day as evidence surfaced:

- Draft 1: 'coalesce produces 0 rows + all-STRING schema on BigQuery'
  ŌĆö hypothesized an ibis MAX_BY-with-all-NULL-HAVING-MAX compilation
  pathology.
- Draft 2: two competing hypotheses A (pushdown compilation) vs B
  (upstream identity/enrichment round-trip empty) with a cheap
  distinguishing test (run compiled SQL against real upstream).
- Draft 3: reporter ran the distinguishing test; both hypotheses
  falsified. Real root cause surfaced: `rm -rf generated/snapshots/`
  fixes the pipeline on BigQuery. Bug is SnapshotDiffPipeline emitting
  0 events when current data matches saved snapshot.
- This plan (2026-04-23): /plan-mission run, Option B (Option A
  default + full_refresh flag) locked after exploration confirmed
  Option 1 synthetic-replay is safe (no row_appeared-counting
  measures anywhere), no mission collisions, and the implementation
  surface is ~3 file-touches.

The BQ-vs-DuckDB discrepancy that started the investigation was a
coincidence of snapshot state at each run ŌĆö DuckDB happened to run
with fresh snapshots (or a different snapshot directory) while BQ
runs preserved them across test runs. No backend-specific bug exists.

## Architecture notes from /plan-mission codebase exploration

**Diff-engine behavior (src/fyrnheim/engine/diff_engine.py):**
- `_make_appeared_events(df, source, snapshot_date)` is called on every
  row of `current` when `previous is None` (first run ŌĆö line 58-60).
- When `previous is not None`, the common-IDs loop only emits
  `field_changed` when `_values_differ()` is true (line 199-206); if
  current and previous are identical, the output is an empty memtable
  with correct schema (line 67-78).
- `_make_appeared_events` is the right helper for the empty-diff
  fallback ŌĆö same schema, same semantics as first-run.

**Pipeline orchestration (src/fyrnheim/engine/pipeline.py):**
- `_load_state_source(source, config, conn)` at line 321-335 is the
  single entry point for StateSource ŌåÆ event stream. It builds a
  `SnapshotStore`, a `SnapshotDiffPipeline`, and calls
  `pipeline.run(source_name, current_table, id_field)`.
- `snapshot_date` is NOT passed explicitly ŌĆö defaults to
  `datetime.date.today()` inside `SnapshotDiffPipeline.run()`.
- All StateSource and EventSource event tables are `pd.concat`'d at
  line 182 into `all_events` before identity resolution (line 200).
- **Option B hooks cleanly here**: the empty-diff fallback lives in
  `SnapshotDiffPipeline.run()` (handles the default case); the
  `full_refresh` shortcut lives in `_load_state_source` (branches
  before creating the pipeline).

**Snapshot store date semantics (src/fyrnheim/engine/snapshot_store.py):**
- `get_previous(source_name, date)` uses `parsed_dt < ref` strict
  less-than (line 133). Same-day re-runs see `previous=None` and
  already emit all rows as row_appeared (first-run semantics).
- The bug manifests ONLY on subsequent-DATE runs, when a prior-date
  snapshot is found and matches current data exactly. This is the
  reporter's scenario: run 1 on April 22, run 2 on April 23.
- The fix doesn't need to touch date semantics. It just makes the
  empty-diff case emit replay events instead of an empty table.

**Why Option 1 (synthetic replay) is safe (verified):**
- No `Measure` or `ActivityDefinition` in the codebase uses
  `activity="row_appeared"` as its trigger. Measures count
  activity-named events (e.g. `"signup"`, `"purchase"`) produced
  by `ActivityDefinition` rewriting in
  src/fyrnheim/engine/activity_engine.py:110-111.
- `ActivityDefinition` passes unmatched `row_appeared` events through
  unchanged (ADR-0001 v0.5.0 behavior).
- State-field extraction at
  src/fyrnheim/engine/analytics_entity_engine.py:229-242 uses argmax/
  coalesce which is idempotent over duplicate `row_appeared` events
  with identical payloads.
- Synthetic replay on empty diff produces duplicate row_appeared
  events across runs for unchanged rows, which is semantically
  equivalent to the first-run emission ŌĆö no double-counting.

**Test coverage gap (verified):**
- `tests/test_snapshot_diff.py::test_run_returns_empty_table_when_no_changes`
  and the e2e `test_e2e_no_changes_empty_events` actively pin today's
  buggy behavior (empty events on unchanged data) AS A CONTRACT. These
  must flip.
- `tests/test_e2e_entity_output.py::test_entity_materialization_is_idempotent`
  runs entity projection twice and asserts output stability ŌĆö but
  does NOT run through SnapshotDiffPipeline / StateSource, so it
  misses the real bug.
- No test today wires StateSource ŌåÆ SnapshotDiffPipeline ŌåÆ identity
  ŌåÆ entity projection and runs the whole thing twice with persistent
  snapshots. That is the exact gap to close.

## Suggested epic breakdown (for /execute-mission)

**Epic 1 ŌĆö Default replay + full_refresh flag (single PR):**
- Update `SnapshotDiffPipeline.run()` with the empty-diff fallback
- Add `full_refresh: bool = False` to StateSource
- Add the `_load_state_source` branch for `full_refresh=True`
- Add INFO-level diagnostic logging
- Flip the two existing pinned-buggy-contract tests
- Add new unit tests for `full_refresh=True` and default=False
- Add the new e2e regression test (run pipeline twice across two dates
  with persistent snapshot)

**Epic 2 ŌĆö Release v0.8.0 (release-PR flow):**
- Version bump + uv.lock
- CHANGELOG [0.8.0] entry
- release/v0.8.0 branch + PR with post-merge-steps block

Epic 1 is a single tight PR (Ōēł150-300 LOC net incl tests). Epic 2
mirrors M063/M064/M065 release mechanics exactly. Human merges + tags
+ publishes.

## Do NOT

- Touch `diff_engine.py` internals (`diff_snapshots`,
  `_make_appeared_events`, `_diff_dataframes`) ŌĆö the diff is correct
- Touch `SnapshotStore` date semantics or storage format
- Touch `analytics_entity_engine.py` coalesce / argmax / measure code
- Touch `identity_engine.py` enrichment path
- Add a second knob / mode / strategy beyond the `full_refresh` bool ŌĆö
  keep the surface minimal
- Skip the diagnostic log lines ŌĆö they are load-bearing for user
  debugability and prevent future versions of this same bug from being
  silent
- Merge, tag, or publish ŌĆö human post-merge steps
"""
