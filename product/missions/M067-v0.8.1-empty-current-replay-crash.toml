# Mission: v0.8.1 — guard empty-diff replay against 0-row current tables
# Patch release. M066's v0.8.0 introduced "replay row_appeared on empty diff"
# to fix silent 0-rows-for-stable-StateSources. The replay unconditionally
# runs _make_appeared_events(current_table, ...) when events are empty AND
# previous is not None — but when current_table is ALSO 0 rows (empty
# placeholder sources), the downstream ibis.memtable(df) rejects the
# 0-row (and/or 0-column) DataFrame with "Provided table/dataframe must
# have at least one column".

id = "M067"
title = "v0.8.1 — guard empty-diff replay against 0-row current tables"
status = "draft"
created = 2026-04-23
depends_on = ["M066"]

[outcome]
description = """
M066's v0.8.0 replay-on-empty-diff fix
(src/fyrnheim/engine/snapshot_diff.py, the branch added around line 85-98
during M066-E001-S001) triggers when ``diff_snapshots`` returns an empty
events table AND a previous snapshot exists. It then calls
``_make_appeared_events(current_table.execute(), source_name, id_field,
snapshot_date.isoformat())`` to synthesize row_appeared events for every
current row.

**Regression reported 2026-04-23:** for StateSources whose upstream view
returns 0 rows (empty placeholders — e.g. ``SELECT ... FROM UNNEST([1])
LIMIT 0`` for Salesforce placeholder sources), the replay branch fires
(events is empty; previous exists from the cold-start save) and then
crashes with:

    Invalid Input Error: Provided table/dataframe must have at least
    one column

Three sources reproduce in production (timo-data-stack reporter):
``salesforce_accounts``, ``salesforce_contacts``,
``salesforce_opportunities``. All three are empty placeholders. All other
sources (with real data) replay fine.

**Root cause (to verify in Phase 1 but highly likely):** the ibis
``current_table`` over an empty UNNEST-based staging view executes to a
pandas DataFrame with 0 rows — and, depending on how the BigQuery /
DuckDB backend serialises the empty expression, possibly 0 columns.
Downstream ``ibis.memtable(df)`` (inside ``_make_appeared_events`` or
adjacent helpers in diff_engine.py) rejects 0-column frames.

**The fix aligns with v0.8.0's intent.** Replay was designed to make
downstream state-field materialization reflect the current state when
unchanged — for a 0-row current table, there's nothing to reflect. The
correct behavior is the pre-0.8.0 one for this specific case: return
the empty events table unchanged. This is NOT a behavior change for
conforming users; it's the 0.8.0 fix narrowed to its actual intent.

**Scope:**

1. Narrow the replay guard in ``SnapshotDiffPipeline.run()``: only replay
   when ``event_count == 0 AND previous is not None AND current row
   count > 0``. When current is also empty, skip the replay and return
   the empty events table.
2. Regression test: StateSource backed by a 0-row staging view, run the
   pipeline twice across two dates with persistent snapshot, assert the
   second run does not crash and returns an empty events table (not a
   synthetic row_appeared table).
3. Version bump 0.8.0 -> 0.8.1 via release-PR flow.

**What this mission must NOT do:** change the v0.8.0 behavior for
non-empty current tables (the M066 fix is still correct for stable data
with real rows). Do not touch diff_engine.py, snapshot_store.py, or any
other M066 surface beyond the single guard condition in
SnapshotDiffPipeline.run().
"""

user_progress = "From 'v0.8.0 replay-on-empty-diff crashes with Invalid Input Error on any StateSource whose upstream returns 0 rows (three Salesforce placeholders in production)' to 'v0.8.1 guards the replay against empty current tables — skip replay when nothing to replay — regression test pinned to 0-row StagingView'"

