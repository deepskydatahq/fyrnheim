[notes]
considerations = """
## Why this is a patch and not a minor

The v0.8.0 replay was intended to produce row_appeared events for
current rows when the diff is empty and state hasn't changed. A 0-row
current table has no rows to produce — the replay is a no-op that should
have returned the empty events table to begin with. Narrowing the guard
aligns with the v0.8.0 intent; no conforming user sees a behavior change.
Patch release is correct.

This respects the release-discipline rule: patch = "fix aligns with
documented/intended behavior, no behavior change visible to conforming
users."

## Reporter's field report (2026-04-23)

Production pipeline (timo-data-stack, fyrnheim 0.8.0) with three
Salesforce placeholder StateSources whose upstream staging views are
`SELECT ... FROM UNNEST([1]) LIMIT 0` — i.e. zero rows by construction.

First run: diff_snapshots sees `previous=None`, emits 0 row_appeared
events (correct — nothing in current). Snapshot saved as an empty
parquet file.

Second run: `previous` is the empty snapshot from run 1. diff_snapshots
emits 0 events (nothing in current, nothing changed). M066's replay
branch fires: `event_count == 0 AND previous is not None` → True →
attempts `_make_appeared_events(current_table.execute(), ...)`.

`current_table.execute()` for an empty UNNEST-based BigQuery view
returns a DataFrame that the downstream `ibis.memtable(df)` call
rejects with `Invalid Input Error: Provided table/dataframe must have
at least one column`. The reporter suspects the DataFrame either has
0 columns or 0 rows with column inference failing — Phase 1
investigation should capture whichever is the actual shape.

Three sources reproduce identically: `salesforce_accounts`,
`salesforce_contacts`, `salesforce_opportunities`. All other sources
with real data replay fine on v0.8.0.

The reporter has rolled back to v0.7.3 and flagged that M014 is
blocked until v0.8.1 ships. M014's mission TOML should gain a
`depends_on = ["M067"]` reference after this mission is accepted.

## Phase 1 investigation (for /plan-mission)

1. Add a 0-row StateSource fixture to a scratch test and verify the
   exact error (shape of the DataFrame that `current_table.execute()`
   returns — 0 columns or 0 rows, and which downstream call rejects
   it).
2. Confirm the guard is at `SnapshotDiffPipeline.run()` — simplest
   narrow fix — rather than inside `_make_appeared_events` (which
   would be a diff_engine.py change, expanding scope).
3. Verify the regression test runs on DuckDB locally AND that the
   existing e2e stack still handles empty StateSources correctly
   downstream of the skip-replay path (a 0-row events table flowing
   into identity_engine + analytics_entity_engine should produce a
   0-row entity output, which is correct behavior for an empty
   source).

## Phase 2 implementation sketch

```python
# src/fyrnheim/engine/snapshot_diff.py — modify the replay guard
event_count = int(events.count().execute())
current_count = int(current_table.count().execute())

if event_count == 0 and previous is not None and current_count > 0:
    events = _make_appeared_events(
        current_table.execute(),
        source_name,
        id_field,
        snapshot_date.isoformat(),
    )
    log.info(
        "StateSource %s: diff empty, replayed %d rows as row_appeared",
        source_name,
        current_count,
    )
elif event_count == 0 and previous is not None and current_count == 0:
    log.info(
        "StateSource %s: diff empty and current has 0 rows, skipping replay",
        source_name,
    )
else:
    log.info(
        "StateSource %s: diff produced %d events", source_name, event_count
    )
```

Consider refactoring for readability if the conditional chain gets
unwieldy, but preserve the log-variant contract from M066.

## Release shape (same as M063/M064/M065/M066)

- release/v0.8.1 branch
- single commit
- PR with post-merge-steps block
- human merges + tags + publishes
- CHANGELOG [0.8.1] with the Salesforce-placeholder reproduction

## Do NOT

- Touch diff_engine.py — the fix is a caller-side guard
- Touch analytics_entity_engine.py, identity_engine.py, pipeline.py,
  core/source.py, snapshot_store.py — M066's changes in those files
  are correct
- Alter the full_refresh flag or its plumbing
- Merge, tag, or publish — human post-merge steps
- Batch unrelated fixes — reporter confirmed this is the only known
  v0.8.0 regression
"""
