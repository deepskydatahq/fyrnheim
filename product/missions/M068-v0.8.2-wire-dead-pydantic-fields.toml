# Mission: v0.8.2 — wire dead SourceTransforms + StateSource.computed_columns
# Patch release. Two pydantic fields (`SourceTransforms` on both StateSource
# and EventSource; `computed_columns` on StateSource) are declared on the
# model layer but not read by the engine. They're dead code. Users who set
# them today see their configuration silently ignored. Wire them up so the
# engine honors the documented model surface.

