[notes]
considerations = """
## Transform application order (load-bearing decision)

The mission prescribes: `type_casts → divides → multiplies → renames →
computed_columns`. Rationale:

1. **type_casts first**: if a user casts `amount_cents` from int to
   decimal, the subsequent `divide` needs to operate on the cast type.
   Casting AFTER dividing would either fail or double-cast.
2. **divides / multiplies next**: these create suffixed columns
   (`amount_cents_amount` for a divide-by-100 into dollars). The
   original column stays. Renames can then touch either the original
   or the derived column.
3. **renames last** (among transforms): users can rename any column
   including the ones just produced by divides/multiplies.
4. **computed_columns AFTER transforms**: users write computed
   expressions against the post-transform schema. This matches how
   `computed_columns` already works on EventSource today — the current
   EventSource implementation has no transforms, so there's no existing
   contract to preserve; we're establishing the order forward-going.

The `test_computed_columns_see_transformed_columns` test pins this
order — if someone later reorders, the test fails loudly.

## Shared helper placement

Two reasonable options:
- **Option A**: module-level function at the top of
  `event_source_loader.py`. Pro: minimal file churn. Con: module name
  is misleading (it's not only event-specific).
- **Option B**: new file `src/fyrnheim/engine/source_transforms.py`
  with `_apply_source_transforms` (and any future helpers). Pro:
  clear scope. Con: +1 file.

Pick Option B. The helper is reused across both loaders and deserves
its own module; renaming later if we add more helpers (FR-4 filter,
FR-5 joins in M069) would touch both call sites anyway.

## Ibis ops per transform category

```python
def _apply_source_transforms(
    table: ibis.Table,
    transforms: SourceTransforms | None,
) -> ibis.Table:
    if transforms is None:
        return table

    # 1. type_casts
    for tc in transforms.type_casts:
        table = table.mutate(**{tc.field: table[tc.field].cast(tc.target_type)})

    # 2. divides (create suffixed column)
    for d in transforms.divides:
        new_col = f"{d.field}{d.suffix}"
        table = table.mutate(**{new_col: (table[d.field] / d.divisor).cast(d.target_type)})

    # 3. multiplies (create suffixed column)
    for m in transforms.multiplies:
        new_col = f"{m.field}{m.suffix}"
        table = table.mutate(**{new_col: (table[m.field] * m.multiplier).cast(m.target_type)})

    # 4. renames
    for r in transforms.renames:
        table = table.rename({r.to_name: r.from_name})  # ibis: new:old

    return table
```

Note on `table.rename` arg order: ibis's `.rename()` takes a dict of
`{new_name: old_name}`. The `Rename` model has `from_name` / `to_name`,
so the helper maps them correctly.

Double-check the Divide/Multiply model's `target_type` default: it's
`"decimal"` (source.py:37, 45). The cast step after the arithmetic
forces the result to decimal so downstream code gets a stable type
regardless of the source column's type.

## Computed column application in StateSource

Copy from event_source_loader.py:44-46:

```python
# In _load_state_source after _apply_source_transforms:
if source.computed_columns:
    for cc in source.computed_columns:
        table = table.mutate(**{cc.name: eval(  # noqa: S307
            cc.expression, {"ibis": ibis, "t": table}
        )})
```

The `eval` with `{"ibis": ibis, "t": table}` context is the existing
contract for EventSource. No behavior change; we're replicating it on
StateSource. The `noqa: S307` matches the existing EventSource code.

## Placement in `_load_state_source`

Current structure (pipeline.py:323-358):

```python
def _load_state_source(...):
    table = source.read_table(...)
    if source.full_refresh:
        # emit replay events ...
        return events
    # snapshot-diff path
```

New structure:

```python
def _load_state_source(...):
    table = source.read_table(...)
    table = _apply_source_transforms(table, source.transforms)
    if source.computed_columns:
        for cc in source.computed_columns:
            table = table.mutate(**{cc.name: eval(...)})
    if source.full_refresh:
        # emit replay events over TRANSFORMED table ...
        return events
    # snapshot-diff path over TRANSFORMED table
```

The transforms apply BEFORE the full_refresh / snapshot-diff split so
both paths see the same schema. This matters because:
- The snapshot is saved from the CURRENT table. If transforms apply
  only in the replay path, cold-start snapshots would store the
  pre-transform schema and the next run's diff would be against that
  pre-transform baseline — inconsistent.
- Identity resolution depends on `id_field`. If a user renames their
  id_field via transforms, `source.id_field` must reflect the
  post-transform name. The mission assumes users declare `id_field`
  as the POST-transform name; document this explicitly in the e2e
  test's implementation hint.

## Release-discipline rationale

Per feedback_release_discipline.md memory (2026-04-23):
- Patch = fix aligns with documented/intended behavior, no behavior
  change visible to CONFORMING users
- Users who set `transforms=...` on a StateSource today reasonably
  expect it to apply (that's the entire purpose of the field)
- Users who set `transforms=...` AND expected it to be ignored are
  non-conforming (contradictory setup)
- Therefore patch is correct

The release-discipline memory also says "batch patches, don't chain
patch releases." This mission bundles FR-1 and FR-2 into a single
patch — it does NOT chain with FR-3/FR-4/FR-5 (those are minor-bump
territory and go in M069). This is the correct batching: related
dead-field fixes in one patch.

