[outcome]
description = """
Two pydantic model fields are currently dead code:

1. **`SourceTransforms`** (src/fyrnheim/core/source.py:49-54, attached to
   BaseTableSource subclasses — StateSource, EventSource, and DerivedSource).
   Contains four transform categories: `type_casts`, `renames`, `divides`,
   `multiplies`. Declared in the pydantic layer with a full API surface;
   **never applied by the engine on ANY source path.** Neither
   `load_event_source` (src/fyrnheim/engine/event_source_loader.py:19-106)
   nor `_load_state_source` (src/fyrnheim/engine/pipeline.py:323-358) reads
   `source.transforms`.

2. **`StateSource.computed_columns`** (src/fyrnheim/core/source.py:170 —
   inherited from the `computed_columns: list[ComputedColumn]` field).
   EventSource's `load_event_source` already applies computed_columns via
   `table.mutate(**{cc.name: eval(cc.expression, ...)})` at
   event_source_loader.py:44-46. `_load_state_source` does NOT do the same
   — StateSource's computed_columns are silently dropped.

**Field report (2026-04-24, timo-data-stack Pydantic migration investigation):**
A migration effort to replace 7 SQL staging views with pydantic-declared
sources found that 0 of 7 files can migrate today, specifically because
these two fields are dead. FR-1 (SourceTransforms) and FR-2
(StateSource.computed_columns) from the feature-request brief are the
unblock for Phase 1 of the migration roadmap — `pardot_opportunities.sql`
(a pure column rename) and the computed-column half of
`pardot_lifecycle_history.sql`.

**Why this is a patch (v0.8.2) and not a minor:** no new API surface. The
fields are already documented in the pydantic models. Users setting them
today reasonably expect them to work. Enabling the engine to honor the
documented model surface is the fix-aligns-with-intent patch case. Per
the release-discipline memory: "patch = fix aligns with
documented/intended behavior, no behavior change visible to conforming
users."

**Scope (narrow):**

1. Add transform-application logic after `source.read_table(...)` in BOTH
   `load_event_source` and `_load_state_source`. Apply in a stable order:
   `type_casts` first (so downstream renames refer to the new type),
   then `divides` / `multiplies` (create `_amount` / `_value` suffixed
   columns), then `renames` last (so users can rename any column
   including the ones just added).
2. Copy the 3-line `computed_columns` application pattern from
   `event_source_loader.py:44-46` into `_load_state_source` (applied
   AFTER transforms, so users can reference transformed columns in
   their expressions).
3. New unit tests for each transform category on both source types.
4. New e2e test: a StateSource with transforms + computed_columns
   declared, assert the emitted events reflect the transformed schema.
5. Bump 0.8.1 -> 0.8.2 via the release-PR flow.

**What this mission must NOT do:**

- Add any new pydantic field (FR-3 `Field.json_path` wiring, FR-4
  source-level filter, FR-5 source-level joins). Those are minor-bump
  territory and will be handled in a separate mission M069 v0.9.0
  that needs `/plan-mission` for API design.
- Change how transforms compile — use Ibis-native ops only
  (`table.cast`, `table.rename`, `table.mutate`). No client-side pandas
  work that would break push-down.
- Touch DerivedSource. It inherits `transforms` from BaseTableSource but
  is loaded through a different path (source resolution in the staging
  layer); if applicable there, consider in a follow-up.
"""

