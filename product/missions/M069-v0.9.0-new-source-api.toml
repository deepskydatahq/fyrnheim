[notes]
considerations = """
## Planning-phase priorities

Three orthogonal API design questions. /plan-mission should tackle them
in order of blocking-impact-on-migration:

1. **FR-3 first** — unblocks pardot_accounts.sql (largest Pardot file,
   ~10 JSON extractions). Design question is contained: just the
   `source_column` default convention and where extraction fires.
2. **FR-4 second** — unblocks pardot_prospects.sql (half of it).
   Design question is mostly eval-syntax vs. structured-form.
3. **FR-5 last** — biggest scope, most open questions. Whether to
   defer is a live option.

## FR-3 design sketch

```python
class Field(BaseModel):
    name: str
    type: str = "STRING"
    json_path: str | None = None
    source_column: str | None = None  # NEW
    # ...existing fields...

# At source read time (in _apply_source_transforms or a sibling helper):
if source.fields:
    for f in source.fields:
        if f.json_path is not None:
            src_col = f.source_column if f.source_column else f.name
            table = table.mutate(**{
                f.name: _extract_json_path(table[src_col], f.json_path, f.type)
            })
```

Where `_extract_json_path` compiles the JSON path to the backend's
JSON-extract function (BigQuery JSON_VALUE, DuckDB json_extract, etc.).
Ibis has `.cast("json")[...]` primitives — use those for portability.

Open: what about Fields WITHOUT json_path? Current behavior is they're
descriptive-only metadata. Does this mission change that? Probably no —
Field has been "optional field metadata" since the model was added;
json_path is the only field with implied engine behavior. Keep the
scope tight.

## FR-4 design sketch

```python
class BaseTableSource(BaseModel):
    # ...existing fields...
    filter: str | None = None  # NEW — ibis-expression string

# In _apply_source_transforms (or after computed_columns — TBD):
if source.filter:
    pred = eval(source.filter, {"ibis": ibis, "t": table})  # noqa: S307
    table = table.filter(pred)
```

Same eval pattern as ComputedColumn. Matches users' mental model of
"Python-ish expressions against a table proxy `t`."

Open: apply BEFORE or AFTER computed_columns? Arguments both ways:
- AFTER: users can filter on computed columns (cleaner mental model)
- BEFORE: fewer rows through mutate (perf)

Recommendation for the planner: apply AFTER computed_columns. Perf
difference is negligible (Ibis pushes filter down through mutate if
possible; even if not, compute on N rows is fine). Mental-model
cleanness wins.

## FR-5 design sketch (if in scope)

```python
class Join(BaseModel):
    source: str  # the other source name OR a table reference
    on: str  # join predicate (ibis-expression string)
    how: Literal["left", "inner"] = "left"

class StateSource(BaseTableSource):
    # ...existing fields...
    joins: list[Join] = PydanticField(default_factory=list)
```

Bigger scope: the `source` field is the tricky part — does it
reference another declared source by name (requires registry lookup),
or a raw ibis.Table (how does the user get an ibis handle before the
pipeline runs?), or a duckdb path, or...

**Recommendation for /plan-mission**: start the planning session
biased toward **deferring FR-5** into a later mission. The Pardot
joins are "enrich with a lookup table" — a simple left-join pattern.
The right FIRST API for fyrnheim joins might be narrower than a
full Ibis-join surface, and the design needs real usage data.
Shipping FR-3 + FR-4 in v0.9.0 gives the field team 3 of 7 SQL
files migratable; FR-5 in v0.10.0 after design-learning from real
usage gives us a better join API.

If the planner agrees, M069's scope trims to FR-3 + FR-4 and a new
mission opens for FR-5 (call it M070 or similar) with explicit
"we've had X months of real-usage data, here's the minimum viable
API" framing.

## Release shape

**If all three ship:** v0.9.0 minor. Large CHANGELOG, consider RC
release to TestPyPI for field-team validation before GA push (per
release-discipline memory).

**If FR-3 + FR-4 only:** v0.9.0 minor, smaller surface, still worth
an RC if the json_path convention feels novel.

**If FR-3 only:** v0.9.0 minor (still new API); much smaller, RC
probably overkill.

The planner should pick the release shape based on scope resolution.

## Dependencies

Depends on M068 landing first:
- The shared `_apply_source_transforms` helper from M068 is where the
  filter / json_path / join application logic lives alongside
  transforms + computed_columns.
- Sequencing M068 → M069 avoids two missions touching the same helper
  in parallel.

## Do NOT

- Skip /plan-mission — this mission has real API design questions
- Ship FR-5 without deliberate design (it's the biggest surface and
  the reporter flagged it as "may belong in StagingView")
- Modify SnapshotDiffPipeline, diff_engine, analytics_entity_engine,
  identity_engine — these are the pipeline downstream of source
  loading and aren't affected by the new fields
- Merge the Pardot SQL migration itself — this mission ships the
  primitives; the user does the migration
- Merge, tag, publish — human post-merge steps
"""
