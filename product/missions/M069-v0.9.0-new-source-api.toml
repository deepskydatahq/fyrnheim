# Mission: v0.9.0 — source-level filter + Field.json_path wiring
# Minor release. Adds two NEW pydantic APIs that unblock Pardot SQL
# migration Phases 2 and 3:
#
#   FR-3: wire Field.json_path + add Field.source_column convention
#   FR-4: source-level WHERE filter (new `filter` field on StateSource/EventSource)
#
# FR-5 (source-level joins) is DEFERRED to M070 after /plan-mission M069
# exploration confirmed StagingView already covers that use case for
# BigQuery production and real-usage data from FR-3/FR-4 will inform the
# FR-5 API shape better than designing now.
#
# Status=ready (scope locked 2026-04-24 via /plan-mission).

id = "M069"
title = "v0.9.0 — Field.json_path wiring + source-level filter"
status = "ready"
created = 2026-04-24
planned = 2026-04-24
depends_on = ["M068"]

[outcome]
description = """
Follow-up to M068. That patch wired the two dead pydantic fields
(`transforms`, `computed_columns`) so the engine honors the existing
model surface. This minor release adds TWO new APIs that let users
declare more pipeline logic in pydantic instead of SQL staging views:

1. **FR-3 — `Field.json_path` wiring + new `Field.source_column`.**
   `Field.json_path` (src/fyrnheim/core/source.py:18) is declared
   today but never read by any engine code. Wire it at source read
   time. Add `Field.source_column: str | None = None` — when a Field
   has `json_path` set and `source_column` is None, the engine
   extracts from a column matching `Field.name`; when `source_column`
   is set, it extracts from that column explicitly. Unblocks
   `pardot_accounts.sql` (~10 JSON_VALUE(custom_type, '$.value')-shape
   extractions).

2. **FR-4 — source-level `filter`.** New `filter: str | None = None`
   field on `BaseTableSource` (applies to StateSource + EventSource +
   DerivedSource). When set, applied after transforms +
   computed_columns via the existing eval pattern — `eval(source.filter,
   {"ibis": ibis, "t": table})` then `table.filter(pred)`. Same
   expression syntax as ComputedColumn. Unblocks `pardot_prospects.sql`
   (`WHERE _fivetran_deleted != True`-shape row filter). Documented
   SQL three-valued-logic gotcha: `col != True` drops NULL rows
   silently — users can `.fillna(False)` if they want different
   semantics.

**FR-5 (source-level joins) deferred to M070.** /plan-mission
exploration on 2026-04-24 confirmed that StagingView already expresses
joins fully with arbitrary SQL + Jinja2 params + dependency ordering +
backend-agnostic execution. For the reporter's BigQuery production
environment StagingView is the right tool. The only added value from
source-level joins is "DuckDB-only local-dev users avoid writing SQL
for simple joins" — real but narrow. Deferring lets us design FR-5 in
M070 with real usage data from FR-3/FR-4 on the two Pardot migrations
they unblock.

**Migration impact after M068 + M069 ship:**

| SQL file | M068 | M069 | Blocks remaining |
|----------|------|------|------------------|
| pardot_opportunities.sql | ✓ | — | — |
| pardot_accounts.sql | — | ✓ (FR-3) | — |
| pardot_lifecycle_history.sql | partial | partial (FR-4 enables filter half) | joins (→ StagingView or M070) |
| pardot_prospects.sql | — | partial (FR-4 enables filter half) | joins (→ StagingView or M070) |
| ga4_* (3 files) | — | — | keep as SQL (aggregation-heavy per reporter) |

End state: 2 of 7 SQL files fully migrated after v0.9.0 (opportunities,
accounts). 2 of 7 partial (lifecycle_history, prospects — filter moves
to pydantic, joins stay in StagingView). 3 of 7 stay as SQL.

**Architecture (from /plan-mission exploration):**

- FR-3: extend `_apply_source_transforms` helper in
  src/fyrnheim/engine/source_transforms.py with a new branch that
  iterates `source.fields` and applies `json_path` extraction when
  set. New contract: `source.fields` becomes engine-consumed (today
  it's read-only metadata — no engine code iterates it).
- FR-4: new filter application step inside the same helper (or
  adjacent). Applied AFTER transforms AND computed_columns so users
  can filter on computed values. Uses the existing
  `eval(..., {"ibis": ibis, "t": table})` pattern with
  `# noqa: S307`.
- Both hooks land in `source_transforms.py` — the M068-landed helper
  is the natural extension point.

**Release discipline:** minor bump v0.9.0 (new API surface). Per the
release-discipline memory: consider TestPyPI RC release for
field-team validation before GA, since FR-3 introduces a new `fields`
engine contract.
"""

user_progress = "From 'Field.json_path dead, no source-level filter, Pardot SQL migration stuck at 1 of 4 files after M068 ships' to 'json_path wired with source_column convention, declarative source-level filter, 2 of 4 Pardot files fully migratable (opportunities + accounts), 2 of 4 partial (filter half of lifecycle_history + prospects, joins remain in StagingView pending M070)'"

