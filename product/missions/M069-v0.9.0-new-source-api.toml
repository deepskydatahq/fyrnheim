[notes]
considerations = """
## /plan-mission exploration findings (2026-04-24)

Four parallel explorations confirmed the scope-B decision:

### FR-3 (Field.json_path) — low-risk wiring

- `Field` at src/fyrnheim/core/source.py:12-18 has `json_path: str | None = None` already declared
- Zero engine code reads `.json_path` or iterates `source.fields` today
- Natural API: add `Field.source_column` defaulting to `Field.name`. When `json_path` is set: extract from `source_column` (or `name` if source_column is None), store as column `name`
- Existing JSON extraction pattern in analytics_entity_engine.py:106-144: `events.payload.cast("json")[field].unwrap_as("string")` — well-established. FR-3 uses the same pattern.
- Format decision for the implementer: minimum `$.top_level_key`; nested (`$.a.b.c`) is either supported via chained `[...]` access or explicitly deferred. Pick one, document in Field docstring.

### FR-4 (source-level filter) — lowest-risk

- eval pattern confirmed at event_source_loader.py:51 and pipeline.py:345 (post-M068): both use `{"ibis": ibis, "t": table}` context with `# noqa: S307`
- ComputedColumn expressions in practice: `"t.email.lower()"`, `'t.created_at.cast("date")'`, `"t.stage == 'Closed Won'"` — demonstrates users already write Ibis expressions as strings
- `eval("t._fivetran_deleted != True", {"ibis": ibis, "t": table})` works on both DuckDB and BigQuery (Ibis coerces Python bool to literal)
- **NULL gotcha**: `col != True` drops NULL rows via SQL three-valued logic. Document, don't fix. Users can `.fillna(False)` for different semantics.
- Ruff config doesn't include S307 check (bandit), so noqa is future-proofing

### FR-5 (joins) — confirmed deferral

- StagingView (core/staging_view.py) is full-featured: arbitrary SQL + Jinja2 params + depends_on + content-hash idempotency + backend-agnostic
- `BaseTableSource.upstream: StagingView | None` composes cleanly via coord-resolution (source.py:77-103)
- For BigQuery production (the reporter's environment), StagingView IS the right tool for joins
- Source-level joins only add value for DuckDB-only local-dev (avoid SQL). Narrow benefit.
- Designing the API now means locking into a shape before real usage data arrives — high regret risk
- M070 will plan FR-5 with 3 months of FR-3/FR-4 production usage data

### Architecture (from M068 hook exploration)

- M068's `_apply_source_transforms(table, transforms)` is the natural extension point
- FR-3 grows the helper: new signature `_apply_source_transforms(table, transforms, fields=None)` OR sibling helper — pick whichever keeps the orchestration cleaner
- FR-4 is a separate step after transforms + computed_columns (different semantic layer — filter operates on a fully-resolved table)
- Full order after M069: read_table → transforms (casts/divides/multiplies/renames) → json_path extraction → computed_columns → filter → [branch to EventSource-entity-mapping or StateSource-full_refresh/snapshot_diff]

## Release shape

v0.9.0 minor. Per release-discipline memory:
- Behavior change visible to users who had `Field(json_path=...)` declared — but that's the intended fix, not a regression
- Consider TestPyPI RC release before GA (the memory specifically recommends this for semantic shifts with new API surface)
- Single commit on release/v0.9.0 branch
- Post-merge-steps block pointing at PyPI verification

If the PR reviewer wants an RC: tag `v0.9.0rc1` from the branch first, verify on TestPyPI, then merge + tag `v0.9.0`. Planner's call during execution.

## Architectural placement — json_path inside SourceTransforms vs. separate

Open implementation detail (not a blocker):
- Grow `SourceTransforms` with a json_paths list (reorganizes existing model)
- Or iterate `source.fields` independently inside the helper (leaves SourceTransforms untouched, adds a separate branch)

Recommendation: the latter. `SourceTransforms` is for single-table ops; `Field.json_path` is field-level metadata that happens to trigger an extraction. Keeping them separate preserves the semantic layer: transforms = "how to reshape columns"; Field.json_path = "how to derive this field's value".

## Pipeline order after M069 (full stage)

```
table = source.read_table(...)
table = _apply_source_transforms(table, source.transforms)
  # casts → divides → multiplies → renames
table = _apply_json_path_extractions(table, source.fields)  # NEW M069
  # iterate fields with json_path, extract into named columns
if source.computed_columns:
    for cc in source.computed_columns:
        table = table.mutate(...)
if source.filter:  # NEW M069
    table = table.filter(eval(source.filter, {"ibis": ibis, "t": table}))
# Then: EventSource does entity_id/ts/payload mapping; StateSource goes
# to full_refresh or snapshot_diff branch.
```

All five stages apply to both EventSource and StateSource identically.

## Do NOT

- Add FR-5 (joins) — deferred to M070
- Touch snapshot_diff.py, diff_engine.py, snapshot_store.py,
  analytics_entity_engine.py, identity_engine.py
- Skip documenting the NULL-gotcha on filter (users will hit it)
- Attempt framework-level NULL-safety (SQL three-valued logic is the
  contract; users can `.fillna(False)` per-case)
- Ship without considering a TestPyPI RC — this is semantic API
  surface expansion
- Merge, tag, or publish — human post-merge steps
"""
