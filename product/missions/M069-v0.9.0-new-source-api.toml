# Mission: v0.9.0 — new source-level API surface for declarative pipelines
# Minor release. Bundles three NEW pydantic APIs that unblock migrating
# Pardot SQL staging views to declarative pydantic sources:
#
#   FR-3: wire Field.json_path + add Field.source_column convention
#   FR-4: source-level WHERE filter (new `filter` field on StateSource/EventSource)
#   FR-5: source-level JOIN declarations (new `joins` field on StateSource)
#
# Status=draft. Needs /plan-mission for API design before execution.

id = "M069"
title = "v0.9.0 — declarative filter + joins + json_path source API"
status = "draft"
created = 2026-04-24
depends_on = ["M068"]

[outcome]
description = """
Follow-up to M068. That patch wired two dead pydantic fields (`transforms`,
`computed_columns`) so users get what they already declared. This mission
adds three NEW APIs that give users new expressive power to move SQL
staging views into the pydantic layer.

**Field context (timo-data-stack migration investigation 2026-04-24):**
After M068 ships, 1 of 7 SQL files can migrate (pardot_opportunities.sql
— pure rename). The remaining Pardot files need:

- **pardot_accounts.sql** — JSON_VALUE(custom_type, '$.value') extractions
  for ~10 columns. Needs FR-3.
- **pardot_prospects.sql** — WHERE _fivetran_deleted != True filter +
  JOIN lifecycle_history + lifecycle_stage. Needs FR-4 + FR-5.
- **pardot_lifecycle_history.sql** — computed transition_type CASE
  (already enabled by M068) + double JOIN lifecycle_stage for prev/next
  stage names. Needs FR-5.

This mission bundles the three feature requests because:
1. All three add new pydantic API surface (minor bump, same release)
2. Migrating the Pardot SQL files is a coherent user goal — shipping
   them piecemeal across two minors (e.g. 0.9.0 = filter, 0.10.0 =
   joins) would stall the migration
3. The three APIs are orthogonal — filter/joins/json_path don't
   interact tightly and can be designed independently within one
   mission

**GA4 sources stay as SQL** per reporter's own assessment (aggregation-
heavy, SQL is the right tool for GROUP BY + COUNTIF + ARRAY_AGG).

**Three open API design questions (to resolve in /plan-mission):**

**FR-3 — json_path wiring:**
- Current `Field.json_path` is a dead field (declared, never read).
- The reporter proposed adding `Field.source_column` so a Field can
  say "extract `$.value` from the `custom_type` column".
- Open: should `Field.source_column` default to `Field.name` (i.e. extract
  from the column that matches the field's name)? That's the
  simplest case but breaks if multiple JSON extractions target the
  same source column (pardot_accounts has 10 fields all extracting
  from different `custom_*` columns).
- Open: should wiring happen at source-read time (produces columns)
  or at event-payload-pack time (produces payload keys)? The
  reporter's brief implies the former but the latter matches how
  state fields work downstream.

**FR-4 — source-level filter:**
- New field `filter: str | None = None` (or structured form)
  on BaseTableSource, applied after read_table + transforms.
- Open: ibis-expression string (`"t._fivetran_deleted != True"`)
  evaluated via `eval(...)` — consistent with ComputedColumn's
  eval pattern but uses string input — OR an Ibis expression
  object passed directly (harder to serialize in TOML/YAML
  configs).
- Open: apply before or after computed_columns? Applying after
  lets users filter on computed columns; applying before is
  cheaper (fewer rows through the mutate).

**FR-5 — source-level joins:**
- New field `joins: list[Join] = []` on StateSource.
- Open: the reporter flagged this as "may be better as a
  StagingView feature than a source-level feature." StagingView
  is the existing SQL-file primitive. The question: do we want
  declarative joins in pydantic at all, or should joins stay in
  StagingView (SQL) and only simple sources stay in pydantic?
- Open: if we DO add source-level joins, how do users express
  join conditions? Ibis joins are rich (left/right/outer/inner,
  on predicates, multi-column keys). A minimal first-version
  would support left-join only, single-column key, structured
  config.
- Open: interaction with `upstream: StagingView`. Can a source
  have BOTH an upstream StagingView AND joins? (Probably
  redundant — the StagingView already expresses the join.)

These design questions MUST be resolved in /plan-mission before
execution. Possible outcomes:

- All three ship in v0.9.0
- FR-3 + FR-4 ship in v0.9.0; FR-5 deferred (design lands on
  "joins belong in StagingView, not source-level")
- FR-3 alone ships in v0.9.0 as a smaller minor; FR-4 + FR-5 ship
  in v0.10.0 after more design

The planner picks the split based on design-question resolution and
scope estimates.

**Migration impact after this mission ships (assuming all three):**

| SQL file | Migratable? | Blocking feature |
|----------|-------------|------------------|
| pardot_opportunities.sql | Already (M068) | — |
| pardot_accounts.sql | Yes | FR-3 |
| pardot_lifecycle_history.sql | Yes | FR-5 (double join) |
| pardot_prospects.sql | Yes | FR-4 + FR-5 |
| ga4_marketing.sql | Keep as SQL | — (aggregation) |
| ga4_sessions.sql | Keep as SQL | — (aggregation) |
| ga4_anon_attributes.sql | Keep as SQL | — (aggregation) |

End state: 4/7 migrated to pydantic, 3/7 kept as SQL. Matches the
reporter's pragmatic split.
"""

