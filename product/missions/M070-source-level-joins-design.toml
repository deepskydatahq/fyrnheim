[notes]
considerations = """
## History

Original feature-request brief 2026-04-24 from the timo-data-stack
Pardot migration identified three new source APIs:
- FR-3 (Field.json_path wiring + Field.source_column)
- FR-4 (source-level filter)
- FR-5 (source-level joins)

/plan-mission M069 explored FR-5 against the existing StagingView
primitive and concluded:

1. StagingView (core/staging_view.py) is full-featured — arbitrary SQL
   + Jinja2 params + depends_on + content-hash idempotency + backend-
   agnostic execution
2. For BigQuery production (the reporter's environment), StagingView
   IS the right tool for joins
3. Source-level joins only add convenience for DuckDB-only local-dev
   users who want to avoid SQL
4. Designing the Join API before real usage data is high regret risk

Per /plan-mission M069 exploration (2026-04-24):

> If users today can put arbitrary JOIN SQL in a StagingView and attach
> it via upstream=, what's the NEW expressive power a `joins: [Join(...)]`
> field would add that StagingView doesn't already cover? Be concrete —
> if the answer is "none for BigQuery users, lets DuckDB-only users
> avoid writing SQL" that's a fair answer.

The answer was essentially "none for BigQuery users." So M069 shipped
FR-3 + FR-4 only; FR-5 deferred here.

## When to open /plan-mission M070

Wait for at least one of these signals:

1. **Real-usage data**: M069 ships, timo-data-stack (or another adopter)
   uses Field.json_path + filter on multiple sources for 3+ months, and
   reports back with "we wish we could do X join declaratively."
2. **Second adopter**: a new team hits the same Pardot-shape migration
   problem and independently wants source-level joins. Two requests beats
   one speculative design.
3. **StagingView limitation**: someone hits a concrete StagingView pain
   point (not joins themselves, but the SQL-file workflow) that would
   be cleanly solved by source-level joins.

Absent any of these, this mission stays in draft — not a backlog-rot
risk because StagingView serves the join use case.

## Candidate minimum-viable Join API (from /plan-mission M069 analysis)

If this mission does ship:

```python
class Join(BaseModel):
    \"\"\"Declarative left-join of another source for row enrichment.

    Minimum viable shape: left-join only, single-column equality key,
    source-name-based lookup. For wider join patterns (inner/outer/
    right, multi-column keys, non-equality predicates), use StagingView.
    \"\"\"
    source_name: str  # reference another declared source by name
    join_key: str  # column present in both tables (single-column equality)
    how: Literal["left"] = "left"  # locked to left-join for v1

class StateSource(BaseTableSource):
    # ...existing fields including M068 transforms, M069 json_path + filter...
    joins: list[Join] = PydanticField(default_factory=list)
```

Pipeline-stage placement (per M069 analysis):

```
table = source.read_table(...)
for j in source.joins:  # NEW M070 — apply BEFORE transforms
    other = registry.resolve_source(j.source_name).read_table(...)
    table = table.left_join(other, predicates=table[j.join_key] == other[j.join_key])
table = _apply_source_transforms(table, source.transforms)
# ... rest of M068/M069 stages ...
```

Open: how does the registry get resolved when the pipeline runner
processes sources in order? Probably requires source-name → ibis.Table
mapping built during pipeline setup. Design at /plan-mission time, not
now.

## Do NOT

- Plan this mission before M069 has shipped and had real usage
- Expand scope to multi-backend join optimization, StagingView refactor,
  or DerivedSource-style post-identity joins
- Ship a Join API without a user who actually needs it
- Compete with StagingView as the recommended tool for complex joins
"""
