# Mission: source-level joins on StateSource (deferred from M069)
# Draft — requires real-usage data from M069's FR-3 + FR-4 before design
# lock-in. Plan opening this after v0.9.0 has had 3+ months of production
# usage so the API shape is informed by actual patterns, not speculation.
#
# The original M069 feature-request brief (2026-04-24) flagged this as
# "may be better as a StagingView feature than a source-level feature."
# /plan-mission M069 confirmed StagingView already covers joins for
# BigQuery production and deferred FR-5 to get real-usage data first.

id = "M070"
title = "source-level joins on StateSource (post-M069 design evaluation)"
status = "draft"
created = 2026-04-24
depends_on = ["M069"]

[outcome]
description = """
**Deferred from M069.** The original timo-data-stack Pydantic migration
brief (2026-04-24) requested three new source APIs; /plan-mission M069
locked M069 scope to FR-3 (`Field.json_path`) and FR-4 (source-level
filter) and deferred FR-5 (source-level `joins`) to this mission.

**Why deferred:**

- `StagingView` (src/fyrnheim/core/staging_view.py) already expresses
  arbitrary joins via full SQL + Jinja2 parameterization + dependency
  ordering + content-hash idempotency + backend-agnostic execution.
  For BigQuery production users, StagingView IS the right tool for joins.
- Source-level joins only add value for DuckDB-only local-dev users who
  want to avoid writing SQL for simple lookup joins. Real but narrow.
- Designing the Join API before real usage data lands is high
  regret-risk — `Join(source_name, join_key, how="left")` is the
  floor per /plan-mission analysis, but we don't yet know whether
  users need multi-key joins, computed-column joins, or more join
  types once they start using FR-3/FR-4.

**When to re-evaluate this mission:**

- After M069 (v0.9.0) has been in production for 3+ months
- When users have declared `Field.json_path` + `filter` on multiple
  sources and have concrete "I wish I could join this with that" use
  cases
- When the reporter (or another field team) comes back with specific
  join patterns that StagingView doesn't serve cleanly

**Open questions for the planner (to resolve with real-usage data):**

1. **Is the API actually needed?** After M069 ships, do BigQuery users
   still ask for joins, or is StagingView + FR-4 filter enough? If
   StagingView-for-joins holds up, this mission closes as
   "won't-fix — use StagingView."

2. **If needed, what's the minimum shape?** /plan-mission M069 analysis
   suggested `Join(source_name, join_key, how="left")` — left-join
   only, single-column equality, source-name lookup only. Confirm or
   revise with actual user patterns.

3. **Where does the join apply in the pipeline stage?** Before
   transforms (so transforms can rename joined columns) or as its own
   layer? /plan-mission M069 suggested "before transforms"; confirm
   with real implementation.

4. **Interaction with `upstream: StagingView`**: a source can declare
   both — redundant? Restrictive validation? Same-backend-only?

5. **`source_name` resolution**: how does a Join reference another
   source? Registry lookup in the pipeline runner? Raw ibis handle?
   Serialization story for TOML configs?

**What this mission must NOT do:**

- Ship before M069 has real usage data (3+ months minimum)
- Design for hypothetical unicorns (multi-key joins, inner/outer
  joins, self-joins) without user-driven justification
- Expand scope to DerivedSource or StagingView refactoring
- Compete with StagingView as the recommended primitive for
  complex joins (StagingView stays the recommended tool for
  BigQuery production joins)

**Estimated release shape (subject to design):** patch if the Join API
is truly minimal (just a helper), minor if any new model / validator /
pipeline-layer change. Lean toward minor given "new pydantic surface."
"""

