[outcome]
description = """
Add a source-level join API to fyrnheim. Closes FR-5 from the
client-flowable M012 Pydantic migration brief (originally 2026-04-24,
revisited with real-usage data 2026-04-25).

**Scope (Option A from /plan-mission, minimum viable):**

```python
class Join(BaseModel):
    \"\"\"Declarative left-join of another source for row enrichment.\"\"\"
    source_name: str  # name of another StateSource/EventSource declared in the same pipeline
    join_key: str  # column name present in BOTH the left source and the right source

class StateSource(BaseTableSource):
    # ...existing fields...
    joins: list[Join] = PydanticField(default_factory=list)
```

Left-join only, single-column equality, source-name-based lookup,
multiple joins per source allowed. Bigger ambitions (multi-key,
inner/right/outer, ON-predicate filters, raw-table refs) are
deliberately out of scope; if a user hits them, they'll come back
and we'll plan a follow-up.

**Why this scope (locked 2026-04-25 via /plan-mission):**

Reporter has 2 SQL files blocked by FR-5 absence:

1. **`pardot_lifecycle_history.sql`** — TWO LEFT JOINs on `lifecycle_stage`
   (self-join, prev/next stages), single-column equality each. Plus
   CASE expressions referencing joined columns (covered by existing
   `computed_columns`). **Minimum-viable Join API covers this fully.**

2. **`pardot_prospects.sql`** — LEFT JOIN with `lh.prospect_id = p.id
   AND lh.rn = 1`. The `rn = 1` is a filter on a `ROW_NUMBER()`
   window-function CTE result. **Minimum-viable Join API does NOT
   cover this** — but the blocker isn't the join syntax, it's
   `ROW_NUMBER()` in a CTE. That's a window-function concern (separate
   mission). Workaround: keep a tiny StagingView for the ROW_NUMBER
   CTE, then source-level join from that.

So the reporter's framing in their 2026-04-25 table ("FR-5 unblocks
the last 2 SQL files") is overoptimistic. **FR-5 alone unblocks
`pardot_lifecycle_history.sql`. `pardot_prospects.sql` becomes
StagingView-for-ROW_NUMBER + source-level-joins-for-the-rest.** This
is a partial migration but cleaner than the current full-SQL state.

**Pipeline-stage placement (locked, load-bearing):**

```
read_table → transforms → [JOINS] → json_path → computed_columns → filter → branch
                          ↑ NEW (M070)
```

Joins after `transforms` so users can join on renamed columns. Joins
before `json_path` so users can extract JSON from joined columns if
they want. Joins skip on the M072 fixture-shadow path (the fixture is
post-everything, including post-join).

**Source-load-order: NEW topological sort.**

Today sources load in user-declared order (see `pipeline.py:153-181`,
ThreadPoolExecutor with conn-lock). With joins, source B's
`Join(source_name="A")` requires A loaded first. The pipeline runner
must topologically sort sources by their inferred join dependencies.
Reuses the algorithm pattern from `staging_runner._topo_sort()` (which
already does this for StagingViews). Cycles raise a clear error.

**Lazy source registry: NEW `name → ibis.Table` dict.**

Phase 1 of the pipeline builds a dict as sources load. When a source
with `joins=[...]` is processed, it looks up each `source_name` in the
dict to get the joined ibis.Table. Same connection (`conn`), same
backend (`config.backend`), same `data_dir` — so the joined-side read
already happened with the same context.

**Validation: `upstream` + `joins` mutually exclusive.**

Pydantic validator on BaseTableSource (or on the source classes
individually) raises a validation error if both `upstream:
StagingView` AND `joins: list[Join]` are non-empty. Reason: `upstream`
already provides a pre-joined warehouse view; adding declarative
joins on top is ambiguous (which applies first?). Document migration
path: pick one or the other.

**Migration impact after v0.12.0:**

| SQL file | M068 | M069 | M072 | M074 | M070 | Status |
|----------|------|------|------|------|------|--------|
| pardot_opportunities.sql | ✓ | — | — | — | — | fully migrated |
| pardot_accounts.sql | — | partial | ✓ | ✓ | — | fully migrated |
| pardot_lifecycle_history.sql | partial | partial | ✓ | — | **✓** | fully migrated |
| pardot_prospects.sql | — | partial | partial | — | partial | StagingView-for-ROW_NUMBER + pydantic |
| ga4_* (3 files) | — | — | — | — | — | keep as SQL (aggregation) |

End state after v0.12.0: 4/7 fully migrated, 1/7 partial (StagingView
+ pydantic), 3/7 stay as SQL. **All 4 Pardot sources move into the
pydantic layer to some degree.**

**Release shape:** minor v0.12.0 (new API surface). Per release-
discipline memory: TestPyPI RC available for field-team validation
before GA — planner's call during PR.
"""

