[notes]
considerations = """
## /plan-mission exploration findings (2026-04-25)

Three parallel explorations confirmed the Option A scope decision:

### Source registry / pipeline orchestration

- Sources discovered via `_discover_assets()` (cli.py:106-187) into a flat list in declaration order
- Phase 1 loads sources sequentially via ThreadPoolExecutor with conn-lock (pipeline.py:153-181)
- NO topological sort for sources today (StagingView has one in staging_runner.py:40-72; sources don't)
- Cleanest design: lazy registry pattern (`name → ibis.Table` dict) populated as Phase 1 progresses + topological sort inferred from `joins[].source_name`
- Reuse staging_runner._topo_sort algorithm; the cycle-detection logic is already battle-tested

### Actual SQL patterns (key decision-driver)

**pardot_lifecycle_history.sql** (full SQL excerpts captured during exploration):
- TWO LEFT JOINs on lifecycle_stage (self-join — prev_ls + next_ls)
- Single-column equality each: `prev_ls.id = lh.previous_stage_id`, `next_ls.id = lh.next_stage_id`
- Plus CASE expressions referencing joined columns (already supported by computed_columns)
- **Fully covered by `Join(source_name='lifecycle_stage', join_key='id')` × 2**

**pardot_prospects.sql**:
- LEFT JOIN with multi-part ON clause: `lh.prospect_id = p.id AND lh.rn = 1`
- `rn` comes from a `ROW_NUMBER() OVER (PARTITION BY prospect_id ORDER BY created_at DESC)` in a CTE
- **Window function is the actual blocker, NOT join syntax**. Even if we shipped multi-key joins or ON-predicate filters, ROW_NUMBER would still need a window-function expression — separate mission

### Pipeline-stage interaction (M072 + M074 contracts)

- Joins go BETWEEN transforms and json_path: `transforms → [JOINS] → json_path → computed_columns → filter`
- M072 fixture-shadow path: skip transforms+json_path+filter currently; M070 extends to skip joins too
- `upstream + joins` validator: Pydantic validation error (mutually exclusive declarative paths)

## Implementation order (tight)

1. **Pydantic models** in core/source.py:
   - Add `Join` BaseModel with `source_name: str` and `join_key: str`
   - Add `joins: list[Join] = []` to StateSource (and EventSource if e2e needs it)
   - Add `model_validator` checking mutual exclusion of `upstream` and `joins`

2. **Helper** `_apply_joins(table, joins, source_registry)` in source_transforms.py:
   ```python
   def _apply_joins(
       table: ibis.Table,
       joins: list[Join],
       source_registry: dict[str, ibis.Table],
   ) -> ibis.Table:
       for j in joins:
           if j.source_name not in source_registry:
               raise ValueError(
                   f\"Join references source {j.source_name!r} which has not \"
                   \"been loaded. Check declaration order or for a typo.\"
               )
           other = source_registry[j.source_name]
           table = table.left_join(
               other,
               predicates=[table[j.join_key] == other[j.join_key]],
           )
       return table
   ```

3. **Topological sort** for source-load order in pipeline.py:
   - Build dep graph: `{src.name: {j.source_name for j in src.joins} for src in sources}`
   - Kahn-style sort (mirror staging_runner._topo_sort)
   - Return ordered list; raise on cycle

4. **Pipeline registry** in pipeline.py Phase 1:
   - `loaded_sources: dict[str, ibis.Table] = {}` initialized at Phase 1 start
   - Each source's loaded table written to registry AFTER all its transforms/joins/json_path/computed_columns/filter complete
   - Joins look up dependencies in the registry — by topological order this is always populated

5. **Pipeline gates** in event_source_loader.py + pipeline.py _load_state_source:
   ```python
   reads_fixture = _reads_duckdb_fixture(source, backend)
   if not reads_fixture:
       table = _apply_source_transforms(table, source.transforms)
       table = _apply_joins(table, source.joins, source_registry)  # NEW M070
       table = _apply_json_path_extractions(table, source.fields)
   if source.computed_columns:
       for cc in source.computed_columns: ...
   if not reads_fixture and source.filter:
       table = table.filter(...)
   ```

6. **Diagnostic logging** when joins fire (similar shape to M068/M072 patterns)

7. **Tests**:
   - 4 unit tests for `_apply_joins` helper
   - 4 topological-sort tests
   - 1 Pydantic validator test (upstream+joins mutex)
   - 1 e2e test for pardot_lifecycle_history-shape (double-join on the same source)
   - Total: ~10 new tests

8. **Version bump + CHANGELOG**: 0.11.0 → 0.12.0; CHANGELOG Added + Notes including the ROW_NUMBER caveat for pardot_prospects-shape sources

## Pre-execution dependency: M074 must merge first

M070 stacks on the M074 nested-json_path baseline. Before launching M070 execution, merge PRs #141 + #142 (v0.11.0) so v0.12.0 starts from a clean v0.11.0 main. If the user wants to plan further before merging M074, that's fine — execution can wait.

## Release shape

v0.12.0 minor — new API surface (Pydantic Join model, joins field, validator, source registry, topological sort). Per release-discipline memory: minor with new API → consider TestPyPI RC for field-team validation. Recommend offering RC in the PR body; reviewer (or user) decides.

## Why scoped this tight

The exploration showed that even \"minimum viable\" gets the user 1 of 2 unblocked files cleanly. Going wider (multi-key, ON-predicates) doesn't help the OTHER file (which is blocked by ROW_NUMBER, a separate concern). So expanding scope buys nothing for the reporter. Ship Option A; if the reporter then says \"now we need window functions in computed_columns,\" that's a clean follow-up mission with its own design space.

## Do NOT

- Add multi-key joins, inner/right/outer joins, ON-predicate filters, or raw-table refs (deferred per Option A scope)
- Add window-function support in computed_columns (separate mission)
- Touch snapshot_diff.py, diff_engine.py, snapshot_store.py, analytics_entity_engine.py, identity_engine.py, staging_runner.py internals (importing topo-sort algorithm is OK, modifying it is not)
- Migrate the actual Pardot SQL files (user's work after v0.12.0 ships)
- Merge, tag, or publish — human post-merge steps
