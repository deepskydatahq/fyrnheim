[notes]
considerations = """
## Phase 1 investigation checklist

Use the superpowers:systematic-debugging skill.

1. Minimal reproduction (already captured during retro):
   ```python
   df = pd.DataFrame({'id': [1, 2, 3], 'score': [3.14, 2.71, 1.41]})
   t = ibis.memtable(df)
   ```
   → `ibis.memtable(df).execute()['id'].dtype` — what does this return?
   If float64, the promotion happens in the ibis memtable path.
   If int64, the promotion happens later.

2. Check the SnapshotStore round-trip:
   ```python
   store.save('src', date, t)
   back = store.get_previous('src', date + timedelta(days=1))
   back.execute()['id'].dtype
   ```
   → if int64 going in but float64 coming out, parquet round-trip is
   the culprit.

3. Check `_make_appeared_events`:
   ```python
   events = _make_appeared_events(cur_df, 'src', 'id', '2026-01-01')
   events[0]['entity_id']
   ```
   → what does this return given the df has int64 dtype?

4. Narrow to the smallest layer. Fix there.

## Candidate fix shapes per layer

**Layer A (ibis.memtable.execute preserves int):** may require wrapping
`current_table.execute()` with an explicit dtype-preservation step, or
filing upstream ibis if their memtable implementation promotes ints.
Check ibis version first — 12.0.0 may have a known issue.

**Layer B (SnapshotStore round-trip preserves int):** explicit dtype
passing through parquet. pandas `to_parquet` preserves int64; `read_parquet`
might promote on null. Check for nulls in id columns.

**Layer C (`_make_appeared_events` preserves int):** defensive at the
stringification point. Add a helper:

```python
def _stringify_id(v) -> str:
    \"\"\"Stringify a scalar preserving int-shape.

    Pandas may silently promote int64 columns to float64 during
    round-trips — str(np.float64(1.0)) = '1.0'. When a value is
    a float with no fractional part, treat it as int for the
    purposes of building a stable id string.
    \"\"\"
    if isinstance(v, float) and v.is_integer():
        return str(int(v))
    return str(v)
```

Layer C is the most defensive and has the smallest blast radius. Layer
A / B are more principled but may require upstream fixes. **Recommend
Layer C** for the v0.9.1 patch; file a follow-up for A/B if worth
fixing there.

## Why patch (not minor)

- No API change
- Fix aligns with documented intent (entity_ids for int sources were
  always meant to be int-shaped — the bug is silent wrong behavior)
- Users upgrading see correct behavior on their next run; any dependent
  system that cached float-shaped ids sees a one-time correction
- Per release-discipline memory: "patch = fix aligns with
  documented/intended behavior"

