# Mission: v0.9.1 patch — preserve int-shape for integer id columns
# Field bug reported during /retro on 2026-04-24. StateSource with int64
# id column emits entity_id as "1.0" (float-string) instead of "1"
# (int-string). Breaks identity resolution silently for any source with
# integer ids — a core correctness bug that surfaced when the M069 agent
# flagged it and the evaluator's weak assertion missed it.
#
# Status=draft — root cause location is unclear (pandas/ibis/parquet
# dtype chain). Phase 1 investigation must isolate the layer before
# Phase 2 fix.

id = "M071"
title = "v0.9.1 — preserve int-shape for integer id columns in SnapshotDiffPipeline"
status = "draft"
created = 2026-04-24
depends_on = []

[outcome]
description = """
**Bug:** SnapshotDiffPipeline emits `entity_id = "1.0"` (float-string)
instead of `"1"` (int-string) when the source's `id_field` is an int64
column. Reproduced during /retro 2026-04-24 with a 3-row fixture on
v0.9.0:

```python
df = pd.DataFrame({'id': [1, 2, 3], 'score': [3.14, 2.71, 1.41]})
t = ibis.memtable(df)
r1 = pipe.run('src', t, id_field='id', snapshot_date=datetime.date(2026,1,1))
# r1 entity_ids == ['1.0', '2.0', '3.0']  — should be ['1', '2', '3']
```

**Impact:** Breaks identity resolution for any StateSource with integer
ids. `identity_engine.resolve_identities` compares entity_ids as strings,
so `'1.0' != '1'` — any downstream system that expects int-shaped string
keys (joins, mappings, explicit id references, cross-pipeline entity
matching) silently produces wrong results.

Pre-existing bug, not caused by M066/M067/M068/M069. Surfaced during
M069 test-writing; the M069 agent flagged it in their implementation
notes; the evaluator's probe used weak assertions (`len==2`) that didn't
reach the exact string shape. Retro reproduced it with a minimal
fixture.

**Root cause (suspected, needs confirmation in Phase 1):** somewhere in
the `current_table.execute()` → pandas DataFrame → `_make_appeared_events`
path, pandas silently promotes int64 → float64. Then
`diff_engine._make_appeared_events:96` does `str(row[id_field])`, and
`str(np.float64(1.0))` = `"1.0"`.

Candidate promotion sites (Phase 1 must isolate):
1. `ibis.memtable(pd.DataFrame).execute()` — ibis memtable → pandas
2. `SnapshotStore.save/get_previous` parquet round-trip (saving then
   loading may lose int precision if any null appears)
3. `_make_appeared_events` iteration over the DataFrame

**Scope (narrow, patch-shaped):**

1. Phase 1: systematic-debugging trace of the int→float promotion.
   Identify the exact layer and the conditions under which it fires.
2. Phase 2: fix at the correct layer. Candidate fixes:
   - Preserve int64 through ibis.memtable.execute() (if that's where it
     promotes — may require upstream ibis fix or a wrapper)
   - Preserve int64 through SnapshotStore parquet round-trip (explicit
     dtype-preserving save/load)
   - Add an int-aware stringification helper in
     `_make_appeared_events` (defensive: if value is float-with-no-
     fractional-part, cast to int before str)
3. Regression test (`typedata-ta1i` already filed): StateSource with
   int64 id column, assert entity_ids are int-shaped strings.
4. Ship as v0.9.1 patch via release-PR flow.

**Not in scope:**
- Broader dtype-preservation refactor (M020-adjacent; keep narrow)
- Changes to identity_engine or analytics_entity_engine
- Any new API surface (patch = no API changes)
- Batching with other patches (snapshot_grain / UnionSource decisions are
  separate missions; do not mix with a narrow bug fix)

**Release discipline:** patch v0.9.1 per release-discipline memory. This
is strictly fix-aligns-with-intent — identity_ids for int sources were
always meant to be int-shaped strings; the promotion is silent wrong
behavior.
"""

