# Mission: v0.10.0 ‚Äî backend-aware fixture shadowing (FR-8)
# Minor release. Addresses the final v0.9.0 migration gap from the
# client-flowable M012 Pydantic migration report (2026-04-24):
# StateSource fixtures on duckdb_path serve as post-transform snapshots,
# but the engine re-applies transforms/fields/filter on DuckDB, failing
# because pre-transform column names don't exist in the fixture.
#
# Status=ready (scope is clear from the reporter's brief + my design read
# on 2026-04-24). Single new boolean field, one conditional guard, narrow
# test matrix.

id = "M072"
title = "v0.10.0 ‚Äî backend-aware fixture shadowing on StateSource (FR-8)"
status = "ready"
created = 2026-04-24
depends_on = ["M071"]

[outcome]
description = """
Follow-up to the M069 migration-gap report (2026-04-24, client-flowable
M012 Pydantic migration). v0.9.0 shipped FR-1 through FR-4 but only 1
of 7 SQL staging views migrated to pydantic ‚Äî the `pardot_opportunities`
pure-rename case. Three more Pardot sources (`pardot_accounts`,
`pardot_prospects`, `pardot_lifecycle_history`) are blocked by a design
tension between `duckdb_path` fixtures and `transforms`/`fields`/`filter`.

**The tension (from the reporter's report):**

A StateSource with `duckdb_path` serves two purposes:
1. **On BigQuery**: reads `project.dataset.table` (raw upstream), applies
   `transforms` + `fields` (json_path) + `filter` to produce the final
   shape.
2. **On DuckDB**: reads `duckdb_path` parquet fixture, which ALREADY has
   the final post-transform column shape.

v0.9.0's engine applies transforms unconditionally on both backends.
This forces fixture authors to choose:
- (a) Keep fixtures in raw-BQ shape (JSON columns, pre-rename ids, etc.)
  ‚Äî ugly, unreadable, harder to debug
- (b) Skip `transforms`/`fields`/`filter` entirely ‚Äî can't migrate from SQL

Neither is workable. Reporter tried (a) and reverted.

**The fix (Option B from /plan-mission-style exploration):**

Add a new explicit opt-in field on `BaseTableSource`:

```python
duckdb_fixture_is_transformed: bool = PydanticField(
    default=False,
    description=(
        "When True AND the source reads from `duckdb_path` AND the "
        "backend is DuckDB, the engine SKIPS `transforms`, `fields` "
        "(json_path extraction), and `filter` at source read time. "
        "Use this when your parquet fixture is a post-transform snapshot "
        "of the BigQuery output ‚Äî the fixture IS the final shape. "
        "WARNING: if the fixture does NOT match the post-transform BQ "
        "output, DuckDB-only runs will produce wrong results with no "
        "backend-parity error. Caught only by cross-backend tests. "
        "Default False preserves v0.9.0 behavior (apply transforms on "
        "both backends)."
    ),
)
```

When the flag is True and the backend is DuckDB and `duckdb_path` is the
read source: skip `_apply_source_transforms`, skip
`_apply_json_path_extractions`, skip the `filter` step. The fixture is
assumed to be in post-transform shape; all five declarative stages are
a no-op on DuckDB. Output remains backend-parity-equivalent as long as
the fixture was generated correctly from BQ.

**Why explicit opt-in (not auto-magic):**
- Users who declare `transforms` on a DuckDB-production source
  (DuckDB-as-backend, not DuckDB-as-fixture) still want transforms to
  apply ‚Äî auto-magic based on `duckdb_path`-presence would break them
- Explicit `duckdb_fixture_is_transformed=True` makes the fixture-
  semantics visible in the source declaration ‚Äî future readers can
  tell the fixture is post-transform without having to inspect the
  parquet schema
- Aligns with release-discipline memory: "behavior change = minor"
  but an opt-in default=False keeps the v0.9.0 behavior for
  non-opting-in users; no surprise row-count jumps

**Migration impact after v0.10.0 ships:**

| SQL file | M068 | M069 | M072 | Remaining blocker |
|----------|------|------|------|-------------------|
| pardot_opportunities.sql | ‚úì | ‚Äî | ‚Äî | ‚Äî (shipped in M068) |
| pardot_accounts.sql | ‚Äî | ‚Äî | ‚úì (FR-8) | ‚Äî |
| pardot_lifecycle_history.sql | partial | partial | ‚úì (FR-8) | joins (StagingView path) |
| pardot_prospects.sql | ‚Äî | partial | ‚úì (FR-8) | joins (StagingView path) |
| ga4_* (3 files) | ‚Äî | ‚Äî | ‚Äî | keep as SQL (aggregation-heavy) |

End state: 4/7 SQL files fully migrated to pydantic (all Pardot sources
use declarative pydantic for transforms+extraction+filter; the two that
need joins keep their StagingView SQL but the pydantic model is now
clean). 3/7 stay as SQL (GA4 aggregations). Matches the reporter's
pragmatic split and the original /plan-mission M069 end-state target.

**Weakens the case for M070 (source-level joins):** the reporter's
report explicitly notes "Without FR-5, those 2 files keep their
StagingView SQL but skip the JSON/rename transforms via the pydantic
model" ‚Äî i.e. FR-8 + StagingView-for-joins is a workable alternative
to FR-5. M070 stays deferred with LESS urgency than before.
"""

user_progress = "From 'v0.9.0 shipped FR-1 through FR-4 but only 1 of 7 SQL files migrated ‚Äî the fixture shape vs. transforms tension blocks 3 more' to 'explicit duckdb_fixture_is_transformed opt-in flag skips transforms/fields/filter when a DuckDB fixture is already post-transform, unblocking pardot_accounts/prospects/lifecycle_history migrations'"

