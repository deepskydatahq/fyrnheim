[notes]
considerations = """
## Design rationale (from 2026-04-24 reporter discussion)

The client-flowable M012 Pydantic migration report (product/missions/
M012-artifacts/fyrnheim-feature-requests.md) surfaced the tension after
v0.9.0 shipped:

- **FR-1 (transforms) + FR-3 (json_path) + FR-4 (filter)** work perfectly
  on BigQuery where the source is the raw upstream table.
- They BREAK on DuckDB when the `duckdb_path` fixture is a post-transform
  snapshot, because the raw column names don't exist in the fixture.
- The reporter tried (a) raw-shape fixtures and reverted ‚Äî "ugly,
  unreadable fixtures" with JSON columns and pre-rename ids hurt
  development velocity.
- The reporter proposed FR-8 as "skip transforms/fields/filter when
  duckdb_path + DuckDB". After design review: prefer explicit opt-in
  field over implicit "when duckdb_path is set" behavior, because some
  users run DuckDB as a PRODUCTION backend (not just fixture) and want
  transforms to apply.

## Why the flag default is False

- Preserves v0.9.0 behavior exactly for non-opting-in users
- Forces users who want the skip to declare it explicitly in the source
  model ‚Äî makes the fixture-semantics visible at the declaration site
  (a reader can tell "this source's DuckDB fixture is post-transform"
  without inspecting the parquet)
- Aligns with release-discipline memory: new API surface = minor, but
  default=False means no surprise row-count jumps for existing users

## Why computed_columns still apply

The reporter's FR-8 proposal said "skip transforms, fields, and filter
entirely" but did not mention `computed_columns`. Thinking it through:

- `transforms` = how the raw column shape maps to the target shape
  (cast / rename / derive). If the fixture is already in the target
  shape, transforms are a no-op or would fail (reporter's case).
- `fields (json_path)` = same story ‚Äî the fixture's JSON extraction has
  already happened.
- `filter` = row-level predicate. The fixture may or may not already
  have been filtered. AMBIGUOUS case. Reporter's pardot_prospects
  fixture IS pre-filtered (no `_fivetran_deleted=True` rows), so
  applying the filter a second time is a no-op. In general, whether
  filter-has-been-applied is part of "post-transform" semantics ‚Äî let's
  group it with transforms and skip it on the flag.
- `computed_columns` = user-defined derived expressions. They're
  evaluated AT READ TIME against the table shape. They're NOT bakeable
  into the fixture because the expression can reference runtime state
  (e.g. `datetime.now()` or an environment-dependent value). Even if
  the user's expression is pure (`t.a + t.b`), re-evaluating on DuckDB
  yields the same result as BQ would ‚Äî backend-parity holds. **No
  reason to skip.** Keep active on the skip path.

Document this decision explicitly in the CHANGELOG Notes so users know
computed_columns ISN'T bypassed.

## Gate condition details

The skip should fire when ALL of:
1. `source.duckdb_fixture_is_transformed is True`
2. `config.backend == "duckdb"`  (from ResolvedConfig, not from
   conn.name ‚Äî ResolvedConfig is the single source of truth for backend
   identity per pipeline.py conventions)
3. The source is ACTUALLY reading from `duckdb_path` and not a live
   table. Check: `source.duckdb_path is not None AND source.table is
   None`, OR more robustly: match whatever path `source.read_table`
   would take given the config. If `source.read_table` internally
   decides between parquet-file and live-table reads, the skip gate
   should mirror that logic.

Verify by reading `BaseTableSource.read_table` in source.py:105-160 (or
wherever it lives) and replicating its branch decision.

## Alternative naming considered

- `duckdb_fixture_is_transformed` (chosen) ‚Äî explicit, long, clear
- `fixture_is_transformed` ‚Äî shorter but ambiguous about backend
- `skip_transforms_on_fixture` ‚Äî imperative, describes the action not
  the state
- `duckdb_fixture_shape: Literal["raw", "transformed"] = "raw"` ‚Äî more
  extensible (allows future shapes) but heavier API

Picked `duckdb_fixture_is_transformed` because it describes the FIXTURE
STATE, not the engine action ‚Äî matches pydantic model conventions
(declare state, engine reacts).

## Release discipline

**Minor bump v0.10.0** per release-discipline memory (new API surface).
Default=False preserves behavior, so no surprise breaking changes. RC
on TestPyPI is recommended per the memory for semantic API additions ‚Äî
planner's call during PR open.

## Release-flow rituals

Mirrors M066/M068/M069 minor-release shape:
1. `git branch -m release/v0.10.0`
2. Claim Beads
3. Implement: field on BaseTableSource + gate in both loaders + logging + tests
4. `uv lock` + CHANGELOG
5. Verify clean
6. Single commit
7. Close Beads, push, open PR
8. STOP ‚Äî human merges/tags/publishes

## Do NOT

- Skip computed_columns on the flag path ‚Äî they're backend-independent
  expressions, not transforms
- Make the flag auto-magic (infer from duckdb_path presence) ‚Äî explicit
  opt-in is the point
- Add per-feature skip flags (skip-transforms, skip-fields, skip-filter
  separately) ‚Äî scope creep without use-case justification
- Modify source_transforms.py internals ‚Äî the flag gates CALLS to the
  existing helpers
- Ship before M071 (v0.9.1 int64 fix) ‚Äî v0.10.0 should sit on a clean
  int-shape baseline, and stacking the int bug on top of the new API
  makes the blast radius harder to reason about
- Merge, tag, or publish ‚Äî human post-merge steps
"""
