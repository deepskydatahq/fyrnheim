# Mission: v0.10.1 patch — remove dead StateSource.snapshot_grain field
# Closes retro Beads task typedata-9qus (P2). The field is declared on
# StateSource (Literal["hourly","daily","weekly"] = "daily") but the
# engine never reads it — SnapshotStore always writes per-date regardless
# of grain. Only DAG visualization displays the attribute. Silent-lie
# pattern: users setting snapshot_grain="hourly" get daily snapshots with
# no warning. Option B from /retro analysis: remove + document.
#
# Status=ready (scope locked from /retro Beads analysis 2026-04-24, user
# picked Option B 2026-04-25).

id = "M073"
title = "v0.10.1 — remove dead StateSource.snapshot_grain field"
status = "ready"
created = 2026-04-25
depends_on = []

[outcome]
description = """
Closes retro Beads `typedata-9qus`. `StateSource.snapshot_grain:
Literal["hourly", "daily", "weekly"] = "daily"` (src/fyrnheim/core/
source.py:194) is declared but the engine never reads it. Verified
during /retro 2026-04-24:

- 4 reader sites — all in `src/fyrnheim/visualization/dag.py` for
  DISPLAY only (lines 30, 173, 302, 767)
- Zero engine readers in snapshot_store.py / snapshot_diff.py /
  diff_engine.py / pipeline.py
- `SnapshotStore.save()` writes per-date parquet regardless of grain

Silent-lie semantic: a user declaring `snapshot_grain="hourly"`
expects hourly snapshots; gets daily ones with no error or warning.
Same pattern as M068's `transforms` + `computed_columns` (which we
chose to wire) and M069's `Field.json_path` (which we chose to wire).

**For snapshot_grain we choose Option B (remove)** based on /retro
analysis (2026-04-24, user-confirmed 2026-04-25):

1. **Wiring (Option A)** is non-trivial. SnapshotStore would need
   datetime-granular filenames; diff_engine would need to know which
   previous snapshot to compare against per grain (today's-hour vs.
   yesterday-end vs. last-week — picks differ). Real implementation,
   not a small wiring fix.
2. **Narrowing to Literal["daily"] (Option C)** lies-by-omission. We
   still display "Snapshot Grain: daily" in DAG viz; users see the
   attribute and ask "why can't I set hourly?" The cleaner signal is
   to remove the surface entirely.
3. **Removal (Option B)** is honest: "we don't support sub-daily
   granularity yet; here's the path forward when there's demand."
   Smallest change, no silent-lie risk, leaves a clean opening for a
   future M0xx that wires it properly when a real user asks for it.

**Why patch (v0.10.1) and not minor:**

Pydantic v2 default is `extra='ignore'`. No `model_config` overrides it
on BaseTableSource/StateSource (verified 2026-04-25). So removing the
field means:
- Users who NEVER set `snapshot_grain`: identical behavior (still daily)
- Users who set `snapshot_grain="hourly"` expecting hourly: continue
  to get daily (the silent-lie was the bug; removal preserves the
  exact pre-removal behavior since the field was a no-op anyway)
- Users who set it expecting it to be ignored: continue to have it
  ignored (Pydantic now ignores it via extra='ignore' default rather
  than via a declared-but-unused field)

**Zero observable behavior change for any user category.** This is
strictly fix-aligns-with-intent — the documented intent was "you can
declare snapshot grain"; the actual behavior was "daily only." Removing
the field aligns the surface with the actual behavior. Per release-
discipline memory: patch release.

**Migration note for CHANGELOG:** if you have `snapshot_grain="..."`
in your StateSource declarations, you can remove it. Pydantic will
silently ignore the unknown field if you don't, so no immediate
upgrade pressure.

**Scope (narrow):**
1. Remove the field declaration from StateSource (source.py:194)
2. Remove 4 reader sites in dag.py (lines 30, 173, 302, 767)
3. Remove TestStateSourceSnapshotGrain class from tests/test_state_event_source.py (5 tests: defaults_to_daily, hourly, daily, weekly, invalid_raises)
4. CHANGELOG [0.10.1] Removed entry with the silent-lie context + future-enhancement pointer
5. Version bump 0.10.0 → 0.10.1 via release-PR flow
"""

