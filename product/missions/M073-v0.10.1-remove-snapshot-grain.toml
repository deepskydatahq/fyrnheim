## Pydantic extras handling (verified 2026-04-25)

```
$ grep -n "model_config\|extra=" src/fyrnheim/core/source.py
(no matches)
```

No `model_config` set → Pydantic v2 default `extra='ignore'`. Removing
the field means existing configs with `snapshot_grain=...` silently
ignore the value on v0.10.1+. No upgrade error. This is the soft-
landing path that justifies a patch release rather than a minor.

## Why this is a patch and not a minor

Per release-discipline memory:
- Patch = fix aligns with documented intent, no behavior change visible to conforming users
- Minor = new features OR semantic shifts

Removing `snapshot_grain`:
- For users who never set it: identical behavior (still daily — never anything else)
- For users who set it to "hourly"/"weekly": continue getting daily (the silent-lie WAS the bug)
- For users who set it to "daily" and never expected anything else: continue getting daily
- The model surface shrinks, but no observable behavior changes

→ patch v0.10.1 is correct. The "API surface shrinks" concern is mitigated by Pydantic's extras=ignore default.

