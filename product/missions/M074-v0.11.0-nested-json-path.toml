description = """
**Production impact**: client-flowable reporter (2026-04-25) flagged
that `assigned_to_email` (extracted via `Field(json_path="$.user.email",
source_column="created_by")`) is silently NULL on their BigQuery
pipeline. Root cause: M069's `_apply_json_path_extractions` regex
rejects multi-segment paths and raises ValueError at pipeline setup —
the reporter's BigQuery run is presumably masking the ValueError as
a NULL column somewhere in their wrapper.

M069 documented this as a deliberate scope limit:
> "Top-level paths (`$.<key>`) are supported; nested paths (`$.a.b`)
>  raise ValueError as a future-enhancement signal — file a future-
>  enhancement request to extend fyrnheim's json_path wiring."

The reporter has filed it. M074 ships nested path support.

**Scope (narrow)**:

1. **Regex update** in `src/fyrnheim/engine/source_transforms.py`:
   - From: `^\\$\\.[a-zA-Z_][a-zA-Z0-9_]*$` (single segment only)
   - To: `^\\$(\\.[a-zA-Z_][a-zA-Z0-9_]*)+$` (one OR more dot-segments)
2. **Extraction logic update**: parse all segments, chain
   `[key1][key2]...[keyN]` subscripts on the JSON value before
   `unwrap_as(ibis_type)`. Verified on DuckDB 2026-04-25 with ibis
   12.0.0: `t.payload.cast('json')['user']['email'].unwrap_as('string')`
   compiles cleanly and round-trips correctly.
3. **Field docstring update** to remove the "top-level only" caveat;
   document the new dot-notation contract + the still-unsupported
   bracket notation.
4. **Tests**: 2-segment, 3-segment, single-segment regression,
   invalid forms (bracket notation, empty segment, trailing dot).
5. **CHANGELOG [0.11.0] entry** noting the relaxation + the M069
   future-enhancement request close-out.
6. **Bracket notation deferred**: `$['key']` and `$.array[0]` still
   raise ValueError. Document as a separate future enhancement.
   Single user (the reporter) needs dot-notation only; brackets are
   speculative.

**Why minor (v0.11.0) not patch:**

M069 explicitly documented nested paths as raising ValueError and
called the future enhancement out by name. This mission delivers the
documented future feature. Per release-discipline memory: "new
features OR semantic shifts → minor."

The relaxation is strictly additive: existing top-level paths
continue to work unchanged; previously-rejected nested paths now
succeed; bracket notation continues to raise (still scope-limited).
No behavior change for existing users; new capability for users with
nested-shape JSON.

**Backend coverage**:

DuckDB chained-subscript verified during planning. BigQuery should
work the same way — `BQ.JSON_VALUE(col, '$.user.email')` is the
established BQ pattern, and ibis maps `cast('json')['user']['email']`
to it. If the reporter validates on BQ post-merge, file any
discrepancy as a v0.11.1 patch.
"""

