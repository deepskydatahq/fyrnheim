# Mission: v0.11.0 — nested json_path support ($.user.email)
# Reporter (client-flowable, 2026-04-25) flagged that assigned_to_email
# is silently NULL on BigQuery because M069's json_path wiring deliberately
# rejected nested paths and raised ValueError. Production data loss.
# Lifts the M069 scope limit; ships nested path support for the dot-
# notation case.

