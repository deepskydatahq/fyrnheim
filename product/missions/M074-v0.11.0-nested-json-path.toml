## Implementation sketch

```python
# src/fyrnheim/engine/source_transforms.py
import re

# Old: single-segment only
# _JSON_PATH_TOPLEVEL = re.compile(r\"^\\$\\.[a-zA-Z_][a-zA-Z0-9_]*$\")

# New: one or more dot-segments
_JSON_PATH_DOT_NOTATION = re.compile(
    r\"^\\$(\\.[a-zA-Z_][a-zA-Z0-9_]*)+$\"
)


def _parse_json_path_segments(json_path: str) -> list[str]:
    \"\"\"Return the list of dot-segment keys, or raise ValueError.\"\"\"
    if not _JSON_PATH_DOT_NOTATION.match(json_path):
        raise ValueError(
            f\"json_path {json_path!r} is not a supported dot-notation path. \"
            \"Supported forms: $.<key> or $.<key1>.<key2>... where each key is \"
            \"a Python-identifier-style token. Bracket notation \"
            \"($['key'], $.array[0]) is not yet supported — file a \"
            \"future-enhancement request if needed.\"
        )
    # Strip leading '$' and split on '.'
    return [seg for seg in json_path[1:].split(\".\") if seg]


def _apply_json_path_extractions(table, fields):
    if not fields:
        return table
    for f in fields:
        if f.json_path is None:
            continue
        segments = _parse_json_path_segments(f.json_path)
        ibis_type = _FIELD_TYPE_TO_IBIS.get(f.type)
        if ibis_type is None:
            raise ValueError(...)  # existing logic
        source_col = f.source_column or f.name
        # Chain subscript access
        expr = table[source_col].cast(\"json\")
        for key in segments:
            expr = expr[key]
        expr = expr.unwrap_as(ibis_type)
        table = table.mutate(**{f.name: expr})
    return table
```

Note: the regex uses `(\\.<segment>)+` so the segments list is
non-empty after parsing (the regex requires at least one segment).
The empty-segment filter in `_parse_json_path_segments` is defense-
in-depth — the regex shouldn't allow them through, but the filter
handles edge cases like `$.` (rejected by regex) or `$..a` (rejected
by regex because `..` produces an empty segment between two dots,
which fails `[a-zA-Z_][a-zA-Z0-9_]*`).

## Reporter-shape test

```python
def test_json_path_two_segment_reporter_regression():
    \"\"\"Reporter regression test: $.user.email shape.

    Client-flowable reporter (2026-04-25) flagged that
    assigned_to_email was silently NULL on BigQuery because M069's
    nested-path ValueError fired. M074 supports the dot-notation
    form so this case extracts correctly.
    \"\"\"
    df = pd.DataFrame({
        \"created_by\": [
            '{\"user\":{\"email\":\"alice@flowable.com\"}}',
            '{\"user\":{\"email\":\"bob@flowable.com\"}}',
        ],
    })
    table = ibis.memtable(df)

    fields = [Field(
        name=\"assigned_to_email\",
        type=\"STRING\",
        json_path=\"$.user.email\",
        source_column=\"created_by\",
    )]

    result = _apply_json_path_extractions(table, fields)
    assert \"assigned_to_email\" in result.columns
    assert result.execute()[\"assigned_to_email\"].tolist() == [
        \"alice@flowable.com\",
        \"bob@flowable.com\",
    ]
```

## Why bracket notation stays out of scope

- Single requesting user (the reporter) needs dot-notation only
- JSONPath bracket syntax is a separate spec scope (quoted strings,
  numeric indices, slices)
- ibis chained subscript on JSON arrays might or might not work the
  same way; needs separate verification
- Adding both at once doubles the test matrix and design surface
- Per the release-discipline memory: ship the smallest minor that
  unblocks the reporter; iterate on bracket notation if a second user
  asks

