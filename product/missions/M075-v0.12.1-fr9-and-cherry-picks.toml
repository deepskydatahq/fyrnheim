[outcome]
description = """
Bundle two concerns into one patch release.

**Part 1 — FR-9 (Option A from /plan-mission discussion 2026-04-25):**

M072 (v0.10.0) shipped `duckdb_fixture_is_transformed` with the rule
\"computed_columns ALWAYS APPLY on the skip path because they're
backend-independent expressions.\" That assumption was incomplete:
computed expressions can reference upstream-pipeline outputs (joins,
json_path extractions, renames) that DO skip on the fixture-shadow
path. When a computed expression references a missing input, it
fails — exactly what the reporter hit migrating
`pardot_lifecycle_history.sql`:

```python
ComputedColumn(name=\"transition_type\", expression=\"...t.name_pardot_lifecycle_stage_next_stage_id...\")
```

On BigQuery: joins apply → suffix column exists → expression evaluates fine.
On DuckDB+fixture: joins skip → suffix column missing → expression fails.

But the fixture ALREADY has `transition_type` pre-computed (the user
saved a post-everything snapshot from BQ). So the right semantics is:
**when the computed_column's output already exists in the table,
preserve the fixture's value rather than recomputing.**

Implementation (Option A — locked 2026-04-25 by user):

```python
# In event_source_loader.py and _build_state_source_table
if source.computed_columns:
    for cc in source.computed_columns:
        if reads_fixture and cc.name in table.columns:
            log.info(
                \"StateSource %s: computed_column %s skipped (output \"
                \"already in fixture)\",
                source.name, cc.name,
            )
            continue
        table = table.mutate(
            **{cc.name: eval(cc.expression, {\"ibis\": ibis, \"t\": table})}
        )
```

Per-column granularity. Backward-compatible for users without the flag.
For users WITH the flag: any computed_column whose output already
exists in the fixture is preserved as-is; columns missing from the
fixture still get computed.

**Part 2 — v0.12.0 release misses (cherry-pick from orphan
release/v0.12.0 branch, commit 488d6eb):**

The PR #143 feedback agent caught 4 issues AFTER the v0.12.0 tag was
pushed. Its commit is on a re-created remote branch we deleted during
cleanup, so the fixes never landed on main. Cherry-pick:

1. **`fyrnheim.__version__` was `\"0.1.0\"` in v0.12.0 on PyPI.** Never
   synced from `pyproject.toml` across the full release arc.
   Users doing `import fyrnheim; print(fyrnheim.__version__)` got
   `\"0.1.0\"`. Update to `\"0.12.1\"` AND add a comment explaining the
   manual-sync requirement (or a future mission to derive from
   `importlib.metadata`).

2. **`tests/test_package.py`** version pin stale at `\"0.1.0\"` —
   update to `\"0.12.1\"`.

3. **`tests/test_e2e_joins.py`** bypassed production path (read parquet
   directly instead of going through `_build_state_source_table`).
   Strengthen to use the registry contract; pin `{\"Lead\",
   \"Qualified\"}.issubset(row0_joined_names)` instead of just
   counting.

4. **`tests/test_source_transforms.py`** — new
   `test_apply_joins_missing_right_pk_registry_raises_clear_error`
   for the uncovered branch.

**Part 3 — Cleanup:**

Delete the orphan `origin/release/v0.12.0` branch as a post-merge
step.

**Why patch (v0.12.1) and not minor:**

FR-9 is a refinement of M072's existing contract, not a new API. No
new fields, no new validators. Conforming users (those whose
computed expressions don't reference upstream-pipeline outputs OR
whose fixture has all output columns) see no change.

The v0.12.0 cherry-picks are all bug-shaped: version-string
correctness, test-coverage gap, test-bypass-of-production-path.

Per release-discipline memory: \"patch = fix aligns with documented
intent, no behavior change visible to conforming users.\" ✓

**Migration impact:**

After v0.12.1, `pardot_lifecycle_history.sql` migrates from SQL
StagingView to fully declarative pydantic with computed_columns
referencing joined-suffix columns. Reporter's end state shifts:

| SQL file | M068 | M069 | M072 | M074 | M070 | M075 | Status |
|----------|------|------|------|------|------|------|--------|
| pardot_opportunities.sql | ✓ | — | — | — | — | — | fully migrated |
| pardot_accounts.sql | — | partial | ✓ | ✓ | — | — | fully migrated |
| pardot_lifecycle_history.sql | partial | partial | ✓ | — | ✓ | **✓** | fully migrated |
| pardot_prospects.sql | — | partial | partial | — | partial | — | StagingView for ROW_NUMBER + pydantic |
| ga4_* (3 files) | — | — | — | — | — | — | keep as SQL |

End state v0.12.1: 3/7 fully migrated, 1/7 partial, 3/7 stay as SQL.
"""

