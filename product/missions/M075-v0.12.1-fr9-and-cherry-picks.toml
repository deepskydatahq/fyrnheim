After M075 v0.12.1 merges, delete the orphan `origin/release/v0.12.0`
branch:
```
git push origin --delete release/v0.12.0
```
Include this in the PR body's post-merge-steps block. NOT
auto-execute — human step (delete after verifying the cherry-picked
content is in v0.12.1).

## Worktree-while-feedback-running workflow lesson

This mission exists partly because we cleaned up worktrees while a
fix-pr-feedback agent was still running on PR #143. The agent
recreated the worktree post-cleanup and pushed to a re-created
remote branch — but v0.12.0 was already tagged + published, so the
fixes never landed.

Worth promoting this as a sub-agent convention alongside `typedata-
hw1o` (worktree path) and `typedata-3yxa` (grep-for-all-sites)
into a CLAUDE.md \"sub-agent conventions\" section. File a Beads
ticket OR bundle into the existing CLAUDE.md docs ticket
(typedata-hw1o + typedata-3yxa).

## Release-flow rituals

Same as M063/M067/M071/M073:
1. `git branch -m release/v0.12.1`
2. Claim Beads
3. Cherry-pick 488d6eb (or manually re-apply 4 fixes)
4. Implement FR-9 in event_source_loader.py + pipeline.py
5. Update __version__ to 0.12.1
6. Add FR-9 tests + verify M072 tests still pass
7. `uv lock` + CHANGELOG
8. `uv run pytest && uv run ruff check src/ tests/ && uv run mypy src/`
9. Single commit: `fix(M075): FR-9 computed_column skip-if-exists + v0.12.0 misses (v0.12.1)`
10. Close Beads, push, open PR (orchestrator)
11. STOP — human merges/tags/publishes; human deletes orphan branch

## Worktree path reminder

Use relative paths for EDITS. Absolute paths to the main repo hit
main, not the worktree (M068 lesson). `pwd` to confirm.

