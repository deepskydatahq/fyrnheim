[notes]
considerations = """
## /plan-mission discussion 2026-04-25 (lightweight)

Reporter flagged FR-9 with concrete proposal. I evaluated three options:
- A: per-column skip when output exists (reporter's proposal)
- B: uniform skip of all computed_columns on fixture-shadow path
- C: explicit per-column opt-out flag

User picked Option A. Rationale: surgical, backward-compatible for
non-fixture-shadow users, leaves room for partial-fixture cases, and
matches the reporter's mental model (\"the fixture has it, so use it\").

## Why bundle FR-9 with v0.12.0 cherry-picks

Per release-discipline memory: \"batch patches when feasible.\" Both
concerns are narrow, both ship as patches, both touch overlapping
files (pipeline.py for FR-9; __init__.py + test files for cherry-
picks). Single v0.12.1 release is cleaner than two consecutive
patches. Reporter unblocked sooner.

## Pre-existing tests that need verification

Existing M072 tests in tests/test_m072_fixture_shadowing.py:
- test_event_source_computed_columns_apply_on_skip_path
- test_state_source_computed_columns_apply_on_skip_path

These assert computed_columns ALWAYS apply when fixture-shadow fires.
Under M075 Option A the rule becomes \"apply UNLESS output exists in
fixture.\" The tests' fixtures should NOT contain the computed-column
output (otherwise they'd break under the new behavior — fixture's
value would override the recomputation).

The implementation agent should:
1. Read these existing tests
2. Verify the test fixtures don't have the computed-column output
3. If they DO have it, update the fixture (remove the column) so the
   computed_column applies as intended; document in commit body

## __version__ sync history

`fyrnheim.__version__` has been wrong since some prior release. The
agent's investigation found it was `\"0.1.0\"` shipped on v0.12.0;
likely also wrong on v0.8.0-v0.11.0 (just no one noticed). M075
fixes to `\"0.12.1\"`. Future mission could automate via
importlib.metadata to prevent drift — file as Beads after M075 ships.

## Cherry-pick mechanics

The 4 fixes are in commit `488d6eb` on `origin/release/v0.12.0`. The
implementation agent has two options:
- (a) `git cherry-pick 488d6eb` and resolve conflicts (likely none
  since the v0.12.0 release branch was based on the same main HEAD
  pre-merge)
- (b) Re-apply the 4 fixes manually (described in detail above)

Recommended: (a) — preserves attribution and intent. After cherry-
pick, manually update the version-string from \"0.12.0\" (which
488d6eb set) to \"0.12.1\" (M075's target).

