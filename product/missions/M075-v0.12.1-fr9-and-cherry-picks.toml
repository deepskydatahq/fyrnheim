# Mission: v0.12.1 patch — FR-9 + cherry-pick v0.12.0 misses + version sync
# Bundles two unrelated-but-narrow concerns:
#
#   1. FR-9 (reporter's 2026-04-25 follow-up) — when fixture-shadow fires
#      and a computed_column's output already exists in the fixture, skip
#      the computed_column. Refines M072's "computed_columns always apply"
#      contract to handle the case where computed expressions reference
#      upstream-pipeline outputs (joins/json_path/transforms) that DID skip.
#      Unblocks pardot_lifecycle_history.sql migration to pydantic.
#
#   2. v0.12.0 release misses — `fyrnheim.__version__ = "0.1.0"` shipped to
#      PyPI; test_e2e_joins bypassed production path; missing-right-pk-
#      registry branch had no test coverage. Caught by the PR #143
#      feedback agent AFTER the merge+tag+publish completed (workflow
#      lesson: cleanup-while-feedback-running). Commit 488d6eb sits on the
#      orphan release/v0.12.0 remote branch.

