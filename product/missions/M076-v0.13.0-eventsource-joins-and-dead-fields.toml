#
#   1. FR-10 (reporter follow-up 2026-04-25): wire `_apply_joins` for
#      EventSource, mirroring M070's StateSource implementation. Reporter
#      hit this trying to migrate pardot_lifecycle_history (which is an
#      EventSource because downstream activities use EventOccurred(
#      event_type="lead_created") dispatch). M070 explicitly scoped joins
#      to StateSource and deferred EventSource as future-enhancement.
#      Time to deliver.
#
#   2. typedata-qrsw (P2 retro): remove TableSource.field_mappings +
