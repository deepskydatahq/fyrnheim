[outcome]
description = """
Bundle two narrow concerns into one minor release.

**Part 1 — FR-10: EventSource joins**

M070 (v0.12.0) shipped source-level joins scoped to StateSource only.
The agent's notes explicitly flagged: \"EventSource as a join source OR
target is documented as a future enhancement.\" Reporter (client-flowable
2026-04-25) hit this gap migrating `pardot_lifecycle_history.sql`:
that file is an EventSource (downstream activities use
`EventOccurred(event_type=\"lead_created\")` dispatch). M070's
`_apply_joins` only fires in `_build_state_source_table` — not in
`load_event_source` — so EventSources can't declare joins.

**The fix (Option a from reporter's brief — wire `_apply_joins` for
EventSource, mirroring StateSource):**

1. Add `joins: list[Join] = []` field to EventSource (same shape as
   StateSource gained in M070)
2. In `load_event_source` (event_source_loader.py): insert
   `_apply_joins(table, joins, source_registry, right_pk_registry)`
   between transforms and json_path — same pipeline-stage placement
   as `_build_state_source_table` (per M070's locked order:
   `read_table → transforms → joins → json_path → computed_columns →
   filter`)
3. Joins skip on M072 fixture-shadow path (same gate as StateSource)
4. M075's computed_columns skip-if-output-exists also applies (already
   in event_source_loader.py post-M075)
5. Move the `upstream + joins` mutex validator to BaseTableSource if
   it's currently StateSource-only (so EventSource inherits it)
6. Verify Phase 1 topological sort handles EventSource (M070's graph
   builder probably already iterates `getattr(src, 'joins', [])` on
   ALL sources — empty for EventSource pre-M076, populated post-M076)
7. **Out of scope: EventSource as join TARGET** (someone joining TO
   an EventSource). The `right_pk_registry` looks up `id_field` —
   EventSources don't have `id_field` in the same sense (they have
   `entity_id_field` + `timestamp_field`). Defer to a future
   enhancement; reporter only needs EventSource-as-LEFT.

After M076, joined columns appear in the post-pipeline table BEFORE
event-shape conversion (the existing payload-pack at
event_source_loader.py:71-92 packs all non-excluded columns into
the JSON payload). So joined columns become part of the event payload
naturally — no extra wiring needed for the event-conversion step.

**Part 2 — typedata-qrsw: remove dead TableSource fields (Option A)**

`TableSource.field_mappings: dict[str, str]` and `TableSource.
literal_columns: dict[str, Any]` are declared at src/fyrnheim/core/
source.py:181-182 with detailed docstrings explaining their role
\"when used inside a UnionSource\" — but `UnionSource` does not exist
in the codebase (verified via grep during /retro 2026-04-24).

Same dead-field pattern as M073's `snapshot_grain` removal. User
picked Option A (remove). Pydantic v2 default `extra='ignore'`
provides a soft-upgrade: existing `field_mappings={...}` declarations
silently parse without error post-removal. CHANGELOG calls out the
removal + future-enhancement pointer.

Cleanup scope:
1. Remove `field_mappings` field from TableSource (source.py:181)
2. Remove `literal_columns` field from TableSource (source.py:182)
3. Remove the \"When used inside a UnionSource...\" docstring
   paragraph (source.py:167-178)
4. Grep for any other reference to either field (probably zero) and
   clean

**Why minor (v0.13.0):**

Both concerns add/remove API surface:
- FR-10: new `joins` field on EventSource (additive)
- typedata-qrsw: removal of `field_mappings` + `literal_columns`
  (removal — but Pydantic extras=ignore softens it, same as M073)

Per release-discipline memory: \"new API surface = minor.\" Combined
with the API removal, v0.13.0 is correct. Default behavior preserved
for users who don't declare `joins=[...]` and don't set the dead
fields.

**Migration impact:**

After v0.13.0, reporter can migrate `pardot_lifecycle_history.sql`
fully:

```python
pardot_lifecycle_history = EventSource(
    name=\"pardot_lifecycle_history\",
    project=\"flowable-marketing-datahub\",
    dataset=\"pardotch\",
    table=\"lifecycle_history\",
    entity_id_field=\"prospect_id\",
    timestamp_field=\"created_at\",
    event_type_field=\"transition_type\",  # or static event_type
    joins=[
        Join(source_name=\"lifecycle_stage\", join_key=\"previous_stage_id\"),
        Join(source_name=\"lifecycle_stage\", join_key=\"next_stage_id\"),
    ],
    computed_columns=[
        ComputedColumn(name=\"transition_type\", expression=\"...\"),
    ],
    duckdb_path=\"pardot_lifecycle_history.parquet\",
    duckdb_fixture_is_transformed=True,
)
```

End state v0.13.0: 4/7 Pardot SQL files fully migrated, 1/7 partial
(prospects — ROW_NUMBER blocker), 3/7 stay as SQL by design (GA4
aggregations).
"""

