## Implementation sketch

### EventSource.joins field

```python
class EventSource(BaseTableSource):
    # ...existing fields...
    joins: list[Join] = PydanticField(default_factory=list)
```

If the upstream+joins validator is currently `model_validator` on
StateSource only, move it to BaseTableSource:

```python
class BaseTableSource(BaseModel):
    # ...existing fields...

    @model_validator(mode=\"after\")
    def _validate_joins_vs_upstream(self):
        joins = getattr(self, \"joins\", [])
        if self.upstream is not None and joins:
            raise ValueError(\"upstream and joins are mutually exclusive...\")
        return self
```

### load_event_source wiring

Mirror `_build_state_source_table`:

```python
# In load_event_source, after read_table:
table = event_source.read_table(conn, backend, data_dir=data_dir)
reads_fixture = _reads_duckdb_fixture(event_source, backend)

if not reads_fixture:
    table = _apply_source_transforms(table, event_source.transforms)
    if event_source.joins:
        log.info(
            \"EventSource %s: applying %d join(s) to %s\",
            event_source.name, len(event_source.joins),
            [j.source_name for j in event_source.joins],
        )
        table = _apply_joins(
            table, event_source.joins, source_registry, right_pk_registry,
        )
    table = _apply_json_path_extractions(table, event_source.fields)

# computed_columns (with M075 skip-if-exists) and filter — already there
# ...

# Then existing event-shape conversion (df.iterrows + payload pack)
```

The `source_registry` and `right_pk_registry` parameters need to be
threaded into `load_event_source`. They were threaded into
`_build_state_source_table` in M070 — same pattern.

### EventSource as join target (out-of-scope guard)

In `_apply_joins` or in the topological-sort step, when a Join's
`source_name` resolves to an EventSource, raise:

```python
raise ValueError(
    f\"Join target {j.source_name!r} is an EventSource. Joining TO an \"
    \"EventSource is not yet supported (the right_pk_registry's id_field \"
    \"lookup assumes StateSource semantics). File a future-enhancement \"
    \"request if you need this.\"
)
```

The check belongs at sort time (before any worker runs) so the error
surfaces early.

