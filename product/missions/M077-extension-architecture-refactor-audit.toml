# Mission: Extension architecture refactor audit
# Identify and prioritize refactoring opportunities after the M068-M076 source-pipeline extension streak.

id = "M077"
title = "Extension architecture refactor audit"
status = "draft"
created = 2026-04-27
depends_on = ["M076"]

[outcome]
description = """
Fyrnheim has added a dense sequence of source-pipeline extensions: read-time transforms,
json_path extraction, backend-aware fixture shadowing, source-level joins, computed-column
fixture skip semantics, and EventSource joins. This mission audits the resulting architecture
and turns refactoring opportunities into specific, prioritized product stories so the next
feature work builds on a solid foundation rather than accumulating accidental complexity.

The intended end state is not a broad rewrite. It is a documented architecture health report
with concrete follow-up stories for the highest-leverage refactors, each tied to evidence in
code and tests.
"""

user_progress = "From 'recent source-pipeline extensions work but architectural seams and duplication are unclear' to 'we know which refactors matter, why they matter, and have executable stories to address them without destabilizing behavior'"

[testing]
approach = "agent-judgment"
criteria = [
    "An architecture audit document or mission notes section identifies current extension seams, duplicated patterns, and risky complexity with file/path evidence",
    "The audit explicitly covers source models, source transforms, EventSource/StateSource loading, pipeline orchestration, registry discovery, CLI command growth, and extension regression tests",
    "At least 5 candidate refactoring opportunities are classified by impact, risk, and recommended disposition: implement now, file story, defer, or reject",
    "Every recommended refactor has a concrete product story TOML with executable acceptance criteria and relevant paths",
    "The audit distinguishes safe mechanical refactors from behavior-changing design work",
    "No production behavior changes are made by the audit itself except optional docs/product TOML updates",
    "Quality gates pass after any product/documentation changes committed for the audit"
]
validator_context = [
