out_of_scope = [
    "Implementing the refactors discovered by the audit, except for tiny documentation or product TOML corrections",
    "Changing public source API semantics such as Join shape, fixture-shadow behavior, json_path grammar, or EventSource join target support",
    "Changing release/versioning policy",
    "Changing generated output semantics or pipeline execution behavior",
    "Broad formatting-only churn",
    "Moving code without tests that prove behavior is unchanged"
]
acceptable_breakage = [
    "None. This is a planning/audit mission. Any follow-up refactor stories must preserve existing behavior unless a later mission explicitly scopes a behavior change."
]

[notes]
considerations = """
Exploration snapshot, 2026-04-27:

Recent extension missions M068-M076 added useful but tightly coupled behavior around source loading:

- `src/fyrnheim/core/source.py` now contains the public source model surface: Field json_path docs,
  Join semantics, BaseTableSource validators, StateSource.joins, and EventSource.joins.
- `src/fyrnheim/engine/source_transforms.py` owns read-time transforms, fixture-shadow detection,
  json_path extraction, and `_apply_joins`.
- `src/fyrnheim/engine/event_source_loader.py` has `_build_event_source_table` and `load_event_source`;
  both are relatively long and encode the EventSource pipeline chain plus payload packing.
- `src/fyrnheim/engine/pipeline.py` is 780+ lines. `run_pipeline` is about 340 lines and now owns
  source topological levels, registries, Phase 1 loading, event concatenation, activities, identity,
  analytics projection, metrics projection, write fan-out, and timing aggregation.
- `_build_state_source_table` and `_build_event_source_table` intentionally mirror each other but now
  duplicate stage-order, fixture-shadow, join, json_path, computed_column, and filter semantics.
- `_topo_sort_sources` mirrors staging_runner's topological-sort idea but returns levels and has
  source-specific guards. There may be an extractable DAG utility, but behavior must remain stable.
- ActivityRegistry, AnalyticsEntityRegistry, IdentityGraphRegistry, and MetricsModelRegistry repeat
  near-identical dynamic-discovery and duplicate-name registry mechanics.
- `src/fyrnheim/cli.py` is 700+ lines with several 50+ line command handlers. This may be acceptable
  for now, but release/package readiness will benefit from separating command orchestration from
  business logic.
- Tests are strong but mission-specific: M068-M076 regression tests live across
  `tests/test_source_transforms.py`, `tests/test_e2e_joins.py`, `tests/test_m072_fixture_shadowing.py`,
  `tests/test_pipeline_topo_sort.py`, and `tests/test_state_event_source.py`. They provide good safety,
  but duplicate setup may obscure architectural invariants.

Suggested scope option chosen for this draft: audit-first. Do not refactor immediately. The likely
follow-up epics are:

1. Source pipeline seam audit — identify whether to extract a shared source-stage runner for
   StateSource/EventSource without changing behavior.
2. DAG/topological utility audit — decide whether source and staging graph sorting should share a
   small utility or remain separate due to level-vs-linear output differences.
3. Registry discovery consolidation audit — evaluate a generic registry/discovery helper across the
   four registry classes.
4. CLI decomposition audit — identify command handlers that should move to service modules before
   publishable-package work.
5. Test architecture audit — consolidate fixtures/helpers and add invariant tests around stage order.

Recommended handling during breakdown: create epics for the audits above, then stories that produce
concrete refactor proposals and follow-up implementation stories. Mark implementation stories as
`draft` unless the audit proves the refactor is mechanical and behavior-preserving.
"""
