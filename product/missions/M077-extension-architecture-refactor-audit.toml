[scope]
in_scope = [
    "Audit source-pipeline stage ordering and duplication between StateSource and EventSource loading",
    "Audit join architecture: Join model semantics, _apply_joins helper, source registries, right_pk_registry, and EventSource target guard",
    "Audit fixture-shadow semantics across transforms, joins, json_path, computed_columns, and filter",
    "Audit source topological sort and its relationship to staging_runner's topological sort",
    "Audit registry discovery duplication across activity, analytics entity, identity graph, and metrics model registries",
    "Audit CLI command growth and identify whether command bodies should be split into service/helper modules",
    "Audit regression-test organization for M068-M076 to identify duplicate fixtures, overly long tests, and missing architectural invariants",
