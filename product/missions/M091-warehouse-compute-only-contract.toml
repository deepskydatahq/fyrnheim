]
related_missions = [
    "M084 — warehouse-native event stream assembly",
    "M085 — warehouse-native identity resolution",
    "M086 — warehouse-native activity derivation",
    "M087 — warehouse-native metrics aggregation",
    "M088 — column pushdown for warehouse sources",
    "M089 — parallel staging view materialization",
    "M090 — v0.14.0 performance release"
]

[scope]
in_scope = [
    "Inventory and classify every engine-local pandas/materialization path that can run during warehouse-backed pipelines",
    "Introduce a central execution/materialization policy or guard that distinguishes DuckDB local compute from warehouse compute",
    "Remove or rewrite remaining warehouse fallbacks that transform downloaded data in pandas",
    "Fail fast for warehouse-incompatible features rather than silently computing them locally",
    "Preserve final table materialization/writes and explicitly documented small metadata checks",
    "Add tests that detect accidental reintroduction of warehouse intermediate materialization",
    "Update docs/changelog with the warehouse compute-only contract"
]
out_of_scope = [
    "Removing DuckDB local development or local parquet fixture support",
    "Building a full query planner beyond the guardrails needed for this contract",
    "Adding new transformation features while replacing fallbacks",
    "Changing public model APIs unless required to reject warehouse-unsafe options clearly",
    "Guaranteeing every Ibis backend has identical feature coverage; the hard contract applies to supported warehouse backends, starting with BigQuery"
]
acceptable_breakage = [
    "Warehouse pipelines that depended on implicit pandas fallback now fail fast until the feature is expressed in Ibis/SQL. This is intentional because local compute over warehouse data violates the core architecture.",
    "DuckDB local outputs should remain compatible with existing tests. Any DuckDB behavior change must be explicitly justified."
]

[notes]
considerations = """
The product intent is not to abandon local development. Fyrnheim should still support fast local DuckDB/parquet workflows. The removed capability is using BigQuery as a remote file source and pandas as the transformation engine.

Suggested implementation shape:
1. Add an internal backend/materialization policy (for example, `ExecutionPolicy` or `MaterializationPolicy`) that can answer whether intermediate `.execute()` is allowed.
2. Route engine materialization through named helper(s) instead of ad hoc `.execute()` calls where practical.
3. Add test-only sentinels/mocks that make accidental intermediate execution visible.
4. Convert remaining small post-aggregation pandas logic to Ibis where feasible; when not feasible, reject on warehouse backends before materialization.
5. Keep allowed materialization boundaries narrow and documented: final user outputs, writes, explicit counts/schema probes, CLI previews.

Known suspicious areas from planning search include:
- `pipeline.py` projection/materialization loops and StateSource replay path
- `analytics_entity_engine.py` computed fields and post-aggregation memtable round-trips
- `metrics_engine.py` empty-result memtable handling
- `diff_engine.py` DataFrame-based diff implementation
- any test helper patterns that normalize production behavior through pandas
"""
