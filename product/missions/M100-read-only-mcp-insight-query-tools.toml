# Mission: Read-only MCP insight query tools

id = "M100"
title = "Read-only MCP insight query tools"
status = "complete"
created = 2026-05-17
depends_on = ["M099"]

[outcome]
description = """
Extend the Fyrnheim MCP analytics surface from metadata discovery to safe, recipe-driven read-only insight queries over declared project tables, so agents can answer bounded questions like top content items or promising records without arbitrary SQL or warehouse writes.
"""

user_progress = "From 'the MCP can list metrics and dimensions' to 'the MCP can safely run predefined read-only insight recipes such as top content items or promising leads'."

[execution]
mode = "implementation"
outputs = ["insight-recipes", "read-only-query-adapter", "mcp-tools", "docs", "tests"]

[testing]
approach = "agent-judgment"
criteria = [
  "Insight recipes can be loaded from a JSON/YAML-compatible dictionary and validated for supported types, columns, orderings, filters, joins, and limits",
  "A read-only query adapter executes recipe queries through Ibis with mandatory limits and no arbitrary SQL",
  "MCP-ready tools expose list_insight_recipes, run_insight_recipe, top_content_items, and find_promising_records",
  "DuckDB tests cover table_top and joined_top recipes, sorting, filtering, limit caps, and result shape",
  "Docs explain recipe configuration, read-only safety constraints, and Propel-oriented example recipes"
]
validator_context = [
  "src/fyrnheim/insights.py",
  "src/fyrnheim/mcp/insight_tools.py",
  "src/fyrnheim/mcp/analytics_server.py",
  "tests/test_insight_tools.py",
  "docs/mcp-insight-query-tools.md"
]

[context]
related_docs = [
  "docs/mcp-analytics-catalog.md",
  "docs/mcp-insight-query-tools.md"
]
relevant_paths = [
  "src/fyrnheim/config.py",
  "src/fyrnheim/engine/executor.py",
  "src/fyrnheim/insights.py",
  "src/fyrnheim/mcp/",
  "tests/",
  "docs/"
]
related_missions = [
  "M099 — MCP analytics catalog for Fyrnheim"
]

[scope]
in_scope = [
  "Read-only recipe schema and validation",
  "Ibis-backed query execution over configured DuckDB/ClickHouse/BigQuery backends where available",
  "MCP-ready insight query tools",
  "DuckDB tests with fixture tables",
  "Docs and Propel Data handoff context"
]
out_of_scope = [
  "Arbitrary SQL generated by agents",
  "Writes, materializations, pipeline execution, or warehouse mutations",
  "Dagster runtime lookup",
  "Propel-specific code in Fyrnheim core",
  "Fixing Propel Data entity definitions"
]
acceptable_breakage = [
  "Insight recipe schema starts at v1 and may add optional fields later."
]

[notes]
considerations = "Keep the implementation generic and recipe-driven. Propel Data should configure recipes in its project; Fyrnheim should not hardcode Propel fields."
