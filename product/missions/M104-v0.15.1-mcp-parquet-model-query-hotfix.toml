approach = "automated"
criteria = [
  "query_analytics_model reads output_dir/<model>.parquet for parquet materializations when no live table is registered",
  "preview_analytics_query_sql compiles the same parquet-backed generated query",
  "Full Fyrnheim quality gates pass before release"
]
validator_context = [
  "src/fyrnheim/analytics_query.py",
  "tests/test_semantic_analytics_query.py",
  "pyproject.toml",
  "src/fyrnheim/__init__.py"
]

[context]
related_docs = ["docs/mcp-analytics-catalog.md"]
relevant_paths = [
  "src/fyrnheim/analytics_query.py",
  "tests/test_semantic_analytics_query.py",
  "pyproject.toml",
  "src/fyrnheim/__init__.py",
  "CHANGELOG.md"
]
related_missions = ["M103 — Semantic analytics model context and generic query tools"]

[scope]
in_scope = [
  "DuckDB parquet-backed semantic analytics model queries",
  "Clear errors when parquet outputs are missing or unsupported by the backend",
  "v0.15.1 patch release metadata"
]
