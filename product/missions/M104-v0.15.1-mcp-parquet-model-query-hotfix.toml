# Mission: v0.15.1 MCP parquet model query hotfix

id = "M104"
title = "v0.15.1 MCP parquet model query hotfix"
status = "complete"
created = 2026-05-20
depends_on = ["M103"]

[outcome]
description = "Fix semantic MCP analytics model queries so DuckDB-backed project configs can query parquet materialized models from output_dir when the model is not registered as a live backend table."
user_progress = "From catalog-only model discovery with query failures to working read-only MCP queries over generated parquet model outputs."

[execution]
mode = "implementation"
outputs = ["parquet-query-hotfix", "tests", "patch-release"]

