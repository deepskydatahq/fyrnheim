[handoff]
implementation_hints = """
- This is the public API entry point for code generation
- In timo-data-stack this lives in scripts/generate_pydantic_entities.py (PydanticIbisGenerator)
- For fyrnheim, expose as fyrnheim.generate(entity, output_dir='generated/')
- The function should:
  1. Accept Entity instance
  2. Create IbisCodeGenerator(entity)
  3. Call all generation methods
  4. Write output to {output_dir}/{entity_name}_transforms.py
- Consider also supporting a batch mode: generate_all(entities_dir, output_dir)
"""
