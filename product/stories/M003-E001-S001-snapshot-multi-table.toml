title = "Executor creates separate snapshot table alongside dim table"
status = "done"
created = 2026-02-18

[outcome]
description = """
The executor and runner produce both dim_{name} and snapshot_{name} tables when an
entity has a snapshot layer. This establishes the multi-table output pattern that
activity and analytics layers will reuse.
"""

