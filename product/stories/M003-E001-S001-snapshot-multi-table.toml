[handoff]
implementation_hints = """
Current behavior: _run_transform_pipeline() chains source → prep → dim → snapshot
sequentially, returning ONE table. The snapshot output replaces the dim output.

Desired behavior: The executor should persist dim_{name} BEFORE running snapshot,
then persist snapshot_{name} separately. Two options:

Option A (simpler): Split _run_transform_pipeline() so that dim output is persisted
first, then snapshot runs and creates its own table. The execute() method runs the
pipeline up to dim, persists dim_{name}, then if snapshot exists, runs snapshot and
persists snapshot_{name}.

Option B: _run_transform_pipeline() returns a dict of {table_name: ibis.Table} for
all layers. execute() persists each one.

Recommend Option A for simplicity — it maps cleanly to the existing code and
extends naturally for activity/analytics later.

Key change in _run_transform_pipeline or execute():
    # Run up to dim
    t = source → prep → dim
    conn.create_table(f"dim_{name}", t, overwrite=True)

    # Snapshot (separate output)
    snapshot_fn = getattr(module, f"snapshot_{name}", None)
    if snapshot_fn:
        snapshot_t = snapshot_fn(t)  # uses dim output as input
        conn.create_table(f"snapshot_{name}", snapshot_t, overwrite=True)

ExecutionResult may need an additional field like `additional_tables: dict[str, int]`
to report snapshot row counts. Or just report the primary (dim) table as before.
"""
reference_files = [
    "src/fyrnheim/engine/executor.py",
    "tests/test_engine_executor.py",
]
