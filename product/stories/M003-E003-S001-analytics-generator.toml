[handoff]
implementation_hints = """
Add _generate_analytics_function() to IbisCodeGenerator.

Key design decision: How to handle metric expressions safely.

Option A (recommended): Use structured metric definitions.
The AnalyticsMetric.expression field contains Ibis expression strings like
"_.count()" or "_['amount_cents'].sum()". Generate code that uses these as-is
in the generated module (they execute at runtime, not at generation time).

Generated code pattern:
    def analytics_customers(dim_customers: ibis.Table) -> ibis.Table:
        t = dim_customers
        date_col = t.created_at.date()  # from date_expression
        return t.group_by(
            date=date_col,
            # optional dimensions
            plan=t.plan,
        ).aggregate(
            new_customers=t.count(),         # from metric expression
            total_revenue=t.amount_cents.sum(),  # from metric expression
        )

The metric expressions need careful handling:
- expression "_.count()" → replace "_" with "t" → "t.count()"
- expression "_['amount_cents'].sum()" → "t['amount_cents'].sum()"
- This is code that gets written to the generated file and executed at runtime

Use _bind_expression() pattern (already exists) for binding column references.

Update generate_module():
    if self.entity.layers.analytics:
        parts.append(self._generate_analytics_function())

Tests: Create test entities with various metric configurations and verify:
- Generated code parses
- Function signature is correct
- group_by includes date + dimensions
- aggregate includes all metrics
"""
reference_files = [
    "src/fyrnheim/generators/ibis_code_generator.py",
    "src/fyrnheim/core/analytics.py",
    "tests/test_ibis_code_generator.py",
]
