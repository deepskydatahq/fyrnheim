[context]
relevant_paths = [
    "tests/test_e2e_pipeline.py",
    "src/fyrnheim/engine/runner.py",
    "src/fyrnheim/engine/executor.py",
]
input_fixtures = []
depends_on = ["M003-E004-S001"]

[handoff]
implementation_hints = """
Add a comprehensive test to test_e2e_pipeline.py (or new test_e2e_full_stack.py):

1. Create test data with:
   - 10+ rows with varied dates, plans, amounts
   - 2+ rows with same id for snapshot dedup testing
   - updated_at column for snapshot ordering
   - Mix of 'free', 'pro', 'enterprise' plans for activity filtering

2. Define entity with ALL layers:
   - PrepLayer: email_hash, amount_dollars
   - DimensionLayer: is_paying, email_domain
   - SnapshotLayer: natural_key="id", dedup by updated_at
   - ActivityConfig: signed_up (row_appears) + upgraded (status_becomes)
   - AnalyticsLayer: new_customers (count), total_revenue (sum), by date + plan

3. Generate + execute via runner.

4. Verify ALL output tables:
   - dim_{name}: all rows, computed columns correct
   - snapshot_{name}: deduplicated, has ds + snapshot_key
   - activity_{name}: correct activity types and counts
   - analytics_{name}: correct aggregations per date/plan

5. Run quality checks on dim table.

This test is the "proof it all works" validation for M003.
It should exercise the runner (not just executor) to verify the full orchestration.
"""
reference_files = [
    "tests/test_e2e_pipeline.py",
    "src/fyrnheim/engine/runner.py",
]
