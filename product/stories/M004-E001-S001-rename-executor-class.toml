# Story: Rename DuckDBExecutor → IbisExecutor

id = "M004-E001-S001"
parent = "M004-E001"
title = "Rename DuckDBExecutor to IbisExecutor and accept injected connection"
status = "complete"
depends_on = []

[outcome]
description = """
Rename DuckDBExecutor to IbisExecutor. Change the constructor to accept
(conn: ibis.BaseBackend, backend: str) instead of (db_path: str). Store
backend as self._backend. Add a classmethod IbisExecutor.duckdb(db_path)
as convenience constructor for backwards compatibility.
"""

