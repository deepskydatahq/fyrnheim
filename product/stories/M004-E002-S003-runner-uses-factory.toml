# Story: Runner uses connection factory

id = "M004-E002-S003"
parent = "M004-E002"
title = "Runner creates IbisExecutor via connection factory instead of hardcoded DuckDB"
status = "complete"
depends_on = ["M004-E002-S001", "M004-E002-S002"]

[outcome]
description = """
runner.py run() and run_entity() use create_connection() to build the Ibis
connection, then pass it to IbisExecutor. The backend validation that rejects
non-duckdb backends is removed. Any backend supported by the connection
factory works.
"""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
test = "unit"
description = "runner.py no longer raises ValueError for non-duckdb backends"

[[acceptance_criteria.criteria]]
test = "unit"
description = "run() calls create_connection(backend, **backend_config) to get connection"

[[acceptance_criteria.criteria]]
test = "unit"
description = "run_entity() accepts backend_config kwarg and passes to connection factory"

[[acceptance_criteria.criteria]]
test = "unit"
description = "All existing runner tests pass with DuckDB as default backend"
