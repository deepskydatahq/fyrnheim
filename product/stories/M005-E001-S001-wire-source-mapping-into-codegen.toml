# Story: Wire SourceMapping into IbisCodeGenerator

id = "M005-E001-S001"
parent = "M005-E001"
title = "Accept optional SourceMapping in IbisCodeGenerator and generate() function"
status = "complete"
depends_on = []

[outcome]
description = """
IbisCodeGenerator constructor accepts an optional source_mapping: SourceMapping | None
parameter (default None). The public generate() function in _generate.py also accepts
and passes through the optional SourceMapping. No change to generated code yet — this
is pure wiring so S002 can use it.
"""

