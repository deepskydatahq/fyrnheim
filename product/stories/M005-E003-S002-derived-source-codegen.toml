# Story: DerivedSource codegen — join chain, PriorityCoalesce, auto columns

id = "M005-E003-S002"
parent = "M005-E003"
title = "Generate cascading FULL OUTER JOIN, PriorityCoalesce, and auto columns for DerivedSource"
status = "complete"
depends_on = ["M005-E003-S001"]

[outcome]
description = """
IbisCodeGenerator handles DerivedSource with IdentityGraphConfig by generating:
(1) A multi-input source function that receives a dict of source tables keyed by
source name, (2) cascading FULL OUTER JOIN on the match key across all sources,
(3) PriorityCoalesce via .fillna() chains ordered by source priority for shared
fields, (4) auto-generated columns: is_{source} Boolean flags, {source}_id
columns preserving original IDs, and first_seen_{source} date columns. The
generated function signature differs from single-source entities: it takes
(sources: dict[str, ibis.Table]) instead of (conn, backend). This is the
heaviest story (~200-300 LOC of generator logic).
"""

