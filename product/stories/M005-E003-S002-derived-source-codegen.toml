[handoff]
implementation_hints = """
1. Import DerivedSource in ibis_code_generator.py
2. Add DerivedSource check in _generate_source_functions() dispatch
3. New method _generate_derived_source_function(source: DerivedSource):
   a. Read identity_graph_config
   b. Generate function signature: def source_{name}(sources: dict) -> ibis.Table:
   c. Extract tables: t_{source.name} = sources["{source.name}"]
   d. Rename match_key per source: t_{name} = t_{name}.rename({match_key: match_key_field})
   e. Rename fields per source: apply field_mappings
   f. Cascading FULL OUTER JOIN:
      - First two: result = t_a.outer_join(t_b, match_key).select(...)
      - Each additional: result = result.outer_join(t_next, match_key).select(...)
   g. PriorityCoalesce per unified field:
      - For each field in priority order: result = result.mutate(field=ibis.coalesce(field_a, field_b, ...))
      - Or use .fillna() chain: field_a.fillna(field_b).fillna(field_c)
   h. Auto columns:
      - is_{source} = t_{source}.{match_key}.notnull() (before join, track which sources contributed)
      - {source}_id = original ID column from each source
      - first_seen_{source} = date column from each source
4. The join pattern in Ibis:
   - t1.outer_join(t2, "match_key") produces all columns from both tables
   - Need to handle column name conflicts (use suffixes or explicit select)
   - After join, coalesce common fields
"""
