# Story: Fix AggregationSource model and codegen for GROUP BY + aggregate

id = "M005-E004-S001"
parent = "M005-E004"
title = "Add aggregations to AggregationSource model and fix codegen to generate .group_by().aggregate()"
status = "complete"
depends_on = []

[outcome]
description = """
AggregationSource gains an optional `aggregations: list[ComputedColumn]` field that
defines the aggregate expressions (e.g. person_count=t.person_id.nunique()). The code
generator's _generate_aggregation_source_function() is updated to generate
`.group_by().aggregate(...)` using these expressions, producing a valid ibis.Table
output. When aggregations is empty, the generated code calls `.aggregate()` with no
args (returns just the group key column). Backward compatible: existing
AggregationSource without aggregations still works.
"""

