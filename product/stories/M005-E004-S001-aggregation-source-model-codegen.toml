[handoff]
implementation_hints = """
1. Model change in source.py:
   - Import ComputedColumn from fyrnheim.components.computed_column
   - Add `aggregations: list[ComputedColumn] = PydanticField(default_factory=list)` to AggregationSource
   - This is backward compatible (defaults to empty list)

2. Codegen fix in ibis_code_generator.py:
   - Current _generate_aggregation_source_function returns `t.group_by("col")` which is a GroupedTable, not Table
   - Fix to return `t.group_by("col").aggregate(...)` using the aggregations list
   - Each aggregation: name=expression in the .aggregate() call
   - Use self._bind_expression() to bind column refs to `t.`
   - When aggregations is empty: `t.group_by("col").aggregate()` (valid Ibis — returns just the group key)

3. Expected generated code for account entity with 2 aggregations:
   ```python
   def source_account(source_person: ibis.Table) -> ibis.Table:
       t = source_person
       return t.group_by("account_id").aggregate(
           person_count=t.person_id.nunique(),
           total_revenue=t.revenue.sum(),
       )
   ```

4. Tests needed:
   - test_core_source.py: AggregationSource with/without aggregations
   - test_ibis_code_generator.py: TestAggregationSourceCodeGeneration class with tests for
     function signature, .aggregate() call, filter_expression, empty aggregations, ast.parse validity
"""
