[outcome]
description = """
Create entities/mailerlite_person.py defining an Entity with TableSource pointing to
MailerLite subscriber parquet data. The entity has 5 source fields (id, email, status,
subscribed_at, source), a PrepLayer for staging, and a DimensionLayer with computed columns
(email_hash via hash_email primitive, created_at mapped from subscribed_at). The entity is
marked is_internal=True since it feeds the person identity graph. The dim table contains
the email column needed as match key for downstream identity resolution.
"""

