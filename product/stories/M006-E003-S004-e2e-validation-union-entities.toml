# Story: E2E validation of product, signals, and anon on DuckDB

id = "M006-E003-S004"
parent = "M006-E003"
title = "E2E test all three entities execute via fyr run on DuckDB with sample parquet data"
status = "complete"

[outcome]
description = """
An E2E test creates sample parquet files for each sub-source (youtube, linkedin, walker,
shortio, ghost) and validates all three entities execute on DuckDB. Product: unified column
names, product_type/source_platform literal columns, row count = youtube + linkedin rows.
Signals: unified signal_timestamp, source tags, person_id/signal_id computed columns,
row count = walker + shortio + ghost rows. Anon: channel_category computed column, anon_id
hash. Runner.run() discovers and executes all three entities.
"""

[testing]
approach = "agent-judgment"
criteria = [
    "E2E test creates sample parquets for youtube_videos and authoredup_posts with different column schemas",
    "E2E test creates sample parquets for walker_events, shortio_clicks, and ghost_members",
    "E2E test creates sample parquet for anon walker_events",
    "product dim table has unified columns (product_id, title, view_count) and product_type/source_platform",
    "product row count equals youtube rows + linkedin rows",
    "signals dim table has signal_timestamp, source, signal_type columns",
    "signals dim table has person_id and signal_id computed columns",
    "signals row count equals walker rows + shortio rows + ghost rows",
    "anon dim table has anon_id, source, channel_category computed columns",
    "runner.run() discovers and executes all three entities successfully",
    "All existing E2E tests still pass — no regressions",
]

depends_on = ["M006-E003-S001", "M006-E003-S002", "M006-E003-S003"]

[implementation]
hints = [
    "Follow existing E2E test patterns in test_e2e_ibis_executor.py",
    "YouTube parquet: video_id, title, published_at, view_count, like_count, comment_count",
    "LinkedIn parquet: post_id, text, published_at, impressions, reactions, comments, shares",
    "Walker parquet: session_id, timestamp, referrer, event_name, page_path",
    "Shortio parquet: clicked_at, utm_source, utm_medium, utm_campaign, short_path, original_url",
    "Ghost parquet: email, created_at, name",
    "Test literal_columns values: product_type, source_platform, source, signal_type",
]

key_files = [
    "tests/test_e2e_ibis_executor.py",
    "src/fyrnheim/engine/runner.py",
    "entities/product.py",
    "entities/signals.py",
    "entities/anon.py",
]
