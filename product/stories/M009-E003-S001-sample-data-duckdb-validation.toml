# Story: Sample data and DuckDB validation

id = "M009-E003-S001"
epic = "M009-E003"
title = "Copy sample data and validate fyr run on DuckDB"
status = "complete"

[outcome]
description = """
Sample parquet files are copied to timo-data/data/ and fyr run executes all
9 entities successfully on DuckDB. The identity graph (person) and account
aggregation produce correct output. This validates the entity definitions
and generated code work end-to-end before involving ClickHouse.
"""

