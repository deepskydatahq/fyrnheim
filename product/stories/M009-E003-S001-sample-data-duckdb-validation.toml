    "DuckDB contains dim_* tables for all 9 entities after fyr run",
    "Person identity graph resolves correctly — dim_person has rows from 4 sources",
    "Account aggregation produces dim_account with business account rollups",
    "Product union combines youtube_videos and authoredup_posts",
    "Signals union combines walker_events, shortio_clicks, and ghost_members",
]

validator_context = [
    "timo-data/data/",
    "timo-data/entities/",
    "timo-data/generated/",
]

