[handoff]
implementation_hints = """
Create src/fyrnheim/testing/__init__.py with EntityTest and TestResult classes.

EntityTest.given(tables: dict[str, list[dict]]) stores the fixture data.
EntityTest.run() creates an ephemeral DuckDB connection, registers fixture data
as in-memory tables using ibis, generates transforms to a temp dir, executes
the entity, and returns TestResult wrapping the output table.

TestResult wraps a pandas DataFrame (from ibis .execute()). row_count, columns,
column(), to_dicts() are thin wrappers around DataFrame methods.

Use the existing IbisExecutor.duckdb() and run_entity() functions — don't
reinvent the execution pipeline.
"""
reference_files = [
    "src/fyrnheim/engine/executor.py",
    "src/fyrnheim/engine/runner.py",
]
