id = "M015-E002-S002"
parent = "M015-E002"
title = "fyr test CLI command with output formatting"
status = "ready"
created = "2026-03-07"

[outcome]
description = """Add fyr test command to CLI that discovers and runs entity tests with formatted pass/fail output."""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
test = "unit"
description = "fyr test command exists and is callable"

[[acceptance_criteria.criteria]]
test = "unit"
description = "fyr test --entity <name> filters tests to that entity"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Output shows test name and PASS/FAIL status for each test"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Summary line shows total passed/failed count"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Exit code 0 when all tests pass"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Exit code 1 when any test fails"

[context]
relevant_paths = [
    "src/fyrnheim/cli.py",
    "src/fyrnheim/testing/",
]
input_fixtures = []
depends_on = ["M015-E002-S001"]

[handoff]
implementation_hints = """
Add @main.command() for test in cli.py. Follow the pattern of the check command.
Options: --entity for filtering, --tests-dir to override test directory (default: tests/).
Wire into discover_tests() and run_tests() from fyrnheim.testing.runner.
"""
reference_files = ["src/fyrnheim/cli.py"]
