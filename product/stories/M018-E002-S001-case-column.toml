[context]
relevant_paths = [
    "src/fyrnheim/components/computed_column.py",
    "src/fyrnheim/generators/ibis_code_generator.py",
]
input_fixtures = []
depends_on = []

[handoff]
implementation_hints = """
CaseColumn should be a ComputedColumn subclass (or peer class) that auto-generates
the expression string from structured data. It has:
- cases: list of (condition, value) tuples
- default: optional default value
- It generates: ibis.cases((condition1, 'value1'), (condition2, 'value2'), ...).else_('default')

Since ComputedColumn.expression is used by codegen already, CaseColumn just needs
to compute expression from the structured cases data. A model_validator can
set expression from cases + default.
"""
