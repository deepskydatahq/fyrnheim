[handoff]
implementation_hints = """Create src/fyrnheim/engine/entity_projection.py. project_entity(enriched_events: ibis.Table, entity_model: EntityModel) -> ibis.Table.

The enriched events have: source, entity_id, ts, event_type, payload, canonical_id.
For each canonical_id, gather all events from the sources referenced in state_fields.

For 'latest' strategy: from events where source matches, parse payload for the field, pick the one with max ts.
For 'first' strategy: pick the one with min ts.
For 'coalesce': iterate sources in priority order, pick first non-null value (latest from each source).

For row_appeared events, the field value is in payload JSON (e.g., {"email": "alice@example.com", ...}).
For field_changed events, the new value is in payload.new_value when payload.field_name matches.

Start simple: only use row_appeared events for deriving state. field_changed can enhance accuracy later.

For computed_fields: after projecting state, evaluate ComputedColumn expressions. Use the existing expression binding pattern (t.field_name for simple expressions).

Use pandas for implementation (same pattern as other engines)."""
