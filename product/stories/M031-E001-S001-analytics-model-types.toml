implementation_hints = """Create src/fyrnheim/core/analytics_model.py. Use StreamAnalyticsModel and StreamMetric names to avoid clash with existing AnalyticsModel in analytics.py. StreamMetric: name (str), expression (str), event_filter (str | None = None), metric_type (Literal['count','sum','snapshot']). StreamAnalyticsModel: name (str, min_length=1), identity_graph (str, min_length=1), date_grain (Literal['daily','weekly','monthly']), metrics (list[StreamMetric], min 1), dimensions (list[str] = []). Export from core/__init__.py and __init__.py."""
