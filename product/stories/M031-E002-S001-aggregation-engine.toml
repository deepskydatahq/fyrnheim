[handoff]
implementation_hints = """Create src/fyrnheim/engine/analytics_aggregation.py. Function aggregate_analytics(enriched_events, analytics_model) -> ibis.Table.
1. Materialize to pandas
2. Parse ts to date, truncate to grain (daily=date, weekly=week start, monthly=month start)
3. For each metric: filter by event_filter (match event_type), then aggregate:
   - count: len(filtered)
   - sum: parse payload for expression field, sum values
   - snapshot: nunique(canonical_id) in filtered
4. Group by _date + dimensions
5. Return as ibis.memtable

For sum metrics: the expression field references a payload key (e.g., 'amount'). Parse the JSON payload and extract that numeric value."""
