implementation_hints = """The old accounts entity used DerivedSource with IdentityGraphConfig containing inline TableSources with prep_columns. The new API:
- Define 3 StateSources (mailerlite, ghost, workshops) as module-level variables
- Define IdentityGraph with 3 IdentitySource entries referencing those sources by name
- Define EntityModel with state_fields mapping fields from each source
- DimensionLayer computed_columns → EntityModel computed_fields
- AnalyticsLayer → StreamAnalyticsModel

Key gaps to document:
- prep_columns (email lowercasing, date casting) have no equivalent in StateSource — SourceTransforms only supports renames/casts/divides, not arbitrary expressions
- Inline source definitions no longer supported — sources must be defined separately
- Field selection/mapping (the 'fields' dict on IdentityGraphSource) not in new API
- Analytics expressions reference Ibis table columns directly — StreamMetric only has simple count/sum/snapshot"""
