[handoff]
implementation_hints = """Update save() and get_previous() to accept datetime.date | datetime.datetime. When datetime is passed, use isoformat with colons replaced by hyphens for filename safety (2024-01-15T14-00-00.parquet). When parsing filenames in get_previous, try datetime.fromisoformat first (with hyphen-to-colon conversion), fall back to date.fromisoformat. APPEND new tests to test_snapshot_store.py — do NOT delete existing."""
