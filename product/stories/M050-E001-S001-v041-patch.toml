[[acceptance_criteria.criteria]]
test = "unit"
description = "End-to-end on duckdb: StagingView with multi-line SQL containing newlines + tabs + backslashes + single quotes materializes and state row round-trips via _load_state"

[[acceptance_criteria.criteria]]
