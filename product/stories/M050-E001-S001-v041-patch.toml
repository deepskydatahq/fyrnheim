description = "Regression: StagingView(name='x') feeding a source(name='x', upstream=view, duckdb_path=...) is MATERIALIZED on bigquery (not shadow-skipped)"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Regression: on duckdb, a source whose name coincidentally matches an unrelated view's name does NOT cause that unrelated view to be shadowed"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Happy path preserved: on duckdb, source with duckdb_path and upstream=view causes view to be shadow-skipped (v0.4.0 behavior)"

[[acceptance_criteria.criteria]]
