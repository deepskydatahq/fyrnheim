[handoff]
implementation_hints = """
Paste-ready bug report is the authoritative spec — follow it closely. Report-
recommended implementation order:

1. Polish 2 (sql Path support): add field_validator(mode='before') on
   StagingView.sql that returns v.read_text() when isinstance(v, Path).

2. Bug 1 (hash quoting): in staging_runner.py, change three sites:
   - _ensure_state_table bigquery branch: '`hash` STRING' (backtick-quoted)
   - _load_state: 'SELECT name, `hash` FROM {qualified}'
   - _write_state_row: 'INSERT INTO ... (name, `hash`, materialized_at, ...)'
   Leave the duckdb branches alone — duckdb is happy with unquoted hash.

3. Bug 2 (_escape extension): order matters.
     return (value
         .replace('\\\\', '\\\\\\\\')
         .replace("'", "''")
         .replace('\\n', '\\\\n')
         .replace('\\r', '\\\\r')
         .replace('\\t', '\\\\t'))
   Test with a payload containing both backslash and newline to catch accidental
   double-escape.

4. Bug 3 (fixture-shadow): in pipeline.py Phase 0 setup, wrap the fixture_names
   build in `if config.backend == 'duckdb':` and change the inner loop to use
   src.upstream.name (guarding upstream is not None) instead of src.name. The
   runner side (staging_runner.materialize_staging_views) does not need changes.

5. Polish 1 (re-export): add `from fyrnheim.core.staging_view import StagingView`
   to src/fyrnheim/__init__.py and src/fyrnheim/core/__init__.py. Add to __all__
   alphabetically.

6. Version bump in pyproject.toml: "0.4.0" -> "0.4.1", then `uv lock`.

Tests go in tests/test_staging_view.py extending the existing file.
"""
reference_files = [
    "src/fyrnheim/engine/staging_runner.py",
    "src/fyrnheim/engine/pipeline.py",
    "src/fyrnheim/core/staging_view.py",
    "src/fyrnheim/__init__.py",
]
