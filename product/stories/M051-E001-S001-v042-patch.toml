[handoff]
implementation_hints = """
Step 1 — Apply local patches. The user's pre-validated fixes for #91/#92/#93/#94
are saved at /tmp/m051-local-patches.diff (108 lines, 3 files). In the
isolated worktree: `git apply /tmp/m051-local-patches.diff`. Verify the diff
matches what's documented in issues #91/#92/#93/#94 (not #94's analytics_entity_engine
case — analytics_entity_engine IS in the diff; all three touched files are).

Step 2 — event_source_loader._serialize_value alignment. Open
src/fyrnheim/engine/event_source_loader.py around line 109. Change the signature
return type from `-> str` to `-> object`. Restructure:
- Keep the array branch FIRST (list/tuple/np.ndarray -> json.dumps with default=str)
- NaN/None branch: return None (not 'null')
- Preserve primitives: if isinstance(v, (str, int, float, bool)): return v
- Everything else: return str(v)
Ensure order: array-check before pd.isna (the existing comment explains why).

Step 3 — Regression tests. Add to the appropriate existing test files:
- tests/test_identity_engine.py: two tests for #91 and #92
- tests/test_diff_engine.py: two tests for #93 (None->None, primitives preserved) +
  one test for _resolve_latest null fallthrough
- tests/test_event_source_loader.py: one test for the _serialize_value alignment
  including an array-branch regression
- tests/test_analytics_entity.py: one test for #94 (arbitrary event_type,
  flat-dict payload, returns value) + a field_changed safeguard test
- tests/test_e2e_identity_projection.py (new file): the M006 reproducer e2e
  test. Mixed StateSource + EventSource identity graph, at least one column
  with null values, state field, verify correct resolution and no 'null' strings.

Step 4 — version bump. pyproject.toml 0.4.1 -> 0.4.2, run `uv lock`.

Step 5 — run: pytest, ruff, mypy. Fix any issues. Commit and push.
"""
reference_files = [
    "src/fyrnheim/engine/identity_engine.py",
