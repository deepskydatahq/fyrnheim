[outcome]
description = """Apply the validated local patches for issues #91/#92/#93/#94,
align event_source_loader._serialize_value, add 4 regression tests (one per
issue) plus one end-to-end M006 reproducer test, and bump version to 0.4.2."""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
test = "unit"
description = "#91 regression: StateSource + IdentitySource(match_key_field=id_field) produces non-empty mapping with canonical_id = sha256(entity_id)[:16]"

[[acceptance_criteria.criteria]]
test = "unit"
description = "#92 regression: events with event_type='session_start' (EventSource shape) appear in identity resolution mapping when EventSource is declared in IdentityGraph"

[[acceptance_criteria.criteria]]
test = "unit"
description = "#92 safeguard: field_changed events are still excluded from identity resolution"

[[acceptance_criteria.criteria]]
test = "unit"
description = "#93 regression: diff_engine._serialize_value(None) returns Python None, not the string 'null'"

[[acceptance_criteria.criteria]]
test = "unit"
description = "#93 regression: diff_engine._serialize_value preserves int, float, bool, str (no stringification of primitives)"

[[acceptance_criteria.criteria]]
test = "unit"
description = "#93 regression: _resolve_latest correctly falls through a None-bearing row to the next row with a real value (no string 'null' leakage)"

[[acceptance_criteria.criteria]]
test = "unit"
description = "event_source_loader._serialize_value(None) returns Python None; preserves primitives; keeps array-branch (list/tuple/ndarray -> JSON array) intact"

[[acceptance_criteria.criteria]]
test = "unit"
description = "#94 regression: _extract_field_value returns payload.get(field_name) for an event whose event_type is an arbitrary string (e.g. 'anon_attrs_loaded' or 'session_start') with a flat-dict payload"

[[acceptance_criteria.criteria]]
test = "unit"
description = "#94 safeguard: field_changed events still return new_value only when payload.field_name matches the requested field"

[[acceptance_criteria.criteria]]
test = "integration"
description = "End-to-end: mixed StateSource + EventSource IdentityGraph; a state field on a column with null values resolves to the correct non-null value across the cross-source canonical_id; no literal 'null' strings appear in the output"

[[acceptance_criteria.criteria]]
test = "unit"
description = "pyproject.toml version == '0.4.2', uv.lock updated"

