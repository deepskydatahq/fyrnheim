[handoff]
implementation_hints = """
## Authoritative spec

product/missions/M057-analytics-entity-source-scoping.toml — read the
[notes] section for the full filter-predicate sketch and the two gotchas
(Measure has no `source`; coalesce uses `priority`).

## Exact implementation sketch

In project_analytics_entity, immediately after `df = enriched_events.execute()`
and BEFORE `group_key = ...` / `group_ids = df[group_key].unique()`:

```python
relevant_sources: set[str] = set()
for sf in analytics_entity.state_fields:
    if sf.strategy == "coalesce":
        relevant_sources.update(sf.priority or [])
    else:
        relevant_sources.add(sf.source)
relevant_activities = {m.activity for m in analytics_entity.measures}

if relevant_sources or relevant_activities:
    mask = df["source"].isin(relevant_sources) | df["event_type"].isin(relevant_activities)
    df = df[mask]
```

The `if relevant_sources or relevant_activities` guard handles the edge
case of an AnalyticsEntity with neither (which Pydantic already rejects —
see _require_at_least_one_field_or_measure — but keeps the code robust).

## Empty-after-filter path

If the filter empties df, the existing empty-rows path at the end of
project_analytics_entity (the `pd.DataFrame(rows) if rows else pd.DataFrame(columns=all_columns)`
line) already handles it correctly. Verify with the empty-after-filter
regression test.

## Test file structure

Existing file tests/test_analytics_entity_engine.py already has a
_make_events helper and a TestProjectAnalyticsEntity class pattern.
Reuse that shape for the 5 new tests — do not invent new fixtures.

## Release & commit shape

Follow the M056 pattern: single commit (or small series) on a release
branch named `release/v0.6.2`. Commit message for the main commit:

    fix(M057): scope analytics-entity projection to entity's sources (v0.6.2)

The CHANGELOG entry (append above the 0.6.1 section in CHANGELOG.md):

```
## [0.6.2] - 2026-04-17

### Fixed

- `project_analytics_entity` now only emits rows for ids that have at
  least one event from a source referenced by the entity's
  `state_fields` (including `coalesce` strategy `priority` lists) OR an
  event whose `event_type` matches one of the entity's `measures`
  activity names. Previously, every AnalyticsEntity emitted one row per
  unique id in the global enriched-events stream — most rows entirely
  NULL for the entity in question. On the timo-data-stack pipeline this
  reduced per-entity row counts from 76,762 (global unique-id count) to
  the correct per-entity subset, and materially cut full-pipeline runtime
  by shrinking the outer loop's iteration space.
```

## Do NOT

- Touch the Measure / StateField / AnalyticsEntity Pydantic models in
  src/fyrnheim/core/analytics_entity.py
- Vectorize the outer id loop (explicitly out of scope for v0.6.2)
- Push the source filter down into Ibis before df = enriched_events.execute()
  (out of scope; the post-execute filter is sufficient for the patch)
- Change pipeline.py or any caller of project_analytics_entity
- Skip the uv lock regeneration step
"""
