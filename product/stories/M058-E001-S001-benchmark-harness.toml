[handoff]
implementation_hints = """
## Authoritative spec

product/missions/M058-pipeline-benchmark-harness.toml — read the outcome
and [notes] sections for the full shape rationale. Key constraints:
- Stdlib only (no pytest-benchmark, no hyperfine)
- Non-invasive: instrument at existing phase boundaries; don't refactor phases
- `fyr bench --json` must emit pure JSON on stdout (parsable by `json.loads`)

## Suggested PipelineTimings shape

```python
from dataclasses import dataclass, field

@dataclass
class PipelineTimings:
    staging_views_s: float = 0.0
    source_loads: dict[str, float] = field(default_factory=dict)
    activities_s: float = 0.0
    identity_graphs: dict[str, float] = field(default_factory=dict)
    analytics_entities: dict[str, dict[str, float]] = field(default_factory=dict)
    metrics_models: dict[str, dict[str, float]] = field(default_factory=dict)
```

Put it in pipeline.py next to PipelineResult (don't make a new module for one
small dataclass).

## Instrumentation pattern (copy for each phase)

```python
t0 = time.monotonic()
# ... existing phase code ...
timings.source_loads[source.name] = time.monotonic() - t0
```

For analytics entities (lines 154-179), split the timing across project vs write:

```python
t_project = time.monotonic()
projected = project_analytics_entity(enriched_events, ae)
df = projected.execute()
project_s = time.monotonic() - t_project

t_write = time.monotonic()
# ... existing write code (table or parquet branch) ...
write_s = time.monotonic() - t_write

timings.analytics_entities[ae.name] = {"project_s": project_s, "write_s": write_s}
```

Apply the same split to metrics models.

## `fyr bench` CLI

Register as a click subcommand alongside `fyr run` in cli.py. Reuse the
same config-loading helper `fyr run` uses (do NOT duplicate config parsing).

Default output shape (example):

```
Pipeline bench — total 4.231s
  staging_views: 0.002s
  source_loads (2):
    users:         0.841s
    events:        1.203s
  activities:      0.014s
  identity_graphs (1):
    main:          0.512s
  analytics_entities (2):
    accounts:      project=0.219s  write=0.402s
    sessions:      project=1.038s  write=0.000s  [parquet]
  metrics_models (0): (none)
```

For `--json`, use `dataclasses.asdict(result.timings)` and `json.dumps(...)`.
Print nothing else on stdout when `--json` is passed. The format stability is
important since downstream tooling may parse it.

## benchmark_result fixture

In tests/conftest.py, add:

```python
@pytest.fixture(scope="session")
def benchmark_result():
    # Reuse the smallest duckdb-backed example already used by the e2e tests.
    # If that fixture already exists, import and wrap it.
    # Run the pipeline once, yield the PipelineResult.
    ...
```

Find the existing e2e test pattern first (tests/test_e2e_entity_output.py
and tests/test_e2e_identity_projection.py) and reuse the same fixture
entry point — do NOT invent a new example project.

## The approximate-sum test

The mission's criterion is that the timings are complete — if a phase is
missed, the sum diverges from elapsed_seconds by the missed phase's time.
Tolerance 150ms (generous but small enough to catch a missed phase).
Compute the sum exactly as the mission spec says; assert
`abs(sum_of_timings - result.elapsed_seconds) < 0.15`.

## What NOT to do

- Do NOT add pytest-benchmark to pyproject.toml
- Do NOT instrument inside phase internals (no per-row timings, no per-field-resolution timings)
- Do NOT add structured logging or telemetry beyond the timings dict
- Do NOT change pipeline.py phase boundaries; only wrap them with time.monotonic()
- Do NOT bump the version or add a CHANGELOG entry — v0.7.0 is bundled later
"""
