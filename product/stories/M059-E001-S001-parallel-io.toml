description = """Parallelize the three serial I/O loops in pipeline.py
(phase 1 source loads, phase 4 entity writes, phase 5 metrics writes)
using a bounded ThreadPoolExecutor. Add ResolvedConfig.max_parallel_io
(default 4) + `fyr run --max-parallel-io N`. Add a DuckDB connection lock
to IbisExecutor so the shared executor is safe under concurrent calls."""

