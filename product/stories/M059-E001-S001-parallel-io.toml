[handoff]
implementation_hints = """
## Authoritative spec

product/missions/M059-parallel-source-and-entity-io.toml — read outcome +
[notes]. Critical design constraints:
- Threads, not asyncio (Ibis/BQ clients are sync)
- Bounded pool; default 4
- Source-load ORDERING must be preserved (event_tables[i] ↔ config.sources[i])
- Projection step of phase 4/5 stays sequential — only writes parallelize

## DuckDB thread-safety (MOST IMPORTANT)

DuckDB Python connections are NOT thread-safe for concurrent queries on a
single connection. The BigQuery client IS thread-safe. Apply this pattern
in IbisExecutor.__init__:

```python
import threading, contextlib

class IbisExecutor:
    def __init__(self, ..., backend: str, ...):
        ...
        self.backend = backend
        if backend == "duckdb":
            self._conn_lock: threading.Lock | contextlib.AbstractContextManager = threading.Lock()
        else:
            self._conn_lock = contextlib.nullcontext()
```

Then in every method that touches `self._conn`:

```python
def execute_parameterized(self, sql: str, params: dict) -> list:
    with self._conn_lock:
        # existing body
        ...
```

Apply to: `execute`, `execute_parameterized`, `materialize_view`,
`write_table`, `view_exists`, `drop_view`. For BQ-only `write_table`, the
lock is nullcontext so parallelism is preserved. For DuckDB, it serializes
connection access (correct but still much better than the single-threaded
pipeline because BQ and parquet writes in the same run aren't blocked by
DuckDB's lock anyway).

Test the lock with a threaded smoke test that stresses execute_parameterized.

## Source-load fan-out pattern

```python
from concurrent.futures import ThreadPoolExecutor

def _load_source(source):
    t0 = time.monotonic()
    if isinstance(source, StateSource):
        tbl = _load_state_source(source, executor, config, no_state=no_state)
    elif isinstance(source, EventSource):
        tbl = load_event_source(source, executor._conn, config.backend, data_dir=config.data_dir)
    elapsed = time.monotonic() - t0
    return source.name, tbl, elapsed

event_tables: list[ibis.Table] = [None] * len(config.sources)

with ThreadPoolExecutor(max_workers=config.max_parallel_io) as pool:
    futures = [pool.submit(_load_source, src) for src in config.sources]
    for i, fut in enumerate(futures):
        name, tbl, elapsed = fut.result()
        event_tables[i] = tbl
        timings.source_loads[name] = elapsed
```

The pre-sized list + index-based assignment guarantees ordering without
`as_completed`. Iterating `futures` in list order means each `fut.result()`
blocks until that specific future is done — but earlier futures may have
already completed concurrently with later ones, so total wall time is
bounded by the slowest item plus a bit, not the sum.

## Entity-write fan-out pattern

```python
with ThreadPoolExecutor(max_workers=config.max_parallel_io) as pool:
    write_futures = []
    for ae in analytics_entities:
        t_project = time.monotonic()
        try:
            projected = project_analytics_entity(enriched_events, ae)
            df = projected.execute()
        except Exception as e:
            result.errors.append(f\"project {ae.name}: {e}\")
            timings.analytics_entities[ae.name] = {\"project_s\": time.monotonic() - t_project, \"write_s\": 0.0}
            continue
        project_s = time.monotonic() - t_project

        def _write(ae=ae, df=df, project_s=project_s):
            t_write = time.monotonic()
            try:
                if ae.materialization == \"table\":
                    table_name = ae.table or ae.name
                    executor.write_table(ae.project, ae.dataset, table_name, df)
                else:
                    out_path = config.output_dir / f\"{ae.name}.parquet\"
                    df.to_parquet(str(out_path))
            finally:
                timings.analytics_entities[ae.name] = {\"project_s\": project_s, \"write_s\": time.monotonic() - t_write}

        write_futures.append(pool.submit(_write))

    for fut in write_futures:
        fut.result()  # propagate exceptions
```

Mirror for metrics_models in phase 5.

## timings dict thread-safety

dict-setitem IS atomic in CPython (GIL). Multiple threads can safely
`timings.analytics_entities[name] = {...}` concurrently without a lock.
No extra synchronization needed for the timings dict.

## Config threading

- Add `max_parallel_io: int = 4` to ResolvedConfig (frozen dataclass — just another field)
- In resolve_config(), accept `max_parallel_io: int | None = None` parameter; if None, fall back to config.max_parallel_io if set else 4
- ProjectConfig doesn't currently have max_parallel_io; add it and default to None so it's picked up from yaml if present

## CLI plumbing

In cli.py `run` command:
```python
@click.option(\"--max-parallel-io\", type=click.IntRange(min=1), default=None,
              help=\"Max parallel I/O workers for source loads and entity/metrics writes (default: 4)\")
def run(..., max_parallel_io):
    ...
    config = resolve_config(..., max_parallel_io=max_parallel_io)
    ...
```

Also apply to `fyr bench` for consistency.

## Updating the M058 invariant test

In tests/test_benchmark_harness.py, find the test that asserts
`abs(sum - elapsed) < 0.15`. With parallelism, sum of per-item timings >=
elapsed_seconds (could be much larger). Change to:

```python
# With parallel execution, sum_of_timings may exceed elapsed_seconds,
# but must cover at least elapsed minus a small tolerance (no phase missed).
assert sum_of_timings >= result.elapsed_seconds - 0.15
```

This still catches missed phases but tolerates concurrency.

## Do NOT

- Touch project_analytics_entity (M060's job)
- Add asyncio or async/await
- Add connection pooling to IbisExecutor (single-conn + lock is sufficient for v0.7.0)
- Parallelize identity resolution (phase 3) — shared enriched_events state
- Parallelize staging_views (phase 0) — sequencing matters across materialized views
- Lock the BigQuery client (it's thread-safe; the lock would serialize the actual parallel win)
- Bump the version
