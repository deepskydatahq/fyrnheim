[handoff]
implementation_hints = """
## Authoritative spec

product/missions/M060-pushdown-analytics-projection.toml — read the
outcome, risk map, and test strategy notes in full. This story is
PLAN-level because the precise Ibis API calls depend on what the JSON
spike reveals; the destination is clear.

## Step 0: JSON-extract portability spike (DO FIRST)

Before touching project_analytics_entity, prove the JSON extraction
pattern works on both DuckDB and BigQuery via Ibis. Timebox: 30-45 minutes.

```python
import ibis
import pandas as pd

# DuckDB baseline (local, easy)
df = pd.DataFrame([
    {"source": "a", "entity_id": "1", "ts": "2024-01-01",
     "event_type": "row_appeared", "payload": '{"email": "x@y.com", "plan": "free"}'},
])
t = ibis.memtable(df)
# Try ibis's JSON extraction. Options in order of preference:
#   1. t.payload.cast("json")["email"]
#   2. t.payload.re_extract(r'"email":\\s*"([^"]*)"', 1)  # regex fallback
#   3. ibis.literal("json_extract_string").call(t.payload, "$.email")  # raw
expr = t.select(email=t.payload.cast("json")["email"].cast("string"))
print(expr.execute())

# BigQuery: skip if no creds. Verify Ibis compiles the same expr to BQ SQL:
con = ibis.bigquery.connect(project="dummy", dataset="dummy")
print(con.compile(expr))  # inspect the generated SQL
```

Decision to document:
- Which Ibis expression produces scalar JSON extraction portably?
- If portability is partial, document the fallback (e.g., backend-specific
  branch via `isinstance(executor._conn, ibis.backends.duckdb.Backend)`).
- If Ibis cannot express it portably, ESCALATE — do not silently diverge
  backends. Update the story or open a follow-up question before proceeding.

## Step 1: Vendor the pandas reference

Copy the complete v0.6.2 project_analytics_entity body + all `_resolve_*`
and `_compute_measure` helpers into `tests/_legacy_pandas_projection.py`
(prefix `_` ensures pytest does not collect it as tests). Export one
function: `legacy_project_analytics_entity(enriched_events, analytics_entity) -> ibis.expr.types.Table`.

Add a module docstring: `# Vendored from v0.6.2 for M060 equivalence
testing. Delete after the new implementation has been green on main
for 2+ weeks.`

## Step 2: Equivalence test harness

In tests/test_analytics_entity_engine.py, add (or refactor an existing
section into) a parameterized equivalence test:

```python
@pytest.mark.parametrize("fixture_name, entity_builder", [
    ("events_with_state_and_activities", lambda: AnalyticsEntity(...)),
    # ...one row per existing test scenario...
])
def test_new_matches_legacy(fixture_name, entity_builder, request):
    events = request.getfixturevalue(fixture_name)
    ae = entity_builder()
    new_df = project_analytics_entity(events, ae).execute().sort_values("entity_id").reset_index(drop=True)
    legacy_df = legacy_project_analytics_entity(events, ae).execute().sort_values("entity_id").reset_index(drop=True)
    pd.testing.assert_frame_equal(new_df, legacy_df, check_exact=False, rtol=1e-6)
```

Build this BEFORE writing the Ibis implementation. It will fail at first
(because the new impl doesn't exist yet); track it as the red→green signal
as you build each aggregation class.

## Step 3: Incremental implementation

Implement aggregations in this order (each should turn some equivalence
tests green):

1. **Group key + empty-input** — get the scaffold producing an Ibis
   expression with the right columns on empty inputs.
2. **Measure: count** — simplest aggregation, no JSON extraction needed.
3. **Measure: sum** — requires numeric cast + filter.
4. **Measure: latest** — requires JSON extract + argmax-by-ts.
5. **StateField latest/first** — builds on measure:latest.
6. **StateField coalesce** — nested coalesce of per-source latest sub-aggregations.
7. **field_changed branching** — CASE WHEN inside the resolved_value sub-expression; rerun all tests.
8. **M057 relevance filter** — Ibis `.filter()` at the start of the expression (trivial, mirrors the current Python set logic).

## Step 4: field_changed shape — the hard part

Current Python behavior (`_extract_field_value`):
- event_type='row_appeared' → payload[field_name]
- event_type='field_changed' AND payload['field_name'] == target → payload['new_value']
- anything else → payload[field_name] (flat lookup fallback)

Ibis shape: per event, compute a derived `resolved_value` column via
CASE WHEN before aggregation:

```python
resolved = ibis.case()\\
    .when(
        (events.event_type == 'field_changed') &
        (events.payload.cast("json")["field_name"].cast("string") == target_field_name),
        events.payload.cast("json")["new_value"].cast("string")
    )\\
    .else_(events.payload.cast("json")[target_field_name].cast("string"))\\
    .end()
```

Then aggregate over `resolved`, filtering NULLs, arg-by-ts.

## Step 5: Handle float tie-breaks

Run the equivalence suite. For any failure that's a last-bit float
difference on a sum measure, switch that test's assertion to
`pytest.approx` and document in the commit. For any failure that's a
stable-sort tie-break on ts (two events with the same ts resolved to
different values), update the fixture to make ts distinct. These are the
two acceptable-breakage classes in the mission TOML.

## Step 6: computed_fields unchanged

Pull the aggregation Ibis expression through `.execute()` inside
project_analytics_entity just before the computed_fields loop, OR return
the Ibis expression and let pipeline.py's existing `.execute()` do the
work (preferred — keeps the public contract). computed_fields apply in
Python over the small post-aggregation DataFrame, same code path.

Wait — if project_analytics_entity returns an Ibis expression but
computed_fields need to run in Python, the cleanest shape is:

```python
def project_analytics_entity(events, ae) -> ibis.expr.types.Table:
    agg_expr = _build_aggregation_expression(events, ae)
    if not ae.computed_fields:
        return agg_expr
    # Compute in Python for computed_fields; keep the return type ibis.expr.types.Table via memtable
    df = agg_expr.execute()
    for cf in ae.computed_fields:
        df[cf.name] = df.apply(lambda r, expr=cf.expression: eval(expr, ...), axis=1)
    return ibis.memtable(df)
```

This means entities without computed_fields get the full push-down; those
with computed_fields still benefit from a server-side aggregation (only
the small result is pulled, not the raw events). Acceptable compromise
given the mission explicitly scoped computed_fields out.

## Step 7: Benchmark the difference

Use the M058 benchmark_result fixture. In the PR body, cite:
- project_s for each AnalyticsEntity in the fixture before (on main, pre-merge) vs after (on branch).
- Note that the benefit is biggest for entities with many state_fields/measures — the pandas loop was O(n_ids * n_fields), the new shape is O(1) SQL queries.

## Do NOT

- Touch Measure / StateField / AnalyticsEntity Pydantic models
- Touch pipeline.py beyond potentially removing comments that are now stale
- Change the M057 relevance filter logic (just translate it to Ibis .filter)
- Push computed_fields into Ibis (separate mission)
- Add a direct Ibis→write_table path (separate mission)
- Vectorize the Python computed_fields apply (keep it simple)
- Bump the version / add a CHANGELOG entry

## Escape hatch

If the JSON spike reveals that Ibis cannot cleanly express scalar JSON
extraction against both backends, STOP and escalate. Options to discuss:
- Accept backend-specific code paths via isinstance check on the connection
- Defer BigQuery integration test to a follow-up mission; ship DuckDB-only
- Abandon M060 and open a narrower mission with explicit backend scope

The byte-identical-output contract on the equivalence suite is the safety
net — if you can make it green, the rest is mechanical.
