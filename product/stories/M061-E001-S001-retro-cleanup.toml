    # len(set(recorded_tids)) == 1 — all on the same thread.
    ...

def test_max_parallel_io_one_entity_writes_serial(monkeypatch):
    # Mock executor.write_table. Capture (enter_ts, exit_ts) per call.
    # Run run_pipeline with max_parallel_io=1 and 3 AnalyticsEntity items
    # with materialization='table'. Assert no temporal overlap between any
    # two intervals.
    ...
```

The enter/exit overlap check:
```python
intervals = sorted(zip(enter_ts, exit_ts))
for (e1, x1), (e2, x2) in zip(intervals, intervals[1:]):
    assert e2 >= x1  # next one can't start before previous finishes
```

