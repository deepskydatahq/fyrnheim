## Suggested order

1. register_parquet lock wrap (smallest, most isolated)
2. CLI try/finally wraps (4 spots, same mechanical pattern as bench)
3. max_parallel_io config tests (4 tests)
4. max_parallel_io=1 serial regression tests (1-2 tests)
5. Full suite + ruff + mypy

## 1. register_parquet lock wrap

src/fyrnheim/engine/executor.py:211 — currently:

```python
def register_parquet(self, name, path):
    # existing body
```

Wrap with the existing `self._conn_lock` (set up in __init__ around line 82):

```python
def register_parquet(self, name, path):
    with self._conn_lock:
        # existing body
```

For DuckDB backend the lock is threading.Lock; for others it's
contextlib.nullcontext so this is a no-op. 3-line change.

## 2. CLI try/finally wraps

The bench pattern (cli.py around lines 485-514) is:

```python
executor = IbisExecutor.from_config(
    backend=config.backend,
    backend_config=config.backend_config,
)

try:
    # existing command body
    ...
finally:
    executor.close()
```

Apply to:
- run (from_config at line 303)
- materialize (line 557)
- drop (line 613)
- list-staging (line 667)

**Important:** existing `sys.exit(N)` calls will still trigger `finally`
because SystemExit is a BaseException subclass that propagates through the
finally block. Do not change exit behavior; just wrap.

Also: the helper at cli.py:643 (no-state check) also creates a from_config —
verify during implementation whether it's inside a command or a standalone
helper. If inside a command that already has its own from_config wrapped,
that inner executor needs its own try/finally too.

## 3. max_parallel_io unit tests

Current config.py layout:
- ProjectConfig.max_parallel_io = 4 (line 29) — frozen dataclass field with default
- load_config() validates yaml at lines 78-89 (positive int check)
- ResolvedConfig.max_parallel_io = 4 (line 119) — frozen dataclass field
- resolve_config() precedence at lines 131,140-145:
  - CLI arg wins if not None
  - else yaml (config.max_parallel_io) if config exists
  - else built-in default 4

Find the project's existing config test file (likely tests/test_config.py —
grep to confirm). If no test file, create tests/test_config.py with a
minimal harness. Tests should:

```python
def test_resolve_config_max_parallel_io_default(monkeypatch, tmp_path):
    monkeypatch.chdir(tmp_path)
    cfg = resolve_config()
    assert cfg.max_parallel_io == 4

def test_resolve_config_max_parallel_io_yaml_override(monkeypatch, tmp_path):
    (tmp_path / "fyrnheim.yaml").write_text("max_parallel_io: 8\\n")
    monkeypatch.chdir(tmp_path)
    cfg = resolve_config()
    assert cfg.max_parallel_io == 8

def test_resolve_config_max_parallel_io_cli_beats_yaml(monkeypatch, tmp_path):
    (tmp_path / "fyrnheim.yaml").write_text("max_parallel_io: 8\\n")
    monkeypatch.chdir(tmp_path)
    cfg = resolve_config(max_parallel_io=2)
    assert cfg.max_parallel_io == 2

def test_resolve_config_max_parallel_io_invalid_yaml_rejected(monkeypatch, tmp_path):
    (tmp_path / "fyrnheim.yaml").write_text("max_parallel_io: 0\\n")
    monkeypatch.chdir(tmp_path)
    with pytest.raises(<project's config error — grep for the raise site at config.py:83>):
        resolve_config()
```

Check the exact exception class raised at config.py line 83 before writing
the test — it should match.

