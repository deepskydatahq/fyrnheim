[handoff]
implementation_hints = """
## Authoritative spec

product/missions/M062-v0.7.0-release.toml — read outcome + [notes]
sections. Key constraints:
- No code changes; only version + lockfile + CHANGELOG
- Do NOT describe the M060 dtype-narrowing that isn't shipping
- DO describe the M059 fail-fast change
- Known-limitations footer is short and references Beads IDs

## CHANGELOG content sourcing

For each subsection, draw material from:
- M058: product/missions/M058-pipeline-benchmark-harness.toml [outcome]
- M059: product/missions/M059-parallel-source-and-entity-io.toml [outcome]
  and [scope] — explicit about the phase-1 fail-fast semantics change
- M060: product/missions/M060-pushdown-analytics-projection.toml [outcome]
  + PR #117 body (use `gh pr view 117 --json body --jq .body | head -80`
  for the speedup numbers)
- M061: product/missions/M061-post-m058-m059-retro-cleanup.toml [outcome]

Don't paraphrase the TOMLs verbatim — write release notes that a user
reading PyPI would find useful. Think "what changed for me" not "what
this mission's scope was".

## Style reference

Match the existing CHANGELOG entries ([0.6.2] and [0.6.1]):
- Keep-a-Changelog section headers
- Bullet points with backticked identifiers for code references
- Wrap at ~75 chars
- Use subsection names consistent with past entries (Fixed / Changed / Added / Changed (internal) / Performance — note the existing file already uses 'Fixed' and 'Changed (internal)'; 'Performance' is new but standard Keep-a-Changelog)

## Release-flow rituals

1. In the fresh worktree, rename the branch to `release/v0.7.0` BEFORE
   touching files:
   ```
   git branch -m release/v0.7.0
   ```

2. Bump `pyproject.toml`: change `version = "0.6.2"` → `version = "0.7.0"`.

3. Run `uv lock` to regenerate the lockfile. The lockfile gets a
   `version = "0.7.0"` entry for the `fyrnheim` project.

4. Write the CHANGELOG entry above `## [0.6.2]`.

5. Verify: `uv run pytest && uv run ruff check src/ tests/ && uv run mypy src/`.
   All must pass.

6. Commit everything in one commit with the release message.

7. Push `release/v0.7.0` and open the PR.

## Post-merge human steps (include in PR body)

After the PR merges, the human operator will:
```
git fetch origin
git checkout main && git pull --ff-only
git tag v0.7.0
git push origin v0.7.0
```

The tag push triggers `.github/workflows/publish.yml` which uploads the
wheel to PyPI. Verify via:
```
gh run list --workflow=publish.yml --limit 1
curl -s https://pypi.org/pypi/fyrnheim/json | jq '.info.version'
```

Include this in the PR body as 'Post-merge steps' so the human has the
exact commands handy.

## Do NOT

- Make any code change outside pyproject.toml + uv.lock + CHANGELOG.md
- Merge the PR or create the tag yourself
- Call out a latest-measure dtype narrowing (it was rework-fixed and no
  longer ships)
- Skip the `uv lock` regeneration — CI will fail if the lockfile is stale
- Close the Beads task for this story before the PR is opened
"""
