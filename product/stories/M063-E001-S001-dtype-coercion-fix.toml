## Implementation sketch (from mission TOML)

```python
def _coerce_to_arrow_friendly_dtype(s: pd.Series) -> pd.Series:
    non_null = s.dropna()
    if len(non_null) == 0:
        return s.astype(object)
    types = {type(v) for v in non_null}  # strict type(), NOT isinstance
    # Order matters: bool before int because bool IS a subclass of int
    # (but {bool} != {int} by set equality, so the explicit branch
    # ordering is more for reader clarity than correctness)
    if types == {bool}:
        return s.astype("boolean")
    if types == {int}:
        return s.astype(pd.Int64Dtype())
    if types <= {int, float}:
        return s.astype("Float64")
    if types == {str}:
        return s.astype(object)
    return s.astype(object)  # mixed / other — user's data model choice

def _parse_json_text_columns(df, columns):
    out = df.copy()
    for col in columns:
        if col in out.columns:
            parsed = out[col].map(_parse_json_text_cell)
            out[col] = _coerce_to_arrow_friendly_dtype(parsed)
    return out
```

## The isinstance gotcha (critical)

`isinstance(True, int) == True` in Python — bools are a subclass of int.
If the helper uses `isinstance(v, int)` to collect the type set,
a column of bools would coerce to `Int64` and lose semantic meaning.
Strict `type(v) is int` matching prevents this.

The dedicated regression test
`test_projection_nullable_bool_state_field_is_arrow_compatible` MUST
assert the final pyarrow type is `pa.bool_()`, not `pa.int64()`. Write
that assertion with an explicit error message so a future regression is
obvious:

```python
import pyarrow as pa
table = project_analytics_entity(events, ae).to_pyarrow()
col = table.schema.field("is_active").type
assert col == pa.bool_(), f"expected bool_(), got {col!r}"
```

## to_pyarrow() test pattern

```python
import pyarrow as pa
# build events memtable
events = ibis.memtable(pd.DataFrame([
    {"source": "crm", "entity_id": "e1", "ts": "2024-01-01",
     "event_type": "row_appeared", "payload": json.dumps({"lead_score": 42})},
    {"source": "crm", "entity_id": "e2", "ts": "2024-01-01",
     "event_type": "row_appeared", "payload": json.dumps({})},
]))
ae = AnalyticsEntity(
    name="scored_leads",
    state_fields=[StateField(name="lead_score", source="crm",
                             field="lead_score", strategy="latest")],
)
result = project_analytics_entity(events, ae)
table = result.to_pyarrow()  # <-- this is the failing path pre-fix
# e1 gets 42; e2 gets NULL
score_type = table.schema.field("lead_score").type
assert score_type == pa.int64() or score_type == pa.large_list(pa.int64()) or ... # accept any int64 variant
```

Use `pa.types.is_integer(...)` / `pa.types.is_floating(...)` /
`pa.types.is_boolean(...)` for flexible-but-correct assertions.

## CHANGELOG entry text

```
## [0.7.1] - 2026-04-19

### Fixed

- `project_analytics_entity` output now uses pandas nullable dtypes
  (`Int64` / `Float64` / `boolean`) for numeric and boolean state fields
  instead of object dtype with Python-scalar-and-None values. v0.7.0
  produced object-dtype columns that PyArrow could not convert, breaking
  the BigQuery memtable-registration path for any entity with a
  nullable numeric or boolean state field. DuckDB was unaffected.
```

## Release-flow rituals (same as M057/M062)

1. In the fresh worktree, rename the branch FIRST:
   ```
   git branch -m release/v0.7.1
   ```

2. Claim Beads: `bd update <story-task-id> --status in_progress` — the
   /execute-mission harness will tell you the task ID.

3. Implement the fix (helper + rewire in analytics_entity_engine.py).

4. Add the 5 regression tests + 1 unit test in
   tests/test_analytics_entity_engine.py.

5. Bump pyproject.toml 0.7.0 -> 0.7.1 and run `uv lock`.

6. Write the CHANGELOG [0.7.1] entry above [0.7.0].

7. Verify: `uv run pytest && uv run ruff check src/ tests/ && uv run mypy src/`.

8. Single commit:
   ```
   fix(M063): coerce projection output to Arrow-friendly dtypes (v0.7.1)

   _parse_json_text_columns previously forced .astype(object), producing
   mixed-Python-type columns (int + None) that pyarrow.Table.from_pandas
   cannot convert. BigQuery's memtable-registration path was broken for
   any nullable numeric or boolean state field. DuckDB silently tolerated
   the object dtype.

   Add _coerce_to_arrow_friendly_dtype per-column inference:
   - all int  -> Int64 (nullable)
   - any float -> Float64 (nullable)
   - all bool -> boolean (nullable)
   - all str  -> object (Arrow handles object-str)
   - mixed   -> object (user's data shape)

   Strict type() check to prevent bool (subclass of int) from silently
   coercing to Int64. Regression tests exercise the memtable -> to_pyarrow
   path without needing BQ credentials.
   ```

9. Close Beads: `bd close <story-task-id>`.

10. Push: `git push -u origin release/v0.7.1`.

11. Open the PR with the post-merge-steps block.

