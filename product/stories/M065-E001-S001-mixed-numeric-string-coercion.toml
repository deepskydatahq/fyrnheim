## Implementation sketch (from mission TOML)

```python
def _try_coerce_strings_to_numeric(
    non_null: list,
) -> tuple[list, bool] | None:
    \"\"\"Attempt json.loads on string values, keeping numeric ones in place.

    Returns (coerced_values, saw_float) if every string parses cleanly
    to a Python ``int`` or ``float``. Returns ``None`` if any string
    parses to a non-numeric type (str, bool, None, list, dict) or is
    unparseable — signalling 'fall back to object dtype'.
    \"\"\"
    out: list = []
    saw_float = False
    for v in non_null:
        if isinstance(v, str):
            try:
                parsed = json.loads(v)
            except (ValueError, TypeError):
                return None
            if type(parsed) is int:
                out.append(parsed)
            elif type(parsed) is float:
                out.append(parsed)
                saw_float = True
            else:
                return None
        else:
            out.append(v)
            if type(v) in _FLOAT_TYPES:
                saw_float = True
    return out, saw_float


def _coerce_to_arrow_friendly_dtype(s: pd.Series) -> pd.Series:
    non_null = s.dropna()
    if len(non_null) == 0:
        return s.astype(object)
    types = {type(v) for v in non_null}
    if types <= _BOOL_TYPES:
        return s.astype("boolean")
    if types <= _INT_TYPES:
        return s.astype(pd.Int64Dtype())
    if types <= _INT_TYPES | _FLOAT_TYPES:
        return s.astype("Float64")
    if types == {str}:
        return s.astype(object)
    # NEW: mixed numeric + string — tolerantly coerce when ALL strings
    # parse cleanly to int/float.
    if types <= _INT_TYPES | _FLOAT_TYPES | {str}:
        result = _try_coerce_strings_to_numeric(list(non_null))
        if result is not None:
            coerced, saw_float = result
            it = iter(coerced)
            rebuilt = [
                next(it) if not (v is None or (isinstance(v, float) and pd.isna(v))) else None
                for v in s
            ]
            target = "Float64" if saw_float else pd.Int64Dtype()
            return pd.Series(rebuilt, index=s.index, dtype=object).astype(target)
    return s.astype(object)
```

## Rebuild step — subtle correctness

- `s.dropna()` preserves index order AND drops Nones/NaNs. The coerced
  list is in the same order as non-null positions in `s`.
- Iterating `s` with `iter(coerced)` and `next(it)` for non-null
  positions correctly splices the coerced values back where they belong.
- None positions stay None. The output has the same length and index as
  `s`.

Test this carefully with a fixture that has Nones interleaved — e.g.
`[None, 11, '-5', '0', None, '47']` → output `[None, 11, -5, 0, None, 47]`.

## Why strict type check after json.loads

`json.loads("true")` returns Python `bool` True. `isinstance(True, int)`
is True — but `type(True) is int` is False. Using strict `type()` keeps
the bool-as-int guard consistent with the rest of the module. A column
with a mix of int and JSON-bool-strings falls through to object dtype
(the user has genuinely inconsistent data).

Similarly `json.loads("null")` returns Python None. A None post-parse
is rejected by the coercion helper (None is not int/float).

## CHANGELOG entry (verbatim)

```
## [0.7.3] - 2026-04-19

### Fixed

- `_coerce_to_arrow_friendly_dtype` now attempts to coerce mixed
  numeric-and-string columns to a nullable numeric dtype when every
  string is a valid JSON number. Previously the column fell through
  to object dtype, breaking the BigQuery PyArrow registration path
  for any state field whose source payload stored the value
  inconsistently as JSON numbers in some rows and JSON-quoted numbers
  in others (e.g. `{"score": 11}` vs `{"score": "-5"}` across the
  same source).

### Changed

- State fields and `latest` measures over payloads with intentionally
  mixed numeric-and-numeric-string values now produce a unified
  nullable numeric column (`Int64` if all values parse to int,
  `Float64` if any parse to float). Columns containing any
  non-numeric string are unaffected and continue to produce
  object-dtype output — which still fails PyArrow registration
  loudly, as it should (genuinely inconsistent data needs upstream
  cleanup, not silent type coercion).
```

## Release-flow rituals (same as M063/M064)

1. In the fresh worktree, rename the branch FIRST:
   ```
   git branch -m release/v0.7.3
   ```

2. Claim Beads: `bd update <story-task-id> --status in_progress`

3. Implement the helper + branch.

4. Add 7 unit tests in tests/test_analytics_entity_engine.py near the
   existing TestCoerceToArrowFriendlyDtype class.

5. Bump pyproject.toml 0.7.2 -> 0.7.3 and run `uv lock`.

6. Write CHANGELOG [0.7.3] entry above [0.7.2].

7. Verify: `uv run pytest && uv run ruff check src/ tests/ && uv run mypy src/`.

8. Single commit:
   ```
   fix(M065): tolerant numeric coercion for mixed int+string columns (v0.7.3)

   Source payloads that store a numeric value inconsistently — JSON
   number in some rows ({\"score\": 11}), JSON-quoted number in others
   ({\"score\": \"-5\"}) — produced an object-dtype column after the
   push-down extraction, because _coerce_to_arrow_friendly_dtype's
   pure-type branches matched neither {int, str} nor {float, str}.
   PyArrow rejected the object column on BigQuery; DuckDB silently
   tolerated it.

   Add _try_coerce_strings_to_numeric: when every string value parses
   cleanly to int or float via json.loads, coerce the whole column to
   Int64 / Float64. Non-numeric strings (\"hello\"), JSON bools
   (\"true\"), and JSON nulls (\"null\") cause the helper to bail
   out — the column stays object-dtype and PyArrow still fails loudly,
   which is the right signal for genuinely inconsistent data.

   Strict type(v) classification after json.loads preserves the bool-
   as-int guard.
   ```

9. Close Beads. Push release/v0.7.3.

10. Open PR with title `release: v0.7.3 — tolerant numeric coercion for
    mixed int+string columns`. Body includes:
    - Bug summary (user-data inconsistency exposed by M060 push-down)
    - BigQuery impact
    - Behavior-change note about intentionally-mixed numeric+string
