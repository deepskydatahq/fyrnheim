2. Claim Beads: `bd update <story-task-id> --status in_progress`

3. Implement the three code changes.

4. Flip the two existing tests.

5. Add the new unit tests and the e2e regression test.

6. Bump pyproject.toml 0.7.3 -> 0.8.0 and run `uv lock`.

7. Write CHANGELOG [0.8.0] entry above [0.7.3].

8. Verify:
   ```
   uv run pytest && uv run ruff check src/ tests/ && uv run mypy src/
   ```

9. Single commit:
   ```
   fix(M066): snapshot-diff replay on empty diff + full_refresh flag (v0.8.0)

   SnapshotDiffPipeline silently produced 0 events when current data
   matched the last saved snapshot, causing downstream entity
   materialization to emit 0 rows. A production pipeline hit this on
   stable GA4 daily-session StateSources: sessions entity 3,000 -> 0
   rows on the second run, anon_users entity 2,241 -> 1,348 rows,
   with no error signal.

   Fix has two parts:

   - Default behavior: when diff_snapshots returns 0 events AND a
     previous snapshot exists, replay every current row as a synthetic
     row_appeared event. Safe because no measure in the codebase
     counts row_appeared (measures count activity-named events
     produced by ActivityDefinition rewriting); state-field extraction
     is idempotent over duplicate row_appeared events.
   - Explicit escape hatch: new full_refresh: bool = False on
     StateSource. When True, _load_state_source skips the
     snapshot-diff machinery entirely — useful for state-only sources
     that don't need CDC events.

   INFO-level logging per StateSource per run (normal diff /
   empty-diff replay / full_refresh) so users can see which path ran.

   Flips two existing tests that pinned the buggy empty-events contract.
   Adds a new e2e regression test that runs the pipeline twice across
   two dates with persistent snapshot dir.
   ```

10. Close Beads. Push release/v0.8.0.

11. Open PR with title `release: v0.8.0 — snapshot-diff replay on empty diff + full_refresh flag`. Body includes:
