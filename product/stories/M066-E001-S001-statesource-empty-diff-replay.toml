## Implementation sketch

### 1. SnapshotDiffPipeline.run() — empty-diff replay (snapshot_diff.py)

```python
from __future__ import annotations

import datetime
import logging

import ibis

from fyrnheim.engine.diff_engine import _make_appeared_events, diff_snapshots
from fyrnheim.engine.snapshot_store import SnapshotStore

log = logging.getLogger(__name__)


class SnapshotDiffPipeline:
    def __init__(self, store: SnapshotStore, conn: ibis.BaseBackend) -> None:
        self._store = store
        self._conn = conn

    def run(
        self,
        source_name: str,
        current_table: ibis.Table,
        id_field: str = "id",
        snapshot_date: datetime.date | None = None,
        exclude_fields: list[str] | None = None,
    ) -> ibis.Table:
        if snapshot_date is None:
            snapshot_date = datetime.date.today()

        previous = self._store.get_previous(source_name, snapshot_date)

        events = diff_snapshots(
            current=current_table,
            previous=previous,
            source_name=source_name,
            id_field=id_field,
            snapshot_date=snapshot_date.isoformat(),
            exclude_fields=exclude_fields,
        )

        # M066: when previous snapshot exists but nothing changed, diff
        # produces 0 events. Downstream entity materialization would then
        # emit 0 rows. Fall back to row_appeared replay for every current
        # row so entities reflect current state.
        event_count = events.count().execute()
        if event_count == 0 and previous is not None:
            events = _make_appeared_events(
                current_table, source_name, snapshot_date.isoformat()
            )
            replayed = events.count().execute()
            log.info(
                "StateSource %s: diff empty, replayed %d rows as row_appeared",
                source_name,
                replayed,
            )
        else:
            log.info(
                "StateSource %s: diff produced %d events", source_name, event_count
            )

        self._store.save(source_name, snapshot_date, current_table)
        return events
```

Check the actual `_make_appeared_events` signature in diff_engine.py —
the helper might be private (leading underscore) but diff_snapshots
uses it internally. If it's truly private, either (a) promote it to a
public helper or (b) import with the underscore (Python lets you). A
simple rename to `make_appeared_events` is the cleanest but expands
diff scope by one file — use your judgment, but prefer importing with
the underscore if the signature is stable.

### 2. StateSource full_refresh field (core/source.py)

```python
class StateSource(BaseTableSource):
    name: str = PydanticField(min_length=1)
    id_field: str = PydanticField(min_length=1)
    snapshot_grain: Literal["hourly", "daily", "weekly"] = "daily"
    full_refresh: bool = PydanticField(
        default=False,
        description=(
            "When True, skip the snapshot-diff machinery entirely and "
            "emit row_appeared for every current row on every run. "
            "Useful for state-only sources where CDC-style field_changed "
            "events are not needed, or to force deterministic "
            "state-reflects-current behavior independent of snapshot-"
            "store state."
        ),
    )
    transforms: SourceTransforms | None = None
    fields: list[Field] | None = None
    computed_columns: list[ComputedColumn] = PydanticField(default_factory=list)
```

### 3. pipeline.py _load_state_source branch (pipeline.py:321-335)

```python
def _load_state_source(
    source: StateSource,
    config: ResolvedConfig,
    conn: ibis.BaseBackend,
) -> ibis.Table:
    table = source.read_table(conn, config.backend, data_dir=config.data_dir)

    if source.full_refresh:
        # M066 escape hatch: never touch the snapshot store; always emit
        # row_appeared for every current row.
        today = datetime.date.today().isoformat()
        events = _make_appeared_events(table, source.name, today)
        n = events.count().execute()
        log.info(
            "StateSource %s: full_refresh enabled, emitted %d rows as row_appeared",
            source.name,
            n,
        )
        return events

    snapshot_dir = Path(config.output_dir) / "snapshots"
    store = SnapshotStore(snapshot_dir, conn)
    pipeline = SnapshotDiffPipeline(store, conn)
    return pipeline.run(
        source_name=source.name,
        current_table=table,
        id_field=source.id_field,
    )
```

