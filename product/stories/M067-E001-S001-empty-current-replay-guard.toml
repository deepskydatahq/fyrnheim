## Implementation sketch

Current M066 code in snapshot_diff.py (lines ~82-102):

```python
events = diff_snapshots(...)

# M066: empty-diff replay fallback
event_count = int(events.count().execute())
if event_count == 0 and previous is not None:
    events = _make_appeared_events(
        current_table.execute(),
        source_name,
        id_field,
        snapshot_date.isoformat(),
    )
    replayed = int(events.count().execute())
    log.info(
        "StateSource %s: diff empty, replayed %d rows as row_appeared",
        source_name,
        replayed,
    )
else:
    log.info(
        "StateSource %s: diff produced %d events", source_name, event_count
    )

self._store.save(source_name, snapshot_date, current_table)
return events
```

After M067:

```python
events = diff_snapshots(...)

# M066+M067: empty-diff replay fallback, guarded against empty current
event_count = int(events.count().execute())
current_count = int(current_table.count().execute())

if event_count == 0 and previous is not None and current_count > 0:
    events = _make_appeared_events(
        current_table.execute(),
        source_name,
        id_field,
        snapshot_date.isoformat(),
    )
    log.info(
        "StateSource %s: diff empty, replayed %d rows as row_appeared",
        source_name,
        current_count,
    )
elif event_count == 0 and previous is not None and current_count == 0:
    log.info(
        "StateSource %s: diff empty and current has 0 rows, skipping replay",
        source_name,
    )
else:
    log.info(
        "StateSource %s: diff produced %d events", source_name, event_count
    )

self._store.save(source_name, snapshot_date, current_table)
return events
```

Notes:
- `current_table.count().execute()` is cheap — it's a pushed-down COUNT
  on the backend, not a full materialization.
- The `replayed` variable from M066 can go away — `current_count` is
  the same number (every current row becomes a replayed row_appeared
  event, 1-to-1).
- Keep the `self._store.save(...)` call on the new empty-current path —
  skipping the save would break the "previous snapshot exists" invariant
  for subsequent runs. The save should still happen so that on the
  third run, `previous` still points to a valid (empty) snapshot.

## New regression test sketch

```python
def test_run_skips_replay_when_current_is_empty(tmp_path, duckdb_conn):
    '''M067: a StateSource whose upstream returns 0 rows must not crash
    the pipeline on subsequent runs. The v0.8.0 replay branch would
    try to _make_appeared_events on a 0-row DataFrame, causing
    ibis.memtable to reject it with "Provided table/dataframe must
    have at least one column".
    '''
    import pandas as pd

    store = SnapshotStore(tmp_path, duckdb_conn)
    pipeline = SnapshotDiffPipeline(store, duckdb_conn)

    # 0-row current table
    empty_df = pd.DataFrame({"id": pd.Series([], dtype="int64"),
                             "name": pd.Series([], dtype="object")})
    current_table = ibis.memtable(empty_df)

    # Run 1 — cold start, previous is None
    result1 = pipeline.run(
        source_name="empty_source",
        current_table=current_table,
        snapshot_date=datetime.date(2026, 1, 1),
    )
    assert len(result1.execute()) == 0

    # Run 2 — previous snapshot exists (empty); current still empty.
    # Without the M067 guard this would crash.
    result2 = pipeline.run(
        source_name="empty_source",
        current_table=current_table,
        snapshot_date=datetime.date(2026, 1, 2),
    )
    assert len(result2.execute()) == 0

    # Both snapshots saved
    source_dir = tmp_path / "empty_source"
    parquet_files = sorted(source_dir.glob("*.parquet"))
    assert len(parquet_files) == 2
```

Place this test in tests/test_snapshot_diff.py near the other
TestSnapshotDiffPipelineUnit tests. Reuse the existing pipeline/store
fixtures if they fit; otherwise inline like above.

## CHANGELOG entry

```
## [0.8.1] - 2026-04-23

### Fixed

- Pipelines with StateSources whose upstream view returns 0 rows
  (empty placeholders — e.g. `SELECT ... FROM UNNEST([1]) LIMIT 0`
  for Salesforce placeholders) crashed with `Invalid Input Error:
  Provided table/dataframe must have at least one column` on every
  run after the first. The v0.8.0 replay-on-empty-diff branch fired
  unconditionally when events were empty and a previous snapshot
  existed, attempting to replay `row_appeared` events from a 0-row
  DataFrame. Three production StateSources reproduced:
  `salesforce_accounts`, `salesforce_contacts`,
  `salesforce_opportunities`. `SnapshotDiffPipeline.run()` now
  checks the current table row count before attempting the replay;
  when current is empty, the replay is skipped (nothing to replay)
  and the pipeline returns an empty events table — the pre-v0.8.0
  behavior for this specific case.
```

