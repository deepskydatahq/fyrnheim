New code (insert transform + computed_columns application after read_table):

```python
from fyrnheim.engine.source_transforms import _apply_source_transforms

def _load_state_source(source, config, conn):
    table = source.read_table(conn, config.backend, data_dir=config.data_dir)

    # M068: apply transforms then computed_columns at read time.
    # Both full_refresh and snapshot_diff paths see the transformed table.
    table = _apply_source_transforms(table, source.transforms)
    if source.computed_columns:
        for cc in source.computed_columns:
            table = table.mutate(**{cc.name: eval(cc.expression, {"ibis": ibis, "t": table})})  # noqa: S307

    if source.full_refresh:
        # emit replay events over the transformed table ...
        return events

    # snapshot-diff path over the transformed table
    snapshot_dir = Path(config.output_dir) / "snapshots"
    store = SnapshotStore(snapshot_dir, conn)
    pipeline = SnapshotDiffPipeline(store, conn)
    return pipeline.run(...)
```

### 4. Tests

**tests/test_source_transforms.py** (new file): direct tests against
the helper using `ibis.memtable(pd.DataFrame(...))`.

```python
import ibis
import pandas as pd
import pytest

from fyrnheim.core.source import (
    SourceTransforms, TypeCast, Rename, Divide, Multiply,
)
from fyrnheim.engine.source_transforms import _apply_source_transforms


def _make_table():
    return ibis.memtable(pd.DataFrame({
        "id": [1, 2, 3],
        "amount_cents": [1000, 2500, 4200],
        "name": ["a", "b", "c"],
    }))


def test_apply_transforms_none_returns_unchanged():
    t = _make_table()
    result = _apply_source_transforms(t, None)
    assert result is t


def test_type_cast_applied():
    t = _make_table()
    transforms = SourceTransforms(type_casts=[
        TypeCast(field="amount_cents", target_type="float64"),
    ])
    result = _apply_source_transforms(t, transforms)
    assert result.schema()["amount_cents"] == ibis.dtype("float64")


def test_rename_applied():
    t = _make_table()
    transforms = SourceTransforms(renames=[
        Rename(from_name="id", to_name="account_id"),
    ])
    result = _apply_source_transforms(t, transforms)
    assert "account_id" in result.columns
    assert "id" not in result.columns


def test_divide_creates_suffixed_column_with_default_suffix():
    t = _make_table()
    transforms = SourceTransforms(divides=[
        Divide(field="amount_cents", divisor=100.0),
    ])
    result = _apply_source_transforms(t, transforms)
    assert "amount_cents_amount" in result.columns
    # Original preserved
    assert "amount_cents" in result.columns
    df = result.execute()
    assert df["amount_cents_amount"].tolist() == [10.0, 25.0, 42.0]


def test_multiply_creates_suffixed_column_with_default_suffix():
    t = _make_table()
    transforms = SourceTransforms(multiplies=[
        Multiply(field="amount_cents", multiplier=2.0),
    ])
    result = _apply_source_transforms(t, transforms)
    assert "amount_cents_value" in result.columns


def test_transform_order_cast_then_divide_then_rename():
    t = _make_table()
    transforms = SourceTransforms(
        type_casts=[TypeCast(field="amount_cents", target_type="float64")],
        divides=[Divide(field="amount_cents", divisor=100.0)],
        renames=[Rename(from_name="amount_cents", to_name="amount_raw")],
    )
    result = _apply_source_transforms(t, transforms)
    # After cast+divide+rename: amount_cents was divided into amount_cents_amount,
    # then amount_cents was renamed to amount_raw.
    assert "amount_raw" in result.columns
    assert "amount_cents_amount" in result.columns
    assert "amount_cents" not in result.columns
```

