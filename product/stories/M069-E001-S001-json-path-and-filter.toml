## CHANGELOG [0.9.0] entry

```
## [0.9.0] - 2026-04-24

### Added

- `BaseTableSource.filter: str | None = None` — declarative source-level
  row filter. When set, applied after transforms and computed_columns
  via the `eval()` pattern (same as `ComputedColumn.expression`),
  with `{'ibis': ibis, 't': table}` context. Applies to StateSource,
  EventSource, and DerivedSource. Unblocks migrating SQL WHERE-clause-
  only staging views to declarative pydantic sources.
- `Field.source_column: str | None = None` — when `Field.json_path`
  is set, the engine extracts from this column. Defaults to
  `Field.name` (for the common case where the JSON column is named
  the same as the field being extracted).
- `Field.json_path` is now honored by the engine — previously declared
  on the Field model but never applied. Top-level paths (`$.<key>`)
  are supported; nested paths (`$.a.b`) raise a `ValueError` at
  pipeline setup with a pointer to file a future-enhancement request.

### Changed

- `source.fields` is now engine-consumed for json_path extraction.
  Previously it was read-only metadata — engines never iterated it.
  Users who declared `Field(name=X, json_path=Y)` expecting the field
  to be silently ignored will see extraction happen on upgrade. This
  matches the documented model intent; if you had a non-conforming
  setup (declared json_path + expected it ignored), remove the
  json_path attribute.

### Notes

- **Filter NULL-gotcha**: SQL three-valued logic means `t.col != True`
  drops NULL rows. If you want NULLs to be treated as False (keep
  them in the filtered output), write `t.col.fillna(False) != True`
  instead. Not a framework-level fix — follow SQL semantics.
- **FR-5 (source-level joins) deferred to M070.** Use `StagingView`
  for joins in the meantime; the M070 mission will revisit
  source-level joins after real usage data from v0.9.0 informs the
  API shape.
```

Use today's date. Adjust the `Added` list order if your implementation
lands features in a different order.

## Release-flow rituals (same as M063/M064/M065/M066/M067/M068)

1. `git branch -m release/v0.9.0`
2. Claim Beads
3. Implement: source.py model fields → source_transforms.py helper →
   event_source_loader.py + pipeline.py wire → tests
4. `uv lock` + CHANGELOG
5. Verify: `uv run pytest && uv run ruff check src/ tests/ && uv run mypy src/`
6. Single commit: `feat(M069): Field.json_path wiring + source-level filter (v0.9.0)`
7. Close Beads, push, open PR with post-merge-steps block
8. STOP — do not merge/tag/publish

**Release-shape note for the PR body:** per the release-discipline memory,
minor releases with new API surface are candidates for a TestPyPI RC
release (tag `v0.9.0rc1` → verify on test-pypi → merge/tag `v0.9.0`).
Include a line in the PR body saying `RC-on-TestPyPI is available if
the reviewer wants field-team validation before GA; otherwise merge
straight to v0.9.0.` — this gives the reviewer the choice rather than
forcing the RC step.

## Do NOT

- Add FR-5 (source-level joins) — deferred to M070
- Support nested JSON paths (`$.a.b.c`) — raise ValueError; defer to
  a future mission
- Touch snapshot_diff.py, diff_engine.py, snapshot_store.py,
  analytics_entity_engine.py, identity_engine.py
- Grow SourceTransforms with a json_paths list — json_path extraction
  is field-level metadata, not a transform; keep them separate (see
  M069 mission TOML [notes] on architectural placement)
- Skip documenting the NULL-gotcha on filter
- Merge, tag, or publish
