## Pipeline stage order (load-bearing)

After M069 the full source-loading stage is:

```
table = source.read_table(...)
table = _apply_source_transforms(table, source.transforms)
  # M068: casts → divides → multiplies → renames
table = _apply_json_path_extractions(table, source.fields)
  # M069 NEW — iterate fields with json_path, extract into named columns
if source.computed_columns:
    for cc in source.computed_columns:
        table = table.mutate(**{cc.name: eval(cc.expression, {"ibis": ibis, "t": table})})  # noqa: S307
if source.filter:
    # M069 NEW — filter after all column derivation
    table = table.filter(eval(source.filter, {"ibis": ibis, "t": table}))  # noqa: S307
# EventSource: then entity_id/ts/payload packing
# StateSource: then full_refresh branch or snapshot_diff pipeline
```

Placement rationale (do not deviate):
- json_path AFTER renames: so users can rename a JSON column to a
  clean name and extract from the renamed column (e.g. rename
  `raw_custom_1` → `custom_type`, then extract `$.value`)
- json_path BEFORE computed_columns: so computed_columns can
  reference extracted columns
- filter AFTER computed_columns: so filter can reference computed
  values (e.g., compute `is_deleted` then filter on it)
- All FIVE stages BEFORE the full_refresh/snapshot_diff branch in
  StateSource — both paths and the snapshot_store save see the same
  post-filter table

## JSON path extraction sketch

```python
import re

# Regex for allowed paths: top-level $.<key> where key is [a-zA-Z_][a-zA-Z0-9_]*
_JSON_PATH_TOPLEVEL = re.compile(r\"^\\$\\.([a-zA-Z_][a-zA-Z0-9_]*)$\")

# Field.type → ibis type string
_FIELD_TYPE_TO_IBIS = {
    "STRING": "string",
    "INT64": "int64",
    "FLOAT64": "float64",
    "BOOLEAN": "bool",
    "DATE": "date",
    "TIMESTAMP": "timestamp",
    "BYTES": "bytes",
}


def _apply_json_path_extractions(
    table: ibis.Table,
    fields: list[Field] | None,
) -> ibis.Table:
    \"\"\"For each Field with json_path set, extract into a typed column.\"\"\"
    if not fields:
        return table

    for f in fields:
        if f.json_path is None:
            continue
        m = _JSON_PATH_TOPLEVEL.match(f.json_path)
        if not m:
            raise ValueError(
                f\"Field {f.name!r}: json_path {f.json_path!r} is not a supported \"
                \"top-level path ($.<key>). Nested paths are not yet supported — \"
                \"file a future-enhancement request.\"
            )
        key = m.group(1)
        source_col = f.source_column or f.name
        ibis_type = _FIELD_TYPE_TO_IBIS.get(f.type)
        if ibis_type is None:
            raise ValueError(
                f\"Field {f.name!r}: type {f.type!r} is not supported for \"
                f\"json_path extraction. Supported: {sorted(_FIELD_TYPE_TO_IBIS)}\"
            )
        table = table.mutate(**{
            f.name: table[source_col].cast(\"json\")[key].unwrap_as(ibis_type)
        })
    return table
```

Note: `unwrap_as(...)` on a JSON accessor is the right ibis primitive
here — it returns NULL if the scalar type doesn't match, which is the
right behavior for best-effort extraction. Verify against the existing
analytics_entity_engine.py JSON primitives if unsure.

