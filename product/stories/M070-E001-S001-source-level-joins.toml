# Before the source-loading loop:
loaded_sources: dict[str, ibis.Table] = {}
ordered_sources = _topo_sort_sources(sources)  # NEW

# Per source (sequential to respect dep order):
for src in ordered_sources:
    table = src.read_table(...)
    reads_fixture = _reads_duckdb_fixture(src, config.backend)
    if not reads_fixture:
        table = _apply_source_transforms(table, src.transforms)
        table = _apply_joins(table, src.joins, loaded_sources)  # NEW M070
        table = _apply_json_path_extractions(table, src.fields)
    if src.computed_columns:
        for cc in src.computed_columns:
            table = table.mutate(...)
    if not reads_fixture and src.filter:
        table = table.filter(...)
    loaded_sources[src.name] = table  # populate registry AFTER pipeline
```

If Phase 1 currently uses ThreadPoolExecutor: keep parallelism for sources at the SAME topological level. Within a level, sources can load in parallel; across levels, serialize. (The staging_runner does this for StagingViews — copy that pattern.)

### 5. Same wiring in event_source_loader.py for EventSource path (if EventSource gets joins; otherwise document the deferral)

### 6. Tests

See acceptance criteria for the full test list. Focus the e2e on the lifecycle_history double-join shape — that's the reporter-facing regression.

## Critical decision: join_key column-name semantics

The acceptance criterion #11 flags this: ibis `.left_join(other, predicate)` requires that the predicate references columns existing in EACH side. For pardot_lifecycle_history's case:

- LEFT side (lifecycle_history): has `previous_stage_id` and `next_stage_id`
- RIGHT side (lifecycle_stage): has `id`

The two FK columns differ. Two ways to model:

**Option A (LEFT-side column)**: `join_key='previous_stage_id'`. Engine knows the RIGHT side's PK is `lifecycle_stage.id_field` (which Pydantic already declares). Predicate becomes `table[j.join_key] == other[other.id_field]`. Requires looking up the joined source's `id_field` from the StateSource declaration.

**Option B (RIGHT-side column)**: `join_key='id'`. The LEFT side must already have a column named `id` (renamed via transforms if needed). Predicate becomes `table[j.join_key] == other[j.join_key]`. Symmetric and simple.

**Recommendation**: Option A — looks up the joined source's `id_field` from the declared source. This matches the user's mental model: \"join lifecycle_history.previous_stage_id to lifecycle_stage's primary key\". Document in the Join docstring that `join_key` is the LEFT-side foreign-key column; the right side is implicitly `joined_source.id_field`. This requires resolving `id_field` from the source registry, which means the registry stores the Source object (not just the table) — adjust the data structure.

If the implementation finds Option A awkward, fall back to Option B and document the rename requirement. Either way, lock the decision in the docstring + tests.

