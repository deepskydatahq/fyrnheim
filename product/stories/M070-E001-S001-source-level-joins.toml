## Implementation order (tight)

### 1. Pydantic models (core/source.py)

```python
class Join(BaseModel):
    \"\"\"Declarative left-join of another source for row enrichment.

    Minimum viable shape: left-join only, single-column equality on
    `join_key`. The joined source must be declared in the same
    pipeline; the runner topologically sorts sources by inferred
    dependencies. For richer joins (multi-key, inner/right/outer,
    ON predicates), use a StagingView.
    \"\"\"
    source_name: str = PydanticField(min_length=1, description=\"Name of another declared source to left-join.\")
    join_key: str = PydanticField(min_length=1, description=\"Column name present in BOTH this source's read shape AND the joined source — used for left-join equality.\")


class StateSource(BaseTableSource):
    # ...existing fields...
    joins: list[Join] = PydanticField(default_factory=list)

    @model_validator(mode=\"after\")
    def _validate_joins_vs_upstream(self) -> \"StateSource\":
        if self.upstream is not None and self.joins:
            raise ValueError(
                \"`upstream` (StagingView) and `joins` are mutually exclusive — \"
                \"`upstream` already provides a pre-joined warehouse view; \"
                \"declarative `joins` apply at the engine layer. Pick one.\"
            )
        return self
```

If existing model_validator chain on StateSource exists, chain this one alongside.

### 2. Helper (source_transforms.py)

```python
def _apply_joins(
    table: ibis.Table,
    joins: list[Join],
    source_registry: dict[str, ibis.Table],
) -> ibis.Table:
    \"\"\"Left-join a series of sibling source tables onto `table`.\"\"\"
    if not joins:
        return table
    for j in joins:
        if j.source_name not in source_registry:
            raise ValueError(
                f\"Join references source {j.source_name!r} which has not \"
                \"been loaded. The pipeline runner topologically sorts sources \"
                \"by inferred join dependencies; if you see this error, the \"
                \"named source is either misspelled or not declared in this \"
                \"pipeline.\"
            )
        other = source_registry[j.source_name]
        table = table.left_join(
            other,
            predicates=[table[j.join_key] == other[j.join_key]],
        )
    return table
```

### 3. Topological sort (in pipeline.py — algorithm copy from staging_runner)

Mirror `staging_runner._topo_sort` but for sources. Build dep graph from `joins[].source_name`. On cycle: raise ValueError with the cycle path.

