on v12.0.0 always promotes), Layer C is still the right patch-shape
fix for v0.9.1 but document WHY in the commit body.

## Layer C candidate fix sketch

```python
# src/fyrnheim/engine/diff_engine.py — new helper above _make_appeared_events

def _stringify_id(v: object) -> str:
    \"\"\"Stringify an id-field value, preserving int-shape for pandas-
    promoted integers.

    Context: pandas silently promotes int64 columns to float64 during
    round-trips (memtable materialization, parquet save/load). A naive
    ``str(row[id_field])`` then produces ``'1.0'`` for what was
    originally ``int(1)``. This helper detects float values with no
    fractional part and casts them to int before stringifying, so
    integer ids surface as ``'1'`` end-to-end.

    Preserves str() default behavior for all non-integral values
    (true floats, strings, bools, etc.).
    \"\"\"
    if isinstance(v, float) and v.is_integer():
        return str(int(v))
    return str(v)
```

Apply at the two call sites in `_make_appeared_events` (line 96,
`str(row[id_field])`) and `_make_disappeared_events` (line 118, same
call). Also grep for any other `str(row[id_field])` in the module
and apply uniformly.

