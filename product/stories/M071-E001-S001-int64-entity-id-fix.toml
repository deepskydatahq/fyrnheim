## Phase 1 mandate — DO NOT SKIP

Use the `superpowers:systematic-debugging` skill. The Iron Law applies:
no fixes without root-cause investigation first. Specifically:

1. Invoke the systematic-debugging skill.
2. Follow Phase 1: reproduce the bug (the mission TOML has the exact
