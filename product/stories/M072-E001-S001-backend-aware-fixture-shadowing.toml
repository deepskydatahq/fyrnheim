### 5. Negative test sketch

```python
def test_fixture_is_transformed_with_mismatched_fixture_shape_produces_wrong_output(tmp_path):
    \"\"\"Documents the trade-off: flag=True but fixture is RAW shape.

    The engine skips transforms, so downstream sees the RAW fixture
    shape (pre-rename) instead of the post-transform shape that BQ
    would produce. This is visibly wrong — the kind of mismatch that
    cross-backend tests catch. Not a silent failure; flag is
    explicit opt-in with a WARNING docstring.
    \"\"\"
    # Fixture with raw shape: 'id' column (not 'account_id')
    raw_df = pd.DataFrame({'id': [1, 2], 'name': ['a', 'b']})
    fixture_path = tmp_path / 'raw.parquet'
    raw_df.to_parquet(fixture_path)

    source = StateSource(
        name='s',
        id_field='account_id',  # expects post-transform id column name
        duckdb_path=str(fixture_path),
        duckdb_fixture_is_transformed=True,  # but fixture is NOT post-transform
        transforms=SourceTransforms(renames=[Rename(from_name='id', to_name='account_id')]),
    )

    # Pipeline runs but downstream will see 'id' not 'account_id';
    # identity resolution on 'account_id' will fail or produce empty.
    # The test documents this as EXPECTED behavior given the misuse.
    # Exact assertion: the table schema contains 'id' not 'account_id'.
```

### 6. CHANGELOG [0.10.0]

```
## [0.10.0] - 2026-04-24

### Added

- `BaseTableSource.duckdb_fixture_is_transformed: bool = False` —
  when True AND the source reads from its `duckdb_path` parquet AND
  the backend is DuckDB, the engine SKIPS `transforms`, `fields`
  (json_path extraction), and `filter` at source read time. Use this
  when your parquet fixture is a post-transform snapshot of the
  BigQuery output — the fixture IS the final shape, and re-applying
  transforms would either fail (pre-rename columns missing) or
  double-transform. Unblocks migrating SQL staging views to
  declarative pydantic sources when the DuckDB fixture is
  post-transform.

### Notes

- **`computed_columns` still apply on the skip path.** Computed
  expressions are backend-independent — they evaluate the same way
  against the post-transform shape on DuckDB as on BigQuery. No
  reason to skip them; applying them keeps backend-parity on the
  derived-column layer.
- **Backend-parity warning**: if you set `duckdb_fixture_is_transformed
  =True` but your fixture is NOT actually in post-transform shape,
  DuckDB-only runs will produce wrong results with no automatic
  error. Catch this with cross-backend tests. The flag is explicit
  opt-in, not auto-detected, so the mistake is visible at the
  source declaration site.
- **FR-5 (source-level joins) deferred to M070.** With this flag,
  the two Pardot sources that need joins can keep their StagingView
  SQL for the join layer and migrate everything else to pydantic —
  no urgent need for a source-level `joins` API.
```

