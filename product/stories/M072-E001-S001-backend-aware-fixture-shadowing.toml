## Implementation sketch

### 1. Pydantic field (core/source.py)

Place after `duckdb_path` on BaseTableSource (around line 80):

```python
duckdb_fixture_is_transformed: bool = PydanticField(
    default=False,
    description=(
        \"When True AND the source reads from `duckdb_path` AND the \"
        \"backend is DuckDB, the engine SKIPS `transforms`, `fields` \"
        \"(json_path extraction), and `filter` at source read time. \"
        \"Use this when your parquet fixture is already in the \"
        \"post-transform shape of the BigQuery output — the fixture \"
        \"IS the final shape. WARNING: if the fixture does NOT match \"
        \"the post-transform BQ output, DuckDB-only runs will produce \"
        \"wrong results with no backend-parity error (cross-backend \"
        \"tests catch this). `computed_columns` STILL APPLY on the \"
        \"skip path — they are backend-independent expressions. \"
        \"Default False preserves v0.9.1 behavior.\"
    ),
)
```

### 2. Gate helper (source_transforms.py or new source_loading.py)

```python
from fyrnheim.core.source import BaseTableSource


def _reads_duckdb_fixture(
    source: BaseTableSource,
    backend: str,
) -> bool:
    \"\"\"True if the engine is reading the DuckDB fixture parquet path
    and the source has opted into fixture-shadow mode.

    Mirrors BaseTableSource.read_table's branch: when backend=='duckdb'
    AND source.duckdb_path is set, read_table reads the parquet; when
    backend=='duckdb' AND source.table is set AND duckdb_path is None,
    read_table reads the live DuckDB table. The fixture-shadow skip
    fires ONLY in the parquet-read case.
    \"\"\"
    return (
        bool(source.duckdb_fixture_is_transformed)
        and backend == \"duckdb\"
        and source.duckdb_path is not None
    )
```

Verify against `BaseTableSource.read_table` (core/source.py around
line 105-162 — check current line numbers) that the gate exactly
mirrors its parquet-vs-live branch. If read_table uses additional
logic (e.g. checks `data_dir` or env vars), the gate must match.

### 3. Loader gates

**event_source_loader.py** (around lines 41-67 post-M069):

```python
from fyrnheim.engine.source_transforms import _reads_duckdb_fixture  # or wherever

table = event_source.read_table(conn, backend, data_dir=data_dir)

if _reads_duckdb_fixture(event_source, backend):
    log.info(
        \"EventSource %s: duckdb_fixture_is_transformed=True, \"
        \"skipping transforms/fields/filter (reading duckdb_path fixture)\",
        event_source.name,
    )
else:
    table = _apply_source_transforms(table, event_source.transforms)
    table = _apply_json_path_extractions(table, event_source.fields)

# computed_columns ALWAYS apply (regardless of skip)
if event_source.computed_columns:
    for cc in event_source.computed_columns:
        table = table.mutate(**{cc.name: eval(cc.expression, {\"ibis\": ibis, \"t\": table})})  # noqa: S307

# filter skipped in the fixture-shadow path
if not _reads_duckdb_fixture(event_source, backend) and event_source.filter:
    table = table.filter(eval(event_source.filter, {\"ibis\": ibis, \"t\": table}))  # noqa: S307
```

Note: caching `_reads_duckdb_fixture(...)` in a local variable avoids
calling it twice. Prefer:

```python
reads_fixture = _reads_duckdb_fixture(event_source, backend)
if reads_fixture:
    log.info(...)
else:
    table = _apply_source_transforms(...)
    table = _apply_json_path_extractions(...)

# computed_columns always
if event_source.computed_columns:
    ...

if not reads_fixture and event_source.filter:
    table = table.filter(...)
```

**pipeline.py _load_state_source** (around lines 336-361 post-M069):
same structure. Use `config.backend` as the backend arg to the gate.
`_load_state_source` already has `config: ResolvedConfig` in scope.

