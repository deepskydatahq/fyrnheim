- Line ~767: HTML panel field — remove the `content +=` line that builds the snapshot_grain HTML element

Verify no orphan code by reading the surrounding context after each removal. Run `uv run pytest tests/test_dag*.py 2>&1` if there are dag tests.

### 3. tests/test_state_event_source.py

