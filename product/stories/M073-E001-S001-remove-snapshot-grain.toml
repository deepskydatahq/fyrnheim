### 2. visualization/dag.py

Search-and-destroy: `grep -n "snapshot_grain" src/fyrnheim/visualization/dag.py`

For each match:
- Line ~30: `lines.append(f"Snapshot Grain: {s.snapshot_grain}")` — remove the line
