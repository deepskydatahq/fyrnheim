### 4. CHANGELOG [0.10.1]

```
## [0.10.1] - 2026-04-25

### Removed

- `StateSource.snapshot_grain` — declared on the model since M041 but
  never read by the engine. `SnapshotStore` always wrote per-date
  parquet snapshots regardless of the configured grain. Setting
  `snapshot_grain="hourly"` or `"weekly"` produced daily snapshots
  silently with no error or warning.

  **Migration**: users with `snapshot_grain=...` in their
  `StateSource` declarations can drop the attribute. Pydantic's
  default `extra='ignore'` means existing declarations continue to
  load without error on v0.10.1+ — no urgent upgrade pressure. DAG
  visualization no longer displays a "Snapshot Grain" line.

  Sub-daily snapshots are a future enhancement. File a feature
  request if you need hourly or weekly snapshots; the engine wiring
  (datetime-granular filenames, grain-aware diff baseline selection)
  is non-trivial and was deferred until there's concrete demand.
```

