### 4. CHANGELOG [0.11.0]

```
## [0.11.0] - 2026-04-25

### Added

- Nested `Field.json_path` dot-notation support. M069 introduced
  json_path wiring with a deliberate scope limit to single-segment
  paths (`$.<key>`); nested paths (`$.<key1>.<key2>...`) raised
  `ValueError`. This release lifts that limit — paths like
  `$.user.email` and `$.a.b.c` now extract via chained ibis JSON
  subscript on both DuckDB and BigQuery (verified on DuckDB; BigQuery
  uses the same chained pattern, which maps to JSON_VALUE under the
  hood — file a v0.11.1 patch if you hit a discrepancy).

  Closes the M069 future-enhancement request. The client-flowable
  reporter's `Field(json_path=\"$.user.email\", source_column=\"created_by\")`
  pattern (which silently NULLed `assigned_to_email` on v0.10.x) now
  works.

  **Bracket notation (`$['key']`, `$.array[0]`, `$.users[*]`)
  remains unsupported** — raises `ValueError` with a future-
  enhancement pointer. File a feature request if needed.

  No behavior change for users with single-segment paths — they
  continue to work exactly as before.
```

