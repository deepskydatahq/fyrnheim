Mission TOML [notes] has the full design rationale, cherry-pick mechanics, M072 test verification guidance, and orphan-branch context.

## FR-9 implementation

```python
# In event_source_loader.py and _build_state_source_table:
reads_fixture = _reads_duckdb_fixture(source, backend)
if not reads_fixture:
    table = _apply_source_transforms(table, source.transforms)
    table = _apply_joins(table, source.joins, source_registry, right_pk_registry)  # only StateSource
    table = _apply_json_path_extractions(table, source.fields)

# computed_columns: NEW M075 — skip if fixture-shadow AND output already exists
if source.computed_columns:
    for cc in source.computed_columns:
        if reads_fixture and cc.name in table.columns:
            log.info(
                \"StateSource %s: computed_column %s skipped (output already in fixture)\",
                source.name, cc.name,
            )
            continue
        table = table.mutate(**{cc.name: eval(cc.expression, {\"ibis\": ibis, \"t\": table})})

# filter — unchanged from M072
if not reads_fixture and source.filter:
    table = table.filter(eval(source.filter, {\"ibis\": ibis, \"t\": table}))
```

For EventSource path use `'EventSource %s: ...'` log prefix.

## Cherry-pick approach

Two options:

**Option A — git cherry-pick:**
```bash
git fetch origin release/v0.12.0
git cherry-pick 488d6eb  # the agent's fix commit
# resolve any conflicts
# update __version__ from '0.12.0' to '0.12.1' (the cherry-pick will set 0.12.0 from the agent)
```

**Option B — manual re-apply:** read the diff at `gh pr diff 143` (after merge) or `git show 488d6eb` and re-apply the 4 changes by hand:
1. `src/fyrnheim/__init__.py` — `__version__ = \"0.12.1\"` (was 0.1.0)
2. `tests/test_package.py` — version pin update
3. `tests/test_e2e_joins.py` — production path + strengthened assertion
4. `tests/test_source_transforms.py` — new missing-right-pk test

Recommend Option A (cherry-pick) for attribution + cleanliness. Manually patch the version string after.

## M072 existing test verification

Read tests/test_m072_fixture_shadowing.py. Find:
- `test_event_source_computed_columns_apply_on_skip_path`
- `test_state_source_computed_columns_apply_on_skip_path`

Verify their fixtures do NOT contain the computed-column output column. If they do, the M075 behavior would skip the recomputation and the test's assertion would fail. Update the fixture to remove the column OR rename the computed_column. Document in commit body which (if any) needed touching.

## CHANGELOG [0.12.1]

```
## [0.12.1] - 2026-04-25

### Fixed

- **`fyrnheim.__version__`** was `\"0.1.0\"` across v0.8.0–v0.12.0 PyPI
  releases — never synced from `pyproject.toml`. Now correctly
  reflects the package version. Users introspecting via
  `import fyrnheim; print(fyrnheim.__version__)` get the right value
  starting v0.12.1.

- **`computed_columns` on the fixture-shadow path** now respects
  fixture-resident output columns. M072 (v0.10.0) shipped
  `duckdb_fixture_is_transformed` with the rule \"computed_columns
  always apply\" — but computed expressions can reference
  upstream-pipeline outputs (joins, json_path extracts, renames)
  that DID skip on the fixture-shadow path. When the computed
  expression references a missing input, it failed. M075 refines
  the rule: when the fixture-shadow path fires AND the
  computed_column's output column already exists in the fixture,
  preserve the fixture's value instead of recomputing. Per-column
  granularity — columns missing from the fixture still get
  computed.

  Reporter case: a `transition_type` computed_column referencing
  `t.name_<source>_<key>` (a join-suffixed column from M070's
  source-level joins). On BigQuery, joins applied → expression
  evaluated. On DuckDB+fixture, joins skipped → suffix column
  missing → expression failed; but the fixture had `transition_type`
  pre-computed anyway, so the right behavior is preserve-from-fixture.

- **Test improvements**:
  - `tests/test_e2e_joins.py` lifecycle_history e2e now uses
    `_build_state_source_table` + `_run_state_source_diff` to register
    the pre-diff table properly, instead of bypassing the production
    path by re-reading the parquet. Strengthened assertion to pin
    specific joined values (`{\"Lead\", \"Qualified\"}` etc.).
  - `tests/test_source_transforms.py` adds
    `test_apply_joins_missing_right_pk_registry_raises_clear_error`
    for a previously-uncovered branch in `_apply_joins`.

  Both originated from PR #143's CodeRabbit review; the fixes
  reached the orphan `release/v0.12.0` branch (commit 488d6eb)
  but never landed on main pre-tag. M075 cherry-picks them.
```

Reference the M072 [0.10.0] entry's \"computed_columns STILL APPLY\" wording — link to the M075 refinement.

