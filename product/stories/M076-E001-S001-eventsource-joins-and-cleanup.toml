## Pre-flight grep checks (do these FIRST before editing)

```
grep -n "model_validator\\|upstream\\|joins" src/fyrnheim/core/source.py
grep -n "_topo_sort_sources\\|getattr.*joins\\|isinstance.*StateSource" src/fyrnheim/engine/pipeline.py
grep -n "field_mappings\\|literal_columns\\|UnionSource" src/ tests/
```

Document findings in the commit body before/after.

## Implementation order

1. Move/dup the upstream+joins validator from StateSource to BaseTableSource (or wherever pre-flight finds it)
2. Add `joins: list[Join] = []` to EventSource
3. Add EventSource-as-join-target guard in topological sort (or `_apply_joins`)
4. Wire `_apply_joins` in `load_event_source` between transforms and json_path; thread `source_registry` and `right_pk_registry` parameters through
5. Update Phase 1 in pipeline.py to populate `loaded_sources[event_source.name]` from the load_event_source post-pipeline table (BEFORE event conversion)
6. Remove TableSource.field_mappings + literal_columns + UnionSource docstring
7. Tests
8. Version bump + CHANGELOG

## Pipeline-stage placement (CRITICAL — load-bearing)

EventSource pipeline-stage order after M076:

```
read_table → transforms → [JOINS] → json_path → computed_columns (with M075 skip-if-exists) → filter → event-shape conversion (entity_id mapping + payload pack)
```

Joins go BEFORE event-shape conversion. The post-join table is what gets registered in `loaded_sources` (so other sources can join to this EventSource — though that case is OUT OF SCOPE for M076 per the EventSource-as-target guard).

## EventSource-as-join-target guard

```python
# In _topo_sort_sources or wherever source dependencies are resolved:
for src in sources:
    for j in getattr(src, 'joins', []):
        target = next((s for s in sources if s.name == j.source_name), None)
        if isinstance(target, EventSource):
            raise ValueError(
                f"Join in source {src.name!r} references {j.source_name!r} "
                "which is an EventSource. Joining TO an EventSource is "
                "not yet supported (the right_pk_registry's id_field lookup "
                "assumes StateSource semantics). File a future-enhancement "
                "request if you need this."
            )
```

Add a unit test that exercises this guard.

