[[acceptance_criteria.criteria]]
description = "The existing fyr-mcp-analytics stdio entrypoint remains compatible with current local and Docker MCP clients."

[[acceptance_criteria.criteria]]
description = "HTTP tests cover initialize, tools/list, list_analytics_models, list_insight_recipes, and top_content_items using a DuckDB-backed fixture project."

[[acceptance_criteria.criteria]]
description = "Docs explain stdio versus HTTP usage, Claude/hosted-client configuration, credential handling, and Supabase BYO MCP compatibility limits."

