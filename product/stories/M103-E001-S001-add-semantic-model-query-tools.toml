# Story: Add semantic model query tools

id = "M103-E001-S001"
parent = "M103-E001"
title = "Add semantic model query tools"
status = "complete"
triage = "plan"
created = 2026-05-17

[outcome]
description = "Add model-centric semantic catalog context plus safe generic analytics model query and SQL preview tools."

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
description = "Analytics catalog model descriptions include model kind, grain, defining entity, metrics, dimensions, recommended questions, and limitations."

[[acceptance_criteria.criteria]]
description = "Metric and dimension records include descriptions and safe usage hints for grouping, filtering, sorting, and aggregation."

[[acceptance_criteria.criteria]]
description = "MCP tools expose describe_analytics_model, query_analytics_model, and preview_analytics_query_sql."

[[acceptance_criteria.criteria]]
description = "query_analytics_model executes bounded read-only Ibis queries over declared model metrics/dimensions and rejects undeclared fields."

[[acceptance_criteria.criteria]]
description = "preview_analytics_query_sql returns generated SQL shape without accepting arbitrary SQL."

[[acceptance_criteria.criteria]]
description = "DuckDB tests cover a content_metrics_daily-style model, descriptions, grouped queries, rejected fields, limit caps, and SQL preview."

[[acceptance_criteria.criteria]]
description = "Docs explain model-grain reasoning and Propel's channel-rollup versus per-post distinction."

