[outcome]
description = "Serialize PropertyBag declarations into the manifest and analytics catalog as property_bags metadata separate from declared dimensions."

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
description = "build_manifest includes property_bags in analytics entity config via deterministic Pydantic serialization."

[[acceptance_criteria.criteria]]
description = "build_manifest_edges includes source-to-analytics_entity edges for property bag sources where useful and non-duplicative."

[[acceptance_criteria.criteria]]
description = "build_analytics_catalog includes each model's property_bags and top-level property_bags list or equivalent discoverable surface."

[[acceptance_criteria.criteria]]
description = "Declared dimensions remain limited to canonical_id, state_fields, and computed_fields; property bags are not expanded into dimensions by default."

[[acceptance_criteria.criteria]]
description = "Tests cover manifest JSON and analytics catalog output for a workshop_attendees.custom_properties example."

