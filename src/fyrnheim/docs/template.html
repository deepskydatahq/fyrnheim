<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fyrnheim Entity Documentation</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre-d3@0.6.4/dist/dagre-d3.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1b26; color: #c0caf5; display: flex; height: 100vh; overflow: hidden;
}
a { color: #7aa2f7; text-decoration: none; }
a:hover { text-decoration: underline; }

/* Sidebar */
#sidebar {
  width: 260px; min-width: 260px; background: #16161e; border-right: 1px solid #292e42;
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-header {
  padding: 20px 16px 12px; border-bottom: 1px solid #292e42;
}
#sidebar-header h1 { font-size: 18px; color: #c0caf5; font-weight: 600; }
#sidebar-header .meta { font-size: 12px; color: #565f89; margin-top: 4px; }
#entity-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.entity-item {
  padding: 8px 16px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; gap: 8px;
}
.entity-item:hover { background: #1a1b26; }
.entity-item.active { background: #292e42; color: #7aa2f7; }
.entity-item .badge {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: #292e42; color: #565f89; white-space: nowrap;
}

/* Main content */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Tabs */
#tabs {
  display: flex; border-bottom: 1px solid #292e42; background: #16161e;
}
.tab {
  padding: 10px 20px; cursor: pointer; font-size: 14px; color: #565f89;
  border-bottom: 2px solid transparent;
}
.tab:hover { color: #c0caf5; }
.tab.active { color: #7aa2f7; border-bottom-color: #7aa2f7; }

/* DAG view */
#dag-view {
  flex: 1; overflow: hidden; display: flex; position: relative;
}
#dag-view svg { width: 100%; height: 100%; }
#dag-view .node rect { rx: 5; ry: 5; stroke-width: 1.5px; }
#dag-view .node text { font-size: 13px; }
#dag-view .edgePath path { stroke: #565f89; stroke-width: 1.5px; fill: none; }
#dag-view .edgePath marker { fill: #565f89; }

/* Detail view */
#detail-view { flex: 1; overflow-y: auto; padding: 24px 32px; display: none; }
#detail-view h2 { font-size: 22px; color: #c0caf5; margin-bottom: 8px; }
#detail-view .entity-meta { color: #565f89; font-size: 13px; margin-bottom: 20px; }
#detail-view .section { margin-bottom: 24px; }
#detail-view .section h3 {
  font-size: 15px; color: #7aa2f7; margin-bottom: 10px;
  padding-bottom: 4px; border-bottom: 1px solid #292e42;
}
table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
th {
  text-align: left; padding: 6px 12px; background: #16161e;
  color: #565f89; font-weight: 500; border-bottom: 1px solid #292e42;
}
td {
  padding: 6px 12px; border-bottom: 1px solid #1e2030;
}
.tag {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 3px; background: #292e42; color: #7aa2f7; margin: 1px 2px;
}
.empty-state { color: #565f89; font-style: italic; font-size: 13px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Fyrnheim Docs</h1>
    <div class="meta" id="entity-count"></div>
  </div>
  <div id="entity-list"></div>
</div>

<div id="main">
  <div id="tabs">
    <div class="tab active" data-view="dag">Lineage DAG</div>
    <div class="tab" data-view="detail">Entity Detail</div>
  </div>
  <div id="dag-view"></div>
  <div id="detail-view"></div>
</div>

<script>
const CATALOG = /*CATALOG_JSON*/;

// --- Sidebar ---
function renderSidebar() {
  var list = document.getElementById('entity-list');
  var countEl = document.getElementById('entity-count');
  var entities = CATALOG.entities || [];
  countEl.textContent = entities.length + ' entities';
  list.innerHTML = '';
  entities.forEach(function(e) {
    var div = document.createElement('div');
    div.className = 'entity-item';
    div.setAttribute('data-entity', e.name);
    div.innerHTML = '<span>' + escapeHtml(e.name) + '</span><span class="badge">' + escapeHtml(e.source_type) + '</span>';
    div.addEventListener('click', function() { showEntity(e.name); });
    list.appendChild(div);
  });
}

// --- Tabs ---
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    var view = tab.getAttribute('data-view');
    document.getElementById('dag-view').style.display = view === 'dag' ? 'flex' : 'none';
    document.getElementById('detail-view').style.display = view === 'detail' ? 'block' : 'none';
  });
});

// --- DAG ---
function renderDAG() {
  var container = document.getElementById('dag-view');
  var svg = d3.select(container).append('svg');
  var inner = svg.append('g');

  var g = new dagreD3.graphlib.Graph().setGraph({
    rankdir: 'LR', ranksep: 60, nodesep: 30, marginx: 20, marginy: 20
  });

  var entities = CATALOG.entities || [];
  var entitySet = {};
  entities.forEach(function(e) { entitySet[e.name] = e; });

  entities.forEach(function(e) {
    var color = e.source_type === 'table' ? '#3d59a1' :
                e.source_type === 'derived' ? '#9d7cd8' :
                e.source_type === 'aggregation' ? '#e0af68' :
                e.source_type === 'union' ? '#73daca' : '#565f89';
    g.setNode(e.name, {
      label: e.name,
      style: 'fill: ' + color + '; stroke: ' + color,
      labelStyle: 'fill: #c0caf5; font-weight: 500',
      paddingLeft: 12, paddingRight: 12, paddingTop: 6, paddingBottom: 6
    });
  });

  entities.forEach(function(e) {
    (e.dependencies || []).forEach(function(dep) {
      if (entitySet[dep]) {
        g.setEdge(dep, e.name, {});
      }
    });
  });

  var render = new dagreD3.render();
  render(inner, g);

  // Fit to container
  var gGraph = g.graph();
  var containerRect = container.getBoundingClientRect();
  var graphW = gGraph.width || 1;
  var graphH = gGraph.height || 1;
  var scale = Math.min(
    containerRect.width / (graphW + 40),
    containerRect.height / (graphH + 40),
    1.5
  );
  var xOffset = (containerRect.width - graphW * scale) / 2;
  var yOffset = (containerRect.height - graphH * scale) / 2;
  inner.attr('transform', 'translate(' + xOffset + ',' + yOffset + ') scale(' + scale + ')');
  svg.attr('width', containerRect.width).attr('height', containerRect.height);

  // Click node -> show entity detail
  svg.selectAll('.node').on('click', function() {
    var name = d3.select(this).select('text').text();
    showEntity(name);
  });

  // Zoom
  var zoom = d3.zoom().on('zoom', function(event) {
    inner.attr('transform', event.transform);
  });
  svg.call(zoom);
  svg.call(zoom.transform, d3.zoomIdentity.translate(xOffset, yOffset).scale(scale));
}

// --- Entity Detail ---
function showEntity(name) {
  var entities = CATALOG.entities || [];
  var entity = null;
  for (var i = 0; i < entities.length; i++) {
    if (entities[i].name === name) { entity = entities[i]; break; }
  }
  if (!entity) return;

  // Switch to detail tab
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('.tab[data-view="detail"]').classList.add('active');
  document.getElementById('dag-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';

  // Highlight sidebar
  document.querySelectorAll('.entity-item').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('data-entity') === name);
  });

  var html = '<h2>' + escapeHtml(entity.name) + '</h2>';
  html += '<div class="entity-meta">';
  html += '<span class="tag">' + escapeHtml(entity.source_type) + '</span>';
  if (entity.is_internal) html += ' <span class="tag">internal</span>';
  if (entity.description) html += '<p style="margin-top:8px">' + escapeHtml(entity.description) + '</p>';
  html += '</div>';

  // Fields
  html += renderFieldsSection(entity.fields);
  // Computed columns
  html += renderComputedSection(entity.computed_columns);
  // Measures
  html += renderMeasuresSection(entity.measures);
  // Quality
  html += renderQualitySection(entity.quality);
  // Layers
  html += renderLayersSection(entity.layers);
  // Dependencies
  html += renderDepsSection(entity.dependencies, entity.dependents);

  document.getElementById('detail-view').innerHTML = html;
}

function renderFieldsSection(fields) {
  if (!fields || fields.length === 0) return '<div class="section"><h3>Fields</h3><div class="empty-state">No fields defined</div></div>';
  var h = '<div class="section"><h3>Fields (' + fields.length + ')</h3><table><tr><th>Name</th><th>Type</th><th>Nullable</th><th>Description</th></tr>';
  fields.forEach(function(f) {
    h += '<tr><td>' + escapeHtml(f.name) + '</td><td><code>' + escapeHtml(f.type) + '</code></td><td>' + (f.nullable ? 'Yes' : 'No') + '</td><td>' + escapeHtml(f.description || '') + '</td></tr>';
  });
  return h + '</table></div>';
}

function renderComputedSection(cols) {
  if (!cols || cols.length === 0) return '';
  var h = '<div class="section"><h3>Computed Columns (' + cols.length + ')</h3><table><tr><th>Name</th><th>Expression</th><th>Description</th></tr>';
  cols.forEach(function(c) {
    h += '<tr><td>' + escapeHtml(c.name) + '</td><td><code>' + escapeHtml(c.expression) + '</code></td><td>' + escapeHtml(c.description || '') + '</td></tr>';
  });
  return h + '</table></div>';
}

function renderMeasuresSection(measures) {
  if (!measures || measures.length === 0) return '';
  var h = '<div class="section"><h3>Measures (' + measures.length + ')</h3><table><tr><th>Name</th><th>Expression</th><th>Description</th></tr>';
  measures.forEach(function(m) {
    h += '<tr><td>' + escapeHtml(m.name) + '</td><td><code>' + escapeHtml(m.expression) + '</code></td><td>' + escapeHtml(m.description || '') + '</td></tr>';
  });
  return h + '</table></div>';
}

function renderQualitySection(quality) {
  if (!quality || (!quality.checks || quality.checks.length === 0)) return '';
  var h = '<div class="section"><h3>Quality Checks</h3>';
  if (quality.primary_key) h += '<p style="margin-bottom:8px;font-size:13px">Primary key: <code>' + escapeHtml(quality.primary_key) + '</code></p>';
  h += '<table><tr><th>Check Type</th><th>Description</th></tr>';
  quality.checks.forEach(function(c) {
    h += '<tr><td>' + escapeHtml(c.type) + '</td><td>' + escapeHtml(c.display_name || '') + '</td></tr>';
  });
  return h + '</table></div>';
}

function renderLayersSection(layers) {
  if (!layers || !layers.active || layers.active.length === 0) return '';
  var h = '<div class="section"><h3>Layers</h3><table><tr><th>Layer</th><th>Model Name</th><th>Materialization</th><th>Schema</th></tr>';
  layers.active.forEach(function(name) {
    var info = layers[name] || {};
    h += '<tr><td>' + escapeHtml(name) + '</td><td>' + escapeHtml(info.model_name || '-') + '</td><td>' + escapeHtml(info.materialization || '-') + '</td><td>' + escapeHtml(info.target_schema || '-') + '</td></tr>';
  });
  return h + '</table></div>';
}

function renderDepsSection(deps, dependents) {
  var h = '<div class="section"><h3>Lineage</h3>';
  if (deps && deps.length > 0) {
    h += '<p style="font-size:13px;margin-bottom:4px">Depends on: ';
    deps.forEach(function(d) { h += '<span class="tag">' + escapeHtml(d) + '</span> '; });
    h += '</p>';
  }
  if (dependents && dependents.length > 0) {
    h += '<p style="font-size:13px;margin-top:4px">Used by: ';
    dependents.forEach(function(d) { h += '<span class="tag">' + escapeHtml(d) + '</span> '; });
    h += '</p>';
  }
  if ((!deps || deps.length === 0) && (!dependents || dependents.length === 0)) {
    h += '<div class="empty-state">No dependencies</div>';
  }
  return h + '</div>';
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// --- Init ---
renderSidebar();
renderDAG();
</script>
</body>
</html>
